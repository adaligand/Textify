<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listen</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }
    .flex-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    button {
        font-size: 20px; 
        padding: 10px; 
        margin: 5px; 
        cursor: pointer; 
        border-radius: 10px;
        border: 2px solid #ccc;
        background-color: #f0f0f0;
        transition: all 0.2s ease-in-out;
    }
    button:hover {
      background-color: #A9A9A9;
      transform: translateY(-4px);
      }
    button:active {
      transform: translateY(1px);
      box-shadow: 3px 3px 6px #bebebe, -3px -3px 6px #ffffff;
    }
    .hide {
      display: none;
    }
    .keyboard-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .keyboard-container button {
      font-size: 18px;
      padding: 10px 15px;
      margin: 2px;
      border: none;
      border-radius: 10px;
      background-color: #f0f0f0;
      color: #000000;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s, transform 0.2s;
    }
    .keyboard-container button:hover {
      background-color: #A9A9A9;
      transform: translateY(-4px);
    }
    .on-screen-title {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      color: #333;
    }
    .input-container {
      margin-top: 20px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }
    .stats-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      margin-top: 20px;
    }
    #counter, #timer {
      font-weight: bold;
      font-size: 24px;
      color: #555;
      margin-top: 0;
    }
    #textInput {
      border-radius: 12px;
      height: 60px;
      width: 100%;
      max-width: 500px;
      font-size: 40px;
      border: 2px solid #ddd;
      padding: 0 15px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
     #textInput:focus {
        border-color: #333;
        outline: none;
    }
    select {
      vertical-align: middle;
      padding: 5px 10px;
      border-radius: 12px;
      height: 50px;
      font-size: 24px;
      border: 2px solid #ddd;
      background-color: #fff;
    }
    #feedback {
      text-align: center;
      font-weight: bold;
      font-size: 20px;
      margin-top: 10px;
      width: 100%;
      min-height: 24px;
    }

    /* Leaderboard Styling Extensions */
    .leaderboard-box { margin-top: 25px; text-align: center; border-top: 2px solid #eee; padding-top: 20px; }
    .leaderboard-list { display: inline-block; text-align: left; font-size: 18px; padding-left: 20px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="on-screen-title">Type what you hear</div>
    
    <div class="stats-container">
        <div id="counter"></div>
        <div id="timer">0m 0s</div>
    </div>
    
    <div id="exerciseOutput" class="hide"></div>
    <div class="input-container flex-container">
      <input type="text" id="textInput" class="hide" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeypress="handleKeyPress(event)">
    </div>
     <div class="input-container flex-container">
        <div id="feedback" class="hide input-feedback"></div>
    </div>
    <div class="input-container flex-container">
        <button id="resetButton" class="hide" onclick="resetExercise()">Reset</button>
    </div>
    <div class="input-container flex-container" id="controlsContainer">
      <select id="languageSelect" onchange="updateKeyboard()">
        <option value="french">French</option>
        <option value="german">German</option>
        <option value="spanish">Spanish</option>
      </select>
      <button id="playAudioButton" onclick="playAudio()">▶️ Play Audio</button>
      <button id="nextButton" class="hide" onclick="nextPhrase()">Next</button>
      <button id="checkButton" class="hide" onclick="checkAnswer()">Check</button>
    </div>
    <div class="keyboard-container"></div>
    
    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3>🏆 Top 5 Leaderboard 🏆</h3>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
    </div>
  </div>

<script>
    let currentPhraseIndex = 0;
    let exercisePhrases = [];
    let allPhrases = [];
    let totalPhrases = 10;
    
    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwALbtkSM3Q5dWjKSBaGTC6wdVxi8h0wWsZYsK0Ww0yhmQOqJndgV7CuJ-7PJXwIr9kVQ/exec"; 
    const GAME_NAME = "Listen"; 

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
        document.querySelector('.on-screen-title').textContent = "⚠️ No CSV URL provided.";
    } else {
        document.querySelector('.on-screen-title').textContent = "Loading vocabulary...";
        
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const proxiedSheetUrl = proxyUrl + encodeURIComponent(sheetUrl);

        Papa.parse(proxiedSheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.errors.length) {
                    document.querySelector('.on-screen-title').textContent = "⚠️ Error parsing the CSV file.";
                    console.error("PapaParse Errors:", results.errors);
                    return;
                }

                results.data.forEach(row => {
                    const word = row["French"] || row["English"] || "";
                    if (word.trim()) {
                        allPhrases.push(word.trim());
                    }
                });

                if (allPhrases.length === 0) {
                    document.querySelector('.on-screen-title').textContent = "⚠️ No data found. Check your sheet has a 'French' or 'English' column.";
                    return;
                }

                document.querySelector('.on-screen-title').textContent = "Type what you hear";
                initialize();
            },
            error: function(err) {
                document.querySelector('.on-screen-title').textContent = "⚠️ Error loading the CSV file.";
                console.error("Network or CORS Error:", err);
            }
        });
    }

    function normalizeApostrophes(text) {
        if (typeof text !== 'string') return '';
        return text.replace(/’/g, "'");
    }

    function initialize() {
        generateExercisePhrases();
        startTimer();
        updateCounter();
        generateExercise();
        updateKeyboard();
        document.getElementById('textInput').focus();
    }

    function generateKeyboard(language) {
        const keyboardContainer = document.querySelector('.keyboard-container');
        keyboardContainer.innerHTML = '';
        let specialChars = [];
        switch (language) {
          case 'french':
            specialChars = ['à', 'â', 'ä', 'é', 'è', 'ê', 'ë', 'î', 'ï', 'ô', 'ö', 'ù', 'ü', 'û', 'ç'];
            break;
          case 'german':
            specialChars = ['ä', 'ö', 'ü', 'ß'];
            break;
          case 'spanish':
            specialChars = ['á', 'é', 'í', 'ó', 'ú', 'ñ'];
            break;
        }
        specialChars.forEach(function (char) {
            const button = document.createElement('button');
            button.textContent = char;
            button.className = 'keyboard-button';
            button.setAttribute('onclick', `insertLetter('${char}')`);
            keyboardContainer.appendChild(button);
        });
    }

    function insertLetter(letter) {
        const input = document.getElementById('textInput');
        const start = input.selectionStart;
        const end = input.selectionEnd;
        input.value = input.value.substring(0, start) + letter + input.value.substring(end);
        input.selectionStart = input.selectionEnd = start + 1;
        input.focus();
    }

    function generateExercisePhrases() {
        const shuffledPhrases = [...allPhrases].sort(() => Math.random() - 0.5);
        totalPhrases = Math.min(10, allPhrases.length);
        exercisePhrases = shuffledPhrases.slice(0, totalPhrases);
    }

    function generateExercise() {
        const textInput = document.getElementById('textInput');
        textInput.value = '';
        textInput.disabled = false;
        textInput.classList.remove('hide');
        document.getElementById('checkButton').classList.remove('hide');
        document.getElementById('nextButton').classList.add('hide');
        document.getElementById('feedback').classList.add('hide');
        textInput.focus();
        playAudio();
    }

    function checkAnswer() {
        const userInput = document.getElementById('textInput').value.trim();
        const correctAnswer = exercisePhrases[currentPhraseIndex];
        const feedbackEl = document.getElementById('feedback');
        const textInput = document.getElementById('textInput');
        
        if (!userInput) return;

        const normalizedUserInput = normalizeApostrophes(userInput).toLowerCase();
        const normalizedCorrectAnswer = normalizeApostrophes(correctAnswer).toLowerCase();

        if (normalizedUserInput === normalizedCorrectAnswer) {
            feedbackEl.textContent = 'Correct!';
            feedbackEl.style.color = 'green';
            textInput.disabled = true;
            document.getElementById('checkButton').classList.add('hide');
            
            if (currentPhraseIndex < totalPhrases - 1) {
                document.getElementById('nextButton').classList.remove('hide');
            } else {
                stopTimer();
                const endTime = new Date().getTime();
                const timeTaken = ((endTime - startTime) / 1000).toFixed(2);

                // Clean game interface elements on completion
                document.querySelector('.on-screen-title').textContent = `🎉 Completed in ${timeTaken}s!`;
                textInput.classList.add('hide');
                feedbackEl.classList.add('hide');
                document.querySelector('.stats-container').style.display = 'none';
                document.querySelector('.keyboard-container').style.display = 'none';
                document.getElementById('controlsContainer').style.display = 'none';

                checkQualificationAndLoad(timeTaken);
            }
        } else {
            feedbackEl.style.color = 'darkorange';
            
            let correctPrefixLength = 0;
            for (let i = 0; i < normalizedUserInput.length; i++) {
                if (i < normalizedCorrectAnswer.length && normalizedUserInput[i] === normalizedCorrectAnswer[i]) {
                    correctPrefixLength++;
                } else {
                    break;
                }
            }

            const hint = correctAnswer.substring(0, correctPrefixLength + 1);
            feedbackEl.textContent = `Not quite! Hint: ${hint}...`;
        }
        feedbackEl.classList.remove('hide');
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            if (!document.getElementById('checkButton').classList.contains('hide')) {
                checkAnswer();
            } else if (!document.getElementById('nextButton').classList.contains('hide')) {
                nextPhrase();
            } else if (!document.getElementById('resetButton').classList.contains('hide')) {
                resetExercise();
            }
        }
    }

    function nextPhrase() {
        currentPhraseIndex++;
        if (currentPhraseIndex < totalPhrases) {
            generateExercise();
            updateCounter();
        }
    }

    function resetExercise() {
        currentPhraseIndex = 0;
        generateExercisePhrases();
        generateExercise();
        document.getElementById('resetButton').classList.add('hide');
        updateCounter();
        startTimer();
    }

    function updateCounter() {
        const counterElement = document.getElementById('counter');
        counterElement.textContent = `${currentPhraseIndex + 1} / ${totalPhrases}`;
    }

    let timerInterval;
    let startTime;
    function startTimer() {
        stopTimer();
        startTime = new Date().getTime();
        timerInterval = setInterval(updateTimer, 1000);
        updateTimer();
    }
    function stopTimer() {
        clearInterval(timerInterval);
    }
    function updateTimer() {
        const currentTime = new Date().getTime();
        const elapsedTime = currentTime - startTime;
        const minutes = Math.floor(elapsedTime / (1000 * 60));
        const seconds = Math.floor((elapsedTime % (1000 * 60)) / 1000);
        document.getElementById("timer").textContent = `${minutes}m ${seconds}s`;
    }

    function playAudio() {
        if (!exercisePhrases[currentPhraseIndex]) return;
        const speechSynthesis = window.speechSynthesis;
        speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(exercisePhrases[currentPhraseIndex]);
        const selectedLanguage = document.getElementById('languageSelect').value;

        switch (selectedLanguage) {
            case 'french': utterance.lang = 'fr-FR'; break;
            case 'german': utterance.lang = 'de-DE'; break;
            case 'spanish': utterance.lang = 'es-ES'; break;
            default: utterance.lang = 'en-US'; break;
        }
        utterance.rate = 0.7;
        speechSynthesis.speak(utterance);
    }
    
    function updateKeyboard() {
        const selectedLanguage = document.getElementById('languageSelect').value;
        generateKeyboard(selectedLanguage);
    }

    // Smart qualification validation background logic
    function checkQualificationAndLoad(time) {
        const list = document.getElementById('leaderboardList');
        const section = document.getElementById('leaderboardSection');
        
        list.innerHTML = "<li>Loading board profiles... ⏳</li>";
        section.style.display = "block";

        // Quietly check current placement positions
        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            // Evaluates true if list has open rooms (< 5 logs) OR performance clears the 5th place
            let qualifies = data.length < 5 || parseFloat(time) < data[data.length - 1].time;
            
            if (qualifies) {
                let studentName = prompt("🏆 Outstanding! You made the Top 5! Enter your name:");
                if (!studentName) studentName = "Anonymous";
                
                list.innerHTML = "<li>Saving your spot... ⏳</li>";
                
                // Fire POST updates
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(time)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, time);
                });
            } else {
                // Instantly skips input fields if performance falls to 6th rank+
                renderLeaderboardRows(data, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            list.innerHTML = "<li>Error connecting to records database.</li>";
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime) {
        const list = document.getElementById('leaderboardList');
        const section = document.getElementById('leaderboardSection');
        list.innerHTML = "";
        
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '22px';
            rankHeader.style.textAlign = 'center';
            section.insertBefore(rankHeader, list);
        }

        if (highlightName) {
            let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime)) + 1;
            rankHeader.style.color = '#2ecc71';
            rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
        } else {
            rankHeader.style.color = '#e67e22';
            rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
        }

        data.forEach((entry) => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${entry.name}</strong> — ${entry.time}s`;
            if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime)) {
                li.style.backgroundColor = '#cef4ce';
                li.style.padding = '2px 5px';
                li.style.borderRadius = '5px';
            }
            list.appendChild(li);
        });
    }
</script>
</body>
</html>
