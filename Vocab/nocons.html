<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No consonants</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        width: 100%;
        max-width: 800px;
        padding: 40px;
        box-sizing: border-box;
        font-size: 16px;
        background-color: white;
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .title { font-size: 40px; font-weight: bold; text-align: center; margin-bottom: 20px; }
    .subtitle { font-size: 20px; margin-bottom: 10px; text-align: center; }
    .counter { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 10px; }
    .english-sentence { font-size: 24px; text-align: center; margin-bottom: 20px; padding: 10px 20px; border-radius: 10px; background-color: #eee; }
    .french-sentence { font-size: 30px; text-align: center; margin-bottom: 20px; word-spacing: 20px; }
    .missing-word { width: 25px; font-size: 30px; border: none; border-bottom: 1px solid #000; background: transparent; text-align: center; margin-right: 2px; }
    .correct { background-color: #cef4ce; }
    .incorrect { background-color: #ffb6c19c; }
    .keyboard-container { text-align: center; margin-top: 20px; }
    .keyboard-button { font-size: 18px; padding: 10px 15px; margin: 2px; border: none; border-radius: 10px; background-color: #eee; cursor: pointer; }
    .keyboard-button:hover { background-color: #A9A9A9; transform: translateY(-4px); }
    .feedback { font-weight: bold; font-size: 24px; display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 10px; }
    #nextButton { padding: 10px 20px; border-radius: 10px; border: 2px solid #ccc; background: #f9f9f9; cursor: pointer; display: none; font-size: 24px;}
    .leaderboard-box { margin-top: 25px; text-align: center; border-top: 2px solid #eee; padding-top: 20px; }
    .leaderboard-list { display: inline-block; text-align: left; font-size: 18px; padding-left: 20px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
    <div class="title">No consonants</div>
    <div class="subtitle" id="gameSubtitle">Fill in the missing consonants</div>
    <div class="counter" id="sentenceCounter"></div>
    <div class="english-sentence" id="englishSentence"></div>
    <div class="french-sentence" id="frenchSentence"></div>
    <div id="keyboardContainer" class="keyboard-container"></div>
    <div id="feedback" class="feedback" style="display:none;">
        <span>Correct ✅</span>
        <button id="nextButton">Next</button>
    </div>

    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3>🏆 Top 5 Leaderboard 🏆</h3>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
    </div>
</div>

<script>
let sentencePairs = [];
let exerciseSentences = [];
let currentIndex = 0;
let lastFocusedInput = null;

let totalConsonantsCount = 0;
let totalInputAttempts = 0;

const consonants = /[bcdfghjklmnpqrstvwxyzßçñBCDFGHJKLMNPQRSTVWXYZ]/;

// --- LEADERBOARD CONFIGURATION ---
const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwkxF_dLYp8k1YTs6rkk3Icfpj9WVM4SL5yPCyUVuLh-RlMitzW_9lz8wb6lYa4PoiWtg/exec"; 
const GAME_NAME = "No Consonants"; 
let startTime;

const params = new URLSearchParams(window.location.search);
const csvUrl = params.get('sheet');

function getSpreadsheetId(url) {
    if (!url) return null;
    if (url.includes('/d/e/')) {
        const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return matches ? matches[1] : url;
}
const topicId = csvUrl ? getSpreadsheetId(csvUrl) : null;

if(!csvUrl){
    document.getElementById('englishSentence').textContent = "⚠️ No CSV URL provided in query string.";
}

Papa.parse(csvUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results){
        results.data.forEach(row => {
            if(row.French && row.English){
                sentencePairs.push({ french: row.French.trim(), english: row.English.trim() });
            }
        });
        if(sentencePairs.length === 0){
            document.getElementById('englishSentence').textContent = "⚠️ No valid French/English data found!";
            return;
        }

        exerciseSentences = sentencePairs.sort(() => 0.5 - Math.random()).slice(0,10);
        currentIndex = 0;
        totalConsonantsCount = 0;
        totalInputAttempts = 0;
        generateSentence();
        generateKeyboard(); 
        startTime = Date.now();
    },
    error: function(err){
        console.error(err);
        document.getElementById('englishSentence').textContent = "⚠️ CSV load error: " + err;
    }
});

function generateSentence(){
    if(currentIndex >= exerciseSentences.length){
        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const totalMinutes = parseFloat((totalSeconds / 60).toFixed(2));
        
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        
        const accuracy = Math.min(100, Math.round((totalConsonantsCount / Math.max(totalConsonantsCount, totalInputAttempts)) * 100));

        document.getElementById('frenchSentence').textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        
        document.getElementById('gameSubtitle').style.display = "none";
        document.getElementById('englishSentence').style.display = "none";
        document.getElementById('sentenceCounter').style.display = "none";
        document.getElementById('feedback').style.display = "none";
        if(document.getElementById('keyboardContainer')) {
            document.getElementById('keyboardContainer').style.display = "none";
        }

        checkQualificationAndLoad(totalMinutes, accuracy);
        return;
    }

    const sentence = exerciseSentences[currentIndex].french;
    document.getElementById('englishSentence').textContent = exerciseSentences[currentIndex].english;
    const sentenceDiv = document.getElementById('frenchSentence');
    sentenceDiv.innerHTML = '';

    for(let i=0; i<sentence.length; i++){
        const char = sentence[i];
        if(consonants.test(char)){
            totalConsonantsCount++;
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'missing-word';
            input.dataset.index = i;
            input.addEventListener('input', validateInput);
            input.addEventListener('focus', () => { lastFocusedInput = input; });
            input.addEventListener('keydown', handleKeydown);
            sentenceDiv.appendChild(input);
        } else {
            const span = document.createElement('span');
            span.textContent = char;
            sentenceDiv.appendChild(span);
        }
    }

    document.getElementById('sentenceCounter').textContent = ` ${currentIndex+1} / ${exerciseSentences.length}`;
    document.getElementById('feedback').style.display = "none";
    
    const firstInput = sentenceDiv.querySelector('.missing-word');
    if(firstInput) {
        setTimeout(() => {
            firstInput.focus();
            lastFocusedInput = firstInput;
        }, 50);
    }
}

function validateInput(e){
    const input = e.target;
    const sentence = exerciseSentences[currentIndex].french;
    const correctChar = sentence[input.dataset.index];

    if (input.value !== '') {
        totalInputAttempts++;
    }

    if(input.value.toLowerCase() === correctChar.toLowerCase()){
        input.classList.add('correct');
        input.classList.remove('incorrect');
    } else {
        input.classList.add('incorrect');
        input.classList.remove('correct');
    }

    if(input.value.length === 1){
        let nextInput = input.nextElementSibling;
        while(nextInput && !nextInput.classList.contains('missing-word')){
            nextInput = nextInput.nextElementSibling;
        }
        if(nextInput) nextInput.focus();
    }

    const allInputs = document.querySelectorAll('.missing-word');
    const allCorrect = Array.from(allInputs).every(inp => inp.classList.contains('correct'));
    if(allCorrect){
        document.getElementById('feedback').style.display = "flex";
        document.getElementById('nextButton').style.display = "inline-block";
    }
}

function handleKeydown(e){
    if(e.key === "Backspace"){
        const input = e.target;
        if(input.value === ''){
            e.preventDefault();
            let prevInput = input.previousElementSibling;
            while(prevInput && !prevInput.classList.contains('missing-word')){
                prevInput = prevInput.previousElementSibling;
            }
            if(prevInput){
                prevInput.focus();
                prevInput.value = '';
                prevInput.classList.remove('correct','incorrect');
            }
        }
    } 
    else if(e.key === "Enter"){
        const allInputs = document.querySelectorAll('.missing-word');
        const allCorrect = Array.from(allInputs).every(inp => inp.classList.contains('correct'));
        
        if(allCorrect){
            e.preventDefault();
            currentIndex++;
            generateSentence();
        }
    }
}

document.getElementById('nextButton').addEventListener('click', () => {
    currentIndex++;
    generateSentence();
});

function generateKeyboard(){
    const container = document.getElementById('keyboardContainer');
    container.innerHTML = '';
    const chars = ['ß', 'ç', 'ñ'];

    chars.forEach(c => {
        const btn = document.createElement('button');
        btn.textContent = c;
        btn.className = 'keyboard-button';
        btn.type = 'button';
        btn.onclick = () => {
            if(lastFocusedInput){
                const pos = lastFocusedInput.selectionStart;
                const val = lastFocusedInput.value;
                lastFocusedInput.value = val.slice(0,pos) + c + val.slice(pos);
                lastFocusedInput.setSelectionRange(pos+1,pos+1);
                lastFocusedInput.focus();
                lastFocusedInput.dispatchEvent(new Event('input'));
            }
        };
        container.appendChild(btn);
    });
}

function formatTimeDisplay(minutesVal) {
    if (minutesVal === undefined || minutesVal === null) return "";
    const totalSecs = Math.round(parseFloat(minutesVal) * 60);
    const m = Math.floor(totalSecs / 60);
    const s = totalSecs % 60;
    return `${m}m ${s}s`;
}

function checkQualificationAndLoad(timeMinutes, accuracy) {
    const list = document.getElementById('leaderboardList');
    const section = document.getElementById('leaderboardSection');
    
    list.innerHTML = "<li>Loading board profiles... ⏳</li>";
    section.style.display = "block";

    fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
    .then(res => res.json())
    .then(data => {
        let tempBoard = [...data];
        let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
        tempBoard.push(newAttempt);
        tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
        
        let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

        if (playerRank <= 5) {
            let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
            if (!studentName) studentName = "Anonymous";
            
            list.innerHTML = "<li>Saving your spot... ⏳</li>";
            
            fetch(LEADERBOARD_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    topicId: topicId,
                    game: GAME_NAME,
                    name: studentName,
                    time: parseFloat(timeMinutes),
                    accuracy: parseFloat(accuracy)
                })
            })
            .then(res => res.json())
            .then(updatedData => {
                renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
            });
        } else {
            renderLeaderboardRows(data, null, null, null);
        }
    })
    .catch(err => {
        console.error("Leaderboard loading failure:", err);
        list.innerHTML = "<li>Error connecting to records database.</li>";
    });
}

function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
    const list = document.getElementById('leaderboardList');
    const section = document.getElementById('leaderboardSection');
    list.innerHTML = "";
    
    let rankHeader = document.getElementById('personalRankTitle');
    if(!rankHeader) {
        rankHeader = document.createElement('h4');
        rankHeader.id = 'personalRankTitle';
        rankHeader.style.fontSize = '22px';
        section.insertBefore(rankHeader, list);
    }

    if (highlightName) {
        let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
        rankHeader.style.color = '#2ecc71';
        rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
    } else {
        rankHeader.style.color = '#e67e22';
        rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
    }

    data.forEach((entry) => {
        const li = document.createElement('li');
        const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
        const timeFormatted = formatTimeDisplay(entry.time);
        
        li.innerHTML = `<strong>${entry.name}</strong> — ${accVal}% Accuracy | ${timeFormatted}`;
        if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
            li.style.backgroundColor = '#cef4ce';
            li.style.padding = '2px 5px';
            li.style.borderRadius = '5px';
        }
        list.appendChild(li);
    });
}
</script>
</body>
</html>
