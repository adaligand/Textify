<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No vowels</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5; /* Light grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        width: 100%;
        max-width: 800px; /* Set a max-width for larger screens */
        padding: 40px;
        box-sizing: border-box;
        font-size: 16px;
        background-color: white; /* White background for the game area */
        border-radius: 15px; /* Rounded corners */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
    }
    .title { font-size: 40px; font-weight: bold; text-align: center; margin-bottom: 20px; }
    .subtitle { font-size: 20px; margin-bottom: 10px; text-align: center; }
    .counter { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 10px; }
    .english-word { display:block; margin: 0 auto 20px; font-size: 24px; padding: 10px 20px; border-radius: 10px; background-color: #eee; text-align: center; }
    .french-word {
        font-size: 30px;
        text-align: center;
        margin-bottom: 20px;
        word-spacing: 20px; /* increase space between words */
    }

    .missing-word { width: 15px; font-size: 25px; border: none; border-bottom: 1px solid #000; background: transparent; text-align: center; margin-right: 2px; }
    .correct { background-color: #cef4ce; }
    .incorrect { background-color: #ffb6c19c; }
    .keyboard-container { text-align: center; margin-top: 20px; }
    .keyboard-button { font-size: 18px; padding: 10px 15px; margin: 2px; border: none; border-radius: 10px; background-color: #f0f0f0; color: #000; cursor: pointer; }
    .keyboard-button:hover { background-color: #A9A9A9; transform: translateY(-4px); }
    select { width: 20%; padding: 5px; border-radius: 10px; margin: 10px auto; height: 35px; display: block; }
    .feedback { font-weight: bold; font-size: 24px; display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 10px; }
    #nextButton { padding: 10px 20px; border-radius: 10px; border: 2px solid #ccc; background: #f9f9f9; cursor: pointer; display: none; font-size: 24px;}
    
    /* Leaderboard Layout styles */
    .leaderboard-box { margin-top: 25px; text-align: center; border-top: 2px solid #eee; padding-top: 20px; }
    .leaderboard-list { display: inline-block; text-align: left; font-size: 18px; padding-left: 20px; }
</style>
</head>
<body>
<div class="container">
    <div class="title">No vowels</div>
    <div class="subtitle">Fill in the missing vowels</div>
    <div class="counter" id="wordCounter"></div>
    <div class="english-word" id="englishWord"></div>
    <div class="french-word" id="frenchWord"></div>
    <div id="keyboardContainer" class="keyboard-container"></div>
    <select id="languageSelect">
        <option value="french" selected>French</option>
        <option value="german">German</option>
        <option value="spanish">Spanish</option>
    </select>
    <div id="feedback" class="feedback" style="display:none;">
        <span>Correct ✅</span>
        <button id="nextButton" onclick="nextText()">Next</button>
    </div>

    <!-- Leaderboard moved outside of the feedback div so it displays cleanly -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3>🏆 Top 10 Leaderboard 🏆</h3>
        <ol id="leaderboardList" class="leaderboard-list"></ol>
    </div>
</div>

<script>
let vocabList = [];
let exerciseWords = [];
let currentIndex = 0;
let lastFocusedInput = null;
const vowels = ['a','e','i','o','u','à','â','ä','é','è','ê','ë','î','ï','ô','ö','ù','ü','û','á','é','í','ó','ú'];

// --- LEADERBOARD CONFIGURATION ---
const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbzbWEKsFz1UM4qrXVk6uztvj0lcbLk771__5P3yq1ej3rvn2RJosem5RimqRZCkkbWHfw/exec"; 
const GAME_NAME = "No_Vowels"; 
let startTime;

const params = new URLSearchParams(window.location.search);
const sheetUrl = params.get('sheet'); //[cite: 1]

// Automatically extracts the unique spreadsheet ID from your long URL
function getSpreadsheetId(url) {
    const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return matches ? matches[1] : url;
}
const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

if(!sheetUrl){ alert("No sheet URL provided!"); }

Papa.parse(sheetUrl, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: function(results){
        results.data.forEach(row => {
            if(row.French && row.English){
                vocabList.push({ french: row.French.trim(), english: row.English.trim() });
            }
        });
        if(vocabList.length === 0){ alert("No items found in columns A/B!"); return; }

        // Pick 10 random words
        exerciseWords = vocabList.sort(() => 0.5 - Math.random()).slice(0,10);
        currentIndex = 0;
        generateExercise();
        generateKeyboard('french');
        startTime = Date.now(); // Starts tracking the timer
    },
    error: function(err){ console.error(err); alert("CSV load error: " + err); }
});

function generateExercise(){
    if(currentIndex >= exerciseWords.length){
        const endTime = Date.now();
        const timeTaken = ((endTime - startTime) / 1000).toFixed(2); // Convert to seconds

        document.getElementById('frenchWord').textContent = `🎉 Completed in ${timeTaken}s!`;
        document.getElementById('englishWord').textContent = "";
        document.getElementById('feedback').style.display="none";
        document.getElementById('wordCounter').textContent = "";
        if(document.getElementById('keyboardContainer')) document.getElementById('keyboardContainer').style.display = "none";

        // Prompt student for their name
        setTimeout(() => {
            let studentName = prompt("Enter your name for the leaderboard:");
            if(!studentName) studentName = "Anonymous";
            submitAndLoadLeaderboard(studentName, timeTaken);
        }, 500);
        return;
    }

    const word = exerciseWords[currentIndex].french;
    document.getElementById('englishWord').textContent = exerciseWords[currentIndex].english;
    const wordDiv = document.getElementById('frenchWord');
    wordDiv.innerHTML = "";

    for(let i=0; i<word.length; i++){
        const char = word[i];
        if(vowels.includes(char.toLowerCase())){
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'missing-word';
            input.dataset.index = i;
            input.addEventListener('input', validateInput);
            input.addEventListener('focus', () => { lastFocusedInput = input; });
            input.addEventListener('keydown', handleBackspace);
            wordDiv.appendChild(input);
        } else {
            const span = document.createElement('span');
            span.textContent = char;
            wordDiv.appendChild(span);
        }
    }

    document.getElementById('feedback').style.display="none";
    document.getElementById('nextButton').style.display="none";
    document.getElementById('wordCounter').textContent = `${currentIndex+1} / ${exerciseWords.length}`;
}

// Handle input validation and cursor movement
function validateInput(e){
    const input = e.target;
    const word = exerciseWords[currentIndex].french;
    const correctChar = word[input.dataset.index].toLowerCase();

    if(input.value.toLowerCase() === correctChar){
        input.classList.add('correct');
        input.classList.remove('incorrect');
    } else {
        input.classList.add('incorrect');
        input.classList.remove('correct');
    }

    // Move cursor to next input automatically
    if(input.value.length === 1){
        let nextInput = input.nextElementSibling;
        while(nextInput && !nextInput.classList.contains('missing-word')){
            nextInput = nextInput.nextElementSibling;
        }
        if(nextInput){ nextInput.focus(); }
    }

    // Check if all inputs correct
    const allInputs = document.querySelectorAll('.missing-word');
    let allCorrect = true;
    allInputs.forEach(inp => { if(!inp.classList.contains('correct')) allCorrect = false; });

    if(allCorrect){
        document.getElementById('feedback').style.display="flex";
        document.getElementById('nextButton').style.display="inline-block";
    }
}

// Handle backspace to move to previous input
function handleBackspace(e){
    if(e.key === "Backspace"){
        e.preventDefault(); // Prevent default backspace behavior
        const input = e.target;
        input.value = '';
        input.classList.remove('correct', 'incorrect');

        // Move to previous input
        let prevInput = input.previousElementSibling;
        while(prevInput && !prevInput.classList.contains('missing-word')){
            prevInput = prevInput.previousElementSibling;
        }
        if(prevInput){
            prevInput.focus();
            prevInput.value = '';
            prevInput.classList.remove('correct', 'incorrect');
        }
    }
}

function nextText(){
    currentIndex++;
    generateExercise();
}

function generateKeyboard(language){
    const container = document.getElementById('keyboardContainer');
    container.innerHTML = '';
    let chars = [];
    switch(language){
        case 'french': chars=['à','â','ä','é','è','ê','ë','î','ï','ô','ö','ù','ü','û','ç']; break;
        case 'german': chars=['ä','ö','ü','ß']; break;
        case 'spanish': chars=['á','é','í','ó','ú','ñ']; break;
    }
    chars.forEach(c => {
        const btn = document.createElement('button');
        btn.textContent = c;
        btn.className = 'keyboard-button';
        btn.type = 'button';
        btn.onclick = () => {
            if(lastFocusedInput){
                const pos = lastFocusedInput.selectionStart;
                const val = lastFocusedInput.value;
                lastFocusedInput.value = val.slice(0,pos) + c + val.slice(pos);
                lastFocusedInput.setSelectionRange(pos+1,pos+1);
                lastFocusedInput.focus();
                lastFocusedInput.dispatchEvent(new Event('input'));
            }
        };
        container.appendChild(btn);
    });
}

document.getElementById('languageSelect').addEventListener('change', (e) => {
    generateKeyboard(e.target.value);
});

// Sends the data securely to your Google Sheet master endpoint
function submitAndLoadLeaderboard(name, time) {
    fetch(LEADERBOARD_API_URL, {
        method: "POST",
        body: JSON.stringify({
            topicId: topicId,
            game: GAME_NAME,
            name: name,
            time: parseFloat(time)
        })
    })
    .then(() => {
        return fetch(`${LEADERBOARD_API_URL}?topicId=${encodeURIComponent(topicId)}&game=${encodeURIComponent(GAME_NAME)}`);
    })
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById('leaderboardList');
        const section = document.getElementById('leaderboardSection');
        list.innerHTML = "";
        
        // Find what rank the student achieved in the overall list
        let studentRank = data.findIndex(entry => entry.name === name && entry.time === parseFloat(time)) + 1;
        if (studentRank === 0) studentRank = "Calculated..."; 

        // Create or update a heading showing their personal rank achievement
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.color = '#2ecc71';
            rankHeader.style.fontSize = '22px';
            section.insertBefore(rankHeader, list);
        }
        rankHeader.textContent = `🎯 You achieved Rank #${studentRank} out of ${data.length} players!`;

        // Render only the Top 10 historical scores in the leaderboard box
        const topTen = data.slice(0, 10);
        topTen.forEach((entry, index) => {
            const li = document.createElement('li');
            li.innerHTML = `<strong>${entry.name}</strong> — ${entry.time}s`;
            
            // Highlight the student's current run in the list if they made the top 10
            if ((index + 1) === studentRank) {
                li.style.backgroundColor = '#cef4ce';
                li.style.padding = '2px 5px';
                li.style.borderRadius = '5px';
            }
            list.appendChild(li);
        });
        
        section.style.display = "block";
    })
    .catch(err => {
        console.error("Leaderboard transmission error:", err);
        alert("Could not connect to the leaderboard database. Check your web app permissions setup!");
    });
}
</script>
</body>
</html>
