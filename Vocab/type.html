<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translationx</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      box-sizing: border-box;
      background-color: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .on-screen-title {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }
    #counter {
        font-size: 24px;
        font-weight: bold;
        color: #666;
        margin-bottom: 20px;
    }
    .hide { 
        display: none; 
    }
    
    .input-area {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    #textInput { 
        font-size: 24px; 
        padding: 10px; 
        width: 100%;
        max-width: 350px;
        border-radius: 12px;
        border: 2px solid #ddd;
        margin-bottom: 0;
    }
     #textInput:focus {
        border-color: #333;
        outline: none;
    }
    button {
        font-size: 20px; 
        padding: 10px; 
        margin: 5px; 
        cursor: pointer; 
        border-radius: 10px;
        border: 2px solid #ccc;
        background-color: #f0f0f0;
        transition: all 0.2s ease-in-out;
    }
    button:hover {
      background-color: #A9A9A9;
      transform: translateY(-4px);
    }
    #exerciseOutput { 
        font-size: 28px; 
        font-weight: bold; 
        margin: 20px 0; 
        color: #333;
        padding: 15px;
        background-color: #f8f9fa;
        border-radius: 12px;
    }
     #feedback {
        font-size: 20px;
        font-weight: bold;
        min-height: 24px;
        margin: 15px 0;
    }
    .keyboard-container-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      gap: 15px;
    }
    
    .keyboard-button {
      font-size: 18px;
      padding: 10px 15px;
      margin: 2px;
      border: none;
      border-radius: 10px;
      background-color: #f0f0f0;
      color: #000000;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s, transform 0.2s;
    }
    .keyboard-button:hover {
      background-color: #A9A9A9;
      transform: translateY(-4px);
    }
    #languageSelect {
      width: auto;
      padding: 5px 10px;
      border-radius: 12px;
      height: 50px;
      font-size: 18px;
      border: 2px solid #ddd;
    }
    
    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
        margin-top: 25px;
        text-align: center;
        border-top: 2px solid #eee;
        padding-top: 20px;
    }

    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 16px;
        background-color: #fafafa;
        color: #333;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
        padding: 10px 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
        background-color: #f1f3f5;
        color: #333;
        font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
        border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
        background-color: #d4edda !important;
        color: #155724 !important;
        font-weight: bold;
    }

    .btn {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f9f9f9;
        border: 2px solid #ccc;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        margin: 20px 5px 5px 5px;
        transition: transform 0.2s, background-color 0.2s;
        font-family: Arial, sans-serif;
    }
    .btn:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="on-screen-title" id="gameTitle">Translate the word</div>
    
    <div id="counter"></div>
    
    <div id="exerciseOutput">Loading...</div>

    <div class="input-area" id="inputAreaContainer">
        <input type="text" id="textInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="handleKeyPress(event)">
        <button id="checkButton" onclick="checkAnswer()">Check</button>
        <button id="nextButton" class="hide" onclick="nextPhrase()">Next</button>
        <button id="resetButton" class="hide" onclick="resetExercise()">Reset</button>
    </div>

    <div id="feedback"></div>

    <div class="keyboard-container-wrapper" id="keyboardWrapper">
      <div id="keyboardContainer"></div>
      <select id="languageSelect" onchange="generateKeyboard(this.value)">
        <option value="french">French</option>
        <option value="german">German</option>
        <option value="spanish">Spanish</option>
      </select>
    </div>

    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
        <div id="leaderboardStatus"></div>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Accuracy</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="restartBtn" class="btn" onclick="restartGame()">🔄 Start Again</button>
    </div>
  </div>

  <script>
    let currentIndex = 0;
    let englishWords = [];
    let translations = [];
    let totalAttempts = 0;

    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec"; 
    const GAME_NAME = "Type"; 
    let startTime;

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
        document.getElementById('gameTitle').textContent = "⚠️ No CSV URL provided.";
        document.getElementById('exerciseOutput').textContent = '';
    } else {
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if (results.errors.length) {
                    document.getElementById('gameTitle').textContent = "⚠️ Error parsing CSV.";
                    console.error("CSV Parsing Errors:", results.errors);
                    return;
                }
                
                let allEnglishWords = [];
                let allTranslations = [];

                results.data.forEach(row => {
                    const englishWord = row["English"];
                    const frenchWord = row["French"];
                    if (englishWord && frenchWord && englishWord.trim() && frenchWord.trim()) {
                        allEnglishWords.push(englishWord.trim());
                        allTranslations.push(frenchWord.trim());
                    }
                });

                if (allEnglishWords.length === 0) {
                    document.getElementById('gameTitle').textContent = "⚠️ No data found. Check your sheet has 'English' and 'French' columns.";
                    return;
                }
                
                englishWords = allEnglishWords;
                translations = allTranslations;
                
                restartGame();
            },
            error: function(err) {
                document.getElementById('gameTitle').textContent = "⚠️ Error loading the CSV file.";
                console.error("Error fetching or parsing CSV:", err);
            }
        });
    }

    function normalizeApostrophes(text) {
        if (typeof text !== 'string') return '';
        return text.replace(/’/g, "'");
    }

    function shuffleAndStart() {
        let combined = englishWords.map((e, i) => ({ english: e, translation: translations[i] }));
        combined.sort(() => Math.random() - 0.5);
        
        let exercisePairs = combined.slice(0, 10);
        
        englishWords = exercisePairs.map(pair => pair.english);
        translations = exercisePairs.map(pair => pair.translation);

        currentIndex = 0;
    }

    function restartGame() {
        document.getElementById('gameTitle').style.display = "block";
        document.getElementById('gameTitle').textContent = "Translate the word";
        document.getElementById('counter').style.display = "block";
        document.getElementById('inputAreaContainer').style.display = "flex";
        document.getElementById('feedback').style.display = "block";
        document.getElementById('keyboardWrapper').style.display = "flex";
        document.getElementById('leaderboardSection').style.display = "none";

        initialize();
    }

    function initialize() {
        shuffleAndStart();
        totalAttempts = 0;
        updateCounter();
        generateExercise();
        generateKeyboard('french');
        document.getElementById('textInput').focus();
        startTime = Date.now(); 
    }

    function updateCounter() {
        const counterElement = document.getElementById('counter');
        counterElement.textContent = `${currentIndex + 1} / ${englishWords.length}`;
    }

    function generateExercise() {
      document.getElementById('exerciseOutput').textContent = englishWords[currentIndex];
      
      const inputEl = document.getElementById('textInput');
      inputEl.value = '';
      inputEl.readOnly = false;
      
      document.getElementById('feedback').textContent = '';
      document.getElementById('checkButton').classList.remove('hide');
      document.getElementById('nextButton').classList.add('hide');
      inputEl.focus();
    }

    function checkAnswer() {
        totalAttempts++;
        const userInput = document.getElementById('textInput').value.trim();
        const correctAnswer = translations[currentIndex];
        const feedbackEl = document.getElementById('feedback');

        const normalizedUserInput = normalizeApostrophes(userInput).toLowerCase();
        const normalizedCorrectAnswer = normalizeApostrophes(correctAnswer).toLowerCase();

        if (normalizedUserInput === normalizedCorrectAnswer) {
            feedbackEl.textContent = 'Correct!';
            feedbackEl.style.color = 'green';
            
            document.getElementById('textInput').readOnly = true; 
            document.getElementById('checkButton').classList.add('hide');
            
            if (currentIndex < englishWords.length - 1) {
                document.getElementById('nextButton').classList.remove('hide');
                document.getElementById('textInput').focus();
            } else {
                // Calculate minutes and seconds
                const totalSeconds = Math.round((Date.now() - startTime) / 1000);
                const displayMins = Math.floor(totalSeconds / 60);
                const displaySecs = totalSeconds % 60;

                // Formats time into M.SS clock format (e.g. 34s -> 0.34 | 1m 30s -> 1.30)
                const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);

                const formattedTimeText = `${displayMins}m ${displaySecs}s`;
                const accuracy = Math.min(100, Math.round((englishWords.length / Math.max(englishWords.length, totalAttempts)) * 100));

                document.getElementById('exerciseOutput').textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
                
                document.getElementById('gameTitle').style.display = "none";
                document.getElementById('counter').style.display = "none";
                document.getElementById('inputAreaContainer').style.display = "none";
                document.getElementById('feedback').style.display = "none";
                document.getElementById('keyboardWrapper').style.display = "none";

                // Passes M.SS time value directly to the leaderboard logic
                checkQualificationAndLoad(clockFormattedTime, accuracy);
            }
        } else {
            feedbackEl.style.color = 'darkorange';
            
            let correctPrefixLength = 0;
            for (let i = 0; i < normalizedUserInput.length; i++) {
                if (i < normalizedCorrectAnswer.length && normalizedUserInput[i] === normalizedCorrectAnswer[i]) {
                    correctPrefixLength++;
                } else {
                    break;
                }
            }

            const hint = translations[currentIndex].substring(0, correctPrefixLength + 1);
            feedbackEl.textContent = `Hint: ${hint}...`;
        }
    }

    function nextPhrase() {
      currentIndex++;
      if (currentIndex < englishWords.length) {
        generateExercise();
        updateCounter();
      }
    }

    function resetExercise() {
      currentIndex = 0;
      shuffleAndStart();
      totalAttempts = 0;
      generateExercise();
      updateCounter();
      document.getElementById('resetButton').classList.add('hide');
    }
    
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            if (!document.getElementById('checkButton').classList.contains('hide')) {
                checkAnswer();
            } else if (!document.getElementById('nextButton').classList.contains('hide')) {
                nextPhrase();
            }
        }
    }

    function generateKeyboard(language) {
      const keyboardContainer = document.getElementById('keyboardContainer');
      keyboardContainer.innerHTML = '';
      let characters = [];
      switch (language) {
        case 'french':
          characters = ['à', 'â', 'é', 'è', 'ê', 'ë', 'î', 'ï', 'ô', 'ö', 'ù', 'ü', 'û', 'ç'];
          break;
        case 'german':
          characters = ['ä', 'ö', 'ü', 'ß'];
          break;
        case 'spanish':
          characters = ['á', 'é', 'í', 'ó', 'ú', 'ñ'];
          break;
      }
      characters.forEach(char => {
        const button = document.createElement('button');
        button.textContent = char;
        button.className = 'keyboard-button';
        button.onclick = () => insertLetter(char);
        keyboardContainer.appendChild(button);
      });
    }

    function insertLetter(letter) {
      const input = document.getElementById('textInput');
      if (input.readOnly) return; 
      const start = input.selectionStart;
      const end = input.selectionEnd;
      input.value = input.value.substring(0, start) + letter + input.value.substring(end);
      input.selectionStart = input.selectionEnd = start + 1;
      input.focus();
    }

    // Converts M.SS stored numbers back into text ("Xm Ys") for display
    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader && statusDiv) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            statusDiv.appendChild(rankHeader);
        }

        if (highlightName) {
            let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
            if(rankHeader) {
                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            }
        } else {
            if(rankHeader) {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }
  </script>
</body>
</html>
