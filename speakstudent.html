<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Speakaton - Espace Élève</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; background-color: #f7f9fa; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .text-display { font-size: 24px; line-height: 1.6; margin: 30px 0; }
        .word { display: inline-block; margin-right: 8px; color: #7f8c8d; }
        .word.correct { color: #27ae60; font-weight: bold; }
        .word.current { border-bottom: 3px solid #3498db; color: #2c3e50; }
        button { background-color: #2ecc71; color: white; border: none; padding: 12px 30px; font-size: 18px; border-radius: 25px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
        button:disabled { background-color: #bdc3c7; }
        #score-display { margin-top: 20px; font-size: 20px; font-weight: bold; color: #2c3e50; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Identification Élève</h2>
    <button id="student-auth-btn">Se connecter avant de commencer</button>
</div>

<div id="student-portal" class="card hidden">
    <h1 id="passage-title">Chargement...</h1>
    <p>Cliquez sur le bouton vert et lisez la phrase suivante à haute voix :</p>
    
    <div id="text-container" class="text-display"></div>

    <button id="start-btn" disabled>Chargement...</button>
    <div id="score-display"></div>
</div>

<!-- Firebase App & Firestore (v9 compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Google Identity & API Script -->
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
    // FIREBASE CONFIGURATION
    const firebaseConfig = {
        apiKey: "AIzaSyDnfndrVR5reVNxLc7pGwxp6910_0L5P98",
        authDomain: "speakaton-6b95a.firebaseapp.com",
        projectId: "speakaton-6b95a",
        storageBucket: "speakaton-6b95a.appspot.com",
        messagingSenderId: "162949632188",
        appId: "1:162949632188:web:eb981bcf305b346d99c0b9"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLIENT_ID = '162949632188-fifdjjtug2mqu5uc80r2fdrqfacvkkrg.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/classroom.profile.emails';

    const urlParams = new URLSearchParams(window.location.search);
    const passageId = urlParams.get('passageId');

    let words = [];
    let currentWordIndex = 0;
    let studentName = "Élève";
    let studentEmail = "";

    // GAPI Init
    function gapiStart() {
        gapi.client.init({}).then(() => {
            gapi.client.load('classroom', 'v1');
        });
    }
    gapi.load('client', gapiStart);

    // Google Auth for Student
    const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: (tokenResponse) => {
            if (tokenResponse.access_token) {
                // Fetch student info
                fetch(`https://www.googleapis.com/oauth2/v2/userinfo?access_token=${tokenResponse.access_token}`)
                    .then(res => res.json())
                    .then(data => {
                        studentName = data.name || "Élève";
                        studentEmail = data.email || "";
                        document.getElementById('student-portal').classList.remove('hidden');
                        document.getElementById('student-auth-btn').innerText = "Connecté ✓";
                        loadPassage();
                    });
            }
        },
    });

    document.getElementById('student-auth-btn').onclick = () => {
        tokenClient.requestAccessToken();
    };

    function loadPassage() {
        if (!passageId) return alert("Aucun devoir ciblé.");
        db.collection("passages").doc(passageId).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('passage-title').innerText = data.title;
                setupReading(data.text);
            } else {
                document.getElementById('text-container').innerText = "Devoir introuvable.";
            }
        });
    }

    function setupReading(passageText) {
        words = passageText.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/);
        const textContainer = document.getElementById('text-container');
        textContainer.innerHTML = '';

        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.textContent = word;
            span.className = 'word';
            span.id = `word-${index}`;
            textContainer.appendChild(span);
        });

        const startBtn = document.getElementById('start-btn');
        startBtn.disabled = false;
        startBtn.textContent = "Commencer la lecture";
        updateWordFocus();
    }

    function updateWordFocus() {
        document.querySelectorAll('.word').forEach((span, idx) => {
            span.classList.remove('current');
            if (idx === currentWordIndex) span.classList.add('current');
        });
    }

    // Speech Engine Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Reconnaissance vocale non supportée sur ce navigateur.");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.continuous = true;
        recognition.interimResults = true;

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = () => {
            currentWordIndex = 0;
            document.querySelectorAll('.word').forEach(span => span.className = 'word');
            updateWordFocus();
            document.getElementById('score-display').innerText = "";
            recognition.start();
            startBtn.disabled = true;
            startBtn.textContent = "Écoute en cours...";
        };

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                transcript += event.results[i][0].transcript;
            }
            const spokenWords = transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim().split(/\s+/);
            const latestSpoken = spokenWords[spokenWords.length - 1];
            const targetWordNormalized = words[currentWordIndex].toLowerCase();

            if (latestSpoken === targetWordNormalized) {
                document.getElementById(`word-${currentWordIndex}`).classList.add('correct');
                currentWordIndex++;
                if (currentWordIndex < words.length) {
                    updateWordFocus();
                } else {
                    recognition.stop();
                }
            }
        };

        recognition.onend = () => {
            startBtn.disabled = false;
            startBtn.textContent = "Recommencer";
            const accuracy = Math.round((currentWordIndex / words.length) * 100);
            document.getElementById('score-display').innerText = `Précision finale : ${accuracy}%`;
            
            recordSubmission(accuracy);
        };
    }

    // Save student work and metadata to Firestore
    async function recordSubmission(score) {
        try {
            await db.collection("submissions").add({
                passageId: passageId,
                studentName: studentName,
                studentEmail: studentEmail,
                score: score,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert("Bravo ! Votre score a été enregistré et envoyé à votre enseignant.");
        } catch (err) {
            console.error("Submitting error: ", err);
        }
    }
</script>
</body>
</html>
