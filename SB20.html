<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentence Builder Cloud</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: Arial;
    background:#f8fafc;
    margin:0;
    padding:0;
}

.page {
    display:none;
    padding:40px;
}

.active {
    display:block;
}

/* LOGIN SCREEN */
#login-page {
    text-align:center;
    margin-top:120px;
}

button {
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2196f3;
    color:white;
    font-size:16px;
}

button:hover {
    opacity:0.9;
}

/* DASHBOARD */
#dashboard {
    max-width:900px;
    margin:auto;
}

.card {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    border:1px solid #ddd;
}
</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login-page" class="page active">
    <h1>Sentence Builder Cloud</h1>
    <p>Please sign in to continue</p>
    <button onclick="login()">🔵 Sign in with Google</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
    <h2>Dashboard</h2>
    <p id="user-info"></p>
    <button onclick="logout()" style="background:#ef4444;">Logout</button>

    <div id="content"></div>
</div>

<script>
/* ================= FIREBASE CONFIG ================= */
const firebaseConfig = {
    apiKey: "AIzaSyCE89XAuk9wzIhp9QEeCKkdVUK867PtK_Q",
    authDomain: "sentencebuilder-50ef5.firebaseapp.com",
    projectId: "sentencebuilder-50ef5",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* ================= PAGE SWITCH ================= */
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
}

/* ================= AUTH STATE LISTENER (CRITICAL FIX) ================= */
auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;

        document.getElementById("user-info").innerText =
            "Logged in as: " + user.email;

        showPage("dashboard");

        loadDashboard();
    } else {
        currentUser = null;
        showPage("login-page");
    }
});

/* ================= LOGIN ================= */
async function login() {
    const provider = new firebase.auth.GoogleAuthProvider();

    try {
        await auth.signInWithPopup(provider);
    } catch (err) {
        console.error(err);
        alert("Login failed. Check popup blocker or Firebase settings.");
    }
}

/* ================= LOGOUT ================= */
function logout() {
    auth.signOut();
}

/* ================= DASHBOARD CONTENT ================= */
function loadDashboard() {
    const content = document.getElementById("content");
    content.innerHTML = "";

    content.innerHTML += `
        <div class="card">
            <div>French - Year 9</div>
            <button>Edit</button>
        </div>
    `;

    content.innerHTML += `
        <div class="card">
            <div>Spanish - GCSE</div>
            <button>Edit</button>
        </div>
    `;
}

/* ================= SAFETY: FORCE LOGIN SCREEN ON LOAD ================= */
showPage("login-page");
</script>

</body>
</html>
