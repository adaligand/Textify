<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADG Resource Hub</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --btn-bg: #4a5568;
            --btn-hover: #2d3748;
            --btn-text: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Dark mode preference support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
                --card-bg: #2d3748;
                --text-main: #f7fafc;
                --text-muted: #a0aec0;
                --btn-bg: #3182ce;
                --btn-hover: #2b6cb0;
                --btn-text: #ffffff;
                --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            color: var(--text-main);
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .btn {
            display: block;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.1);
        }

        .btn:active {
            transform: translateY(0);
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ADG Resource Hub</h1>
        <p>Select a tool or dashboard below to get started.</p>
        
        <div class="links-grid">
            <a href="https://adaligand.github.io/Textify/starter.html" class="btn" target="_blank" rel="noopener noreferrer">
                ADG Starter Hub
            </a>
            
            <a href="https://adaligand.github.io/Textify/sbgenerator.html" class="btn" target="_blank" rel="noopener noreferrer">
                Sentence Builders
            </a>
            
            <a href="https://adaligand.github.io/Textify/WWWEBI.html" class="btn" target="_blank" rel="noopener noreferrer">
                WWW / EBI
            </a>
            
            <a href="https://adaligand.github.io/GCSE-French/cardallocator.html" class="btn" target="_blank" rel="noopener noreferrer">
                Speaking Allocator
            </a>
        </div>

        <footer>
            &copy; Host Hub Portfolio
        </footer>
    </div>

</body>
</html>
