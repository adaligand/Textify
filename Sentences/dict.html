<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictatioxn</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 800px;
      padding: 30px;
      background-color: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      text-align: center;
      box-sizing: border-box;
    }
    .title {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }
    #counter {
      font-size: 22px;
      font-weight: bold;
      color: #666;
      margin-bottom: 25px;
    }
    button {
      font-size: 18px;
      padding: 12px 25px;
      cursor: pointer;
      border-radius: 10px;
      border: 2px solid #ccc;
      background-color: #f8f9fa;
      color: #333;
      transition: all 0.2s ease-in-out;
      font-weight: bold;
    }
    button:hover {
      background-color: #e2e6ea;
      border-color: #b3b9be;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
    }
    #nextButton,
    #checkButton,
    #actionButton {
      background-color: #007bff;
      color: white;
      border-color: #007bff;
      white-space: nowrap;
    }
    #nextButton:hover,
    #checkButton:hover,
    #actionButton:hover {
      background-color: #0056b3;
      border-color: #0056b3;
    }

    /* Input + button inline */
    .input-group {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      gap: 10px;
    }
    #answerInput {
      font-size: 24px;
      padding: 12px 15px;
      flex: 1;
      border-radius: 12px;
      border: 2px solid #ddd;
      box-sizing: border-box;
    }
    #answerInput:focus {
      border-color: #007bff;
      outline: none;
    }

    #feedback {
      font-size: 20px;
      font-weight: bold;
      min-height: 24px;
      margin-top: 15px;
    }
    .keyboard-area {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }
    .keyboard-button {
      font-size: 18px;
      padding: 10px 15px;
      margin: 2px;
      border: none;
      border-radius: 10px;
      background-color: #eee;
      cursor: pointer;
    }
    .keyboard-button:hover {
      background-color: #A9A9A9;
      transform: translateY(-4px);
    }
    .top-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
        margin-top: 25px;
        text-align: center;
        border-top: 2px solid #eee;
        padding-top: 20px;
    }

    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 16px;
        background-color: #fafafa;
        color: #333;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
        padding: 10px 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
        background-color: #f1f3f5;
        color: #333;
        font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
        border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
        background-color: #d4edda !important;
        color: #155724 !important;
        font-weight: bold;
    }

    .btn {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f9f9f9;
        border: 2px solid #ccc;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        margin: 20px 5px 5px 5px;
        transition: transform 0.2s, background-color 0.2s;
        font-family: Arial, sans-serif;
    }
    .btn:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Dictation Activity</div>
    <div id="counter">Loading...</div>

    <div class="top-controls">
      <button id="playButton" onclick="playAudio()">▶️ Play Audio</button>
      <select id="languageSelect" onchange="onLanguageChange()">
        <option value="french" selected>French</option>
        <option value="german">German</option>
        <option value="spanish">Spanish</option>
      </select>
    </div>

    <div class="input-group">
      <input
        type="text"
        id="answerInput"
        placeholder="Type what you hear..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="actionButton" onclick="checkAnswer()">Check</button>
    </div>

    <div id="feedback"></div>

    <div class="keyboard-area">
      <div id="keyboardContainer"></div>
    </div>

    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <div id="summaryOutput" style="font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #333;"></div>
        <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
        <div id="leaderboardStatus"></div>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Accuracy</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="restartBtn" class="btn" onclick="restartGame()">🔄 Start Again</button>
    </div>
  </div>

  <script>
    let currentIndex = 0;
    let allSentences = [];
    let exerciseSentences = [];
    let voices = [];
    let voiceMap = {};
    let currentLanguage = "french";
    let isAnsweredCorrectly = false;
    let totalAttempts = 0;
    let startTime;

    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec"; 
    const GAME_NAME = "Dictation"; 

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get("sheet");
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
      document.querySelector(".title").textContent = "⚠️ Error";
      document.getElementById("counter").textContent =
        "No Google Sheet URL was provided.";
    } else {
      Papa.parse(sheetUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function (results) {
          results.data.forEach((row) => {
            if (row["French sentences"] && row["French sentences"].trim()) {
              allSentences.push(row["French sentences"].trim());
            }
          });
          if (allSentences.length === 0) {
            document.querySelector(".title").textContent = "⚠️ Error";
            document.getElementById("counter").textContent =
              "No sentences found.";
            return;
          }
          restartGame();
        },
        error: function (err) {
          document.querySelector(".title").textContent = "⚠️ Error";
          document.getElementById("counter").textContent =
            "Error loading data.";
          console.error(err);
        },
      });
    }

    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
      function findVoice(langCode, preferredNames = []) {
        return (
          voices.find((v) =>
            preferredNames.some((name) =>
              v.name.toLowerCase().includes(name.toLowerCase())
            )
          ) ||
          voices.find((v) => v.lang.toLowerCase().startsWith(langCode)) ||
          voices[0] ||
          null
        );
      }
      voiceMap = {
        french: findVoice("fr", ["google français", "amélie", "thomas"]),
        german: findVoice("de", ["google deutsch", "markus", "petra"]),
        spanish: findVoice("es", ["google español", "conchita", "lucia", "enrique"]),
      };
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    if (speechSynthesis.getVoices().length) loadVoices();

    function restartGame() {
        document.querySelector('.title').style.display = "block";
        document.querySelector('.title').textContent = "Dictation Activity";
        document.getElementById('counter').style.display = "block";
        document.querySelector('.top-controls').style.display = "flex";
        document.querySelector('.input-group').style.display = "flex";
        document.getElementById('feedback').style.display = "block";
        document.querySelector('.keyboard-area').style.display = "block";
        document.getElementById('leaderboardSection').style.display = "none";

        initialize();
    }

    function initialize() {
      allSentences.sort(() => Math.random() - 0.5);
      exerciseSentences = allSentences.slice(0, Math.min(10, allSentences.length));
      currentIndex = 0;
      totalAttempts = 0;
      startTime = Date.now();
      updateUI();
      generateKeyboard();
      playAudio();
    }

    function updateUI() {
      const total = exerciseSentences.length;
      document.getElementById(
        "counter"
      ).textContent = `Sentence ${currentIndex + 1} / ${total}`;
      const answerInput = document.getElementById("answerInput");
      answerInput.value = "";
      answerInput.disabled = false;
      answerInput.focus();
      document.getElementById("feedback").textContent = "";
      const btn = document.getElementById("actionButton");
      btn.textContent = "Check";
      btn.onclick = checkAnswer;
      isAnsweredCorrectly = false;
      playAudio();
    }

    function onLanguageChange() {
      currentLanguage = document.getElementById("languageSelect").value;
      generateKeyboard();
    }

    function playAudio() {
      if (!exerciseSentences[currentIndex]) return;
      const utterance = new SpeechSynthesisUtterance(
        exerciseSentences[currentIndex]
      );
      const voice = voiceMap[currentLanguage];
      if (voice) utterance.voice = voice;

      switch (currentLanguage) {
        case "french":
          utterance.lang = "fr-FR";
          break;
        case "german":
          utterance.lang = "de-DE";
          break;
        case "spanish":
          utterance.lang = "es-ES";
          break;
      }

      utterance.rate = 0.85;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function checkAnswer() {
      totalAttempts++;
      const answerInput = document.getElementById("answerInput");
      const feedbackEl = document.getElementById("feedback");
      const userAnswer = answerInput.value.trim();
      const correctAnswer = exerciseSentences[currentIndex];
      if (!userAnswer) {
        feedbackEl.textContent = "Please type your answer.";
        feedbackEl.style.color = "orange";
        return;
      }
      const punctuationRegex = /[.,?!;:"-]/g;
      const normalize = (t) =>
        t.replace(/’/g, "'").replace(punctuationRegex, "").toLowerCase().trim();
      if (normalize(userAnswer) === normalize(correctAnswer)) {
        feedbackEl.textContent = "✅ Correct!";
        feedbackEl.style.color = "green";
        answerInput.disabled = true;
        isAnsweredCorrectly = true;
        
        if (currentIndex < exerciseSentences.length - 1) {
          const btn = document.getElementById("actionButton");
          btn.textContent = "Next ▶️";
          btn.onclick = nextSentence;
        } else {
          finishGame();
        }
      } else {
        feedbackEl.style.color = "darkorange";
        let correctPrefixLength = 0;
        const finalCorrect = normalize(correctAnswer);
        const finalUser = normalize(userAnswer);
        for (let i = 0; i < finalUser.length; i++) {
          if (i < finalCorrect.length && finalUser[i] === finalCorrect[i])
            correctPrefixLength++;
          else break;
        }
        const hint = correctAnswer.substring(0, correctPrefixLength + 1);
        feedbackEl.textContent = `Not quite. Hint: ${hint}...`;
      }
    }

    function finishGame() {
      const totalSeconds = Math.round((Date.now() - startTime) / 1000);
      const displayMins = Math.floor(totalSeconds / 60);
      const displaySecs = totalSeconds % 60;
      const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
      const formattedTimeText = `${displayMins}m ${displaySecs}s`;
      const accuracy = Math.min(100, Math.round((exerciseSentences.length / Math.max(exerciseSentences.length, totalAttempts)) * 100));

      document.querySelector('.title').style.display = "none";
      document.getElementById('counter').style.display = "none";
      document.querySelector('.top-controls').style.display = "none";
      document.querySelector('.input-group').style.display = "none";
      document.getElementById('feedback').style.display = "none";
      document.querySelector('.keyboard-area').style.display = "none";

      document.getElementById('summaryOutput').textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;

      checkQualificationAndLoad(clockFormattedTime, accuracy);
    }

    function nextSentence() {
      currentIndex++;
      updateUI();
    }

    document
      .getElementById("answerInput")
      .addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          const btn = document.getElementById("actionButton");
          btn.click();
        }
      });

    function generateKeyboard() {
      const keyboardContainer = document.getElementById("keyboardContainer");
      keyboardContainer.innerHTML = "";
      let specialChars = [];
      switch (currentLanguage) {
        case "french":
          specialChars = [
            "à",
            "â",
            "é",
            "è",
            "ê",
            "ë",
            "î",
            "ï",
            "ô",
            "ö",
            "ù",
            "ü",
            "û",
            "ç",
          ];
          break;
        case "german":
          specialChars = ["ä", "ö", "ü", "ß"];
          break;
        case "spanish":
          specialChars = ["á", "é", "í", "ó", "ú", "ñ", "¿", "¡"];
          break;
      }
      specialChars.forEach((char) => {
        const button = document.createElement("button");
        button.textContent = char;
        button.className = "keyboard-button";
        button.onclick = () => insertLetter(char);
        keyboardContainer.appendChild(button);
      });
    }

    function insertLetter(letter) {
      const input = document.getElementById("answerInput");
      const start = input.selectionStart;
      const end = input.selectionEnd;
      input.value =
        input.value.substring(0, start) +
        letter +
        input.value.substring(end);
      input.selectionStart = input.selectionEnd = start + 1;
      input.focus();
    }

    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader && statusDiv) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            statusDiv.appendChild(rankHeader);
        }

        if (highlightName) {
            let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
            if(rankHeader) {
                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            }
        } else {
            if(rankHeader) {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }
  </script>
</body>
</html>
