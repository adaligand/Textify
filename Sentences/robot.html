<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beat The Robots</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f3f8; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        
        /* --- Setup Screen --- */
        #level-selector-container .card { border: none; }
        #level-selector-container .card-header { text-align: center; }
        #level-selector-container h1 { font-size: 2.5em; margin-top: 10px; }
        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        
        .btn, .btn-start {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #f9f9f9;
            color: #000000;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
        }
        .btn:hover, .btn-start:hover {
            background-color: #e9e9e9;
            transform: translateY(-2px);
        }
        .btn-chosen {
            background-color: #d4eaf7;
            border-color: #007bff;
        }
        .keyboard-button {
            padding: 10px 15px;
            font-size: 1.2em;
            background-color: #f9f9f9;
            color: #000000;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: none;
            transition: background-color 0.2s;
        }
        .keyboard-button:hover {
            background-color: #e9e9e9;
        }

        /* --- Game Screen --- */
        #game-container { display: none; }
        .game-panel { padding: 20px; border-radius: 8px; }
        .player { background-color: #f0f8ff; }
        .computer { background-color: #fff0f5; }
        .panel-title { font-size: 2em; text-align: center; margin-bottom: 20px; }
        .source-sentence-container { text-align: center; margin-bottom: 20px; }
        .source-sentence-label { font-size: 1.1em; color: #555; }
        .source-sentence { font-size: 1.5em; font-weight: bold; color: #333; }
        .question-container { font-size: 1.5em; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 5px; min-height: 100px; }
        .word-wrapper { display: inline-flex; flex-wrap: nowrap; align-items: center; margin: 0 5px;}

        .single-letter { width: 25px; height: 35px; text-align: center; font-size: 1em; border: none; border-bottom: 2px solid #ccc; background: transparent; margin: 0 1px; }
        .single-letter:focus { outline: none; border-bottom-color: #007bff; }
        .correct-answer { border-bottom-color: #28a745 !important; color: #28a745; }
        .wrong-answer { border-bottom-color: #dc3545 !important; }
        .static-char, .punctuation { display: inline-block; padding: 0 2px; }
        
        /* --- Overlays and Status --- */
        .status-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; color: white; font-size: 4em; font-weight: bold; border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .player .status-overlay { background: rgba(40, 167, 69, 0.85); }
        .computer .status-overlay { background: rgba(220, 53, 69, 0.85); }
        .status-overlay.visible { opacity: 1; }

        /* Counter & Next Button Controls */
        .round-counter { font-size: 22px; font-weight: bold; margin-bottom: 15px; color: #333; }
        
        .controls-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            min-height: 50px;
        }

        #nextButton {
            padding: 10px 24px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            color: #000;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s, transform 0.2s;
        }
        #nextButton:hover {
            background-color: #e9e9e9;
            transform: translateY(-2px);
        }

        /* --- Language and Keyboard Layout --- */
        .keyboard-and-lang-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .keyboard-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5px;
        }
        #languageSelect {
            padding: 10px;
            font-size: 1em;
            border-radius: 10px;
            border: 2px solid #ccc;
        }

        /* --- Leaderboard Styling --- */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="level-selector-container">
        <div class="card">
            <div class="card-header">
                <h1>Beat The Robot</h1>
                <p id="subtitle">Loading sentences...</p>
            </div>
            <div class="card-body">
                <div class="btn-group">
                    <button class="btn btn-mode btn-chosen" data-mode="vowels">Vowels</button>
                    <button class="btn btn-mode" data-mode="consonants">Consonants</button>
                </div>
                <div class="btn-group">
                    <button class="btn btn-direction btn-chosen" data-direction="to">English to Target</button>
                    <button class="btn btn-direction" data-direction="from">Target to English</button>
                </div>
            </div>
            <div class="card-footer" style="text-align:center;">
                <button class="btn-start" disabled>Start</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="round-counter" id="roundCounter">Round 1 / 10</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="game-panel player" style="position:relative;">
                <h2 class="panel-title">You</h2>
                <div class="source-sentence-container">
                    <div class="source-sentence-label">Translate this:</div>
                    <div class="source-sentence"></div>
                </div>
                <div class="question-container"></div>
                <div class="status-overlay">You Win!</div>
            </div>
            <div class="game-panel computer" style="position:relative;">
                <h2 class="panel-title">Robot</h2>
                <div class="source-sentence-container">
                    <div class="source-sentence-label">Translate this:</div>
                    <div class="source-sentence"></div>
                </div>
                <div class="question-container"></div>
                <div class="status-overlay">Robot Wins!</div>
            </div>
        </div>
        
        <div class="controls-wrapper">
            <button id="nextButton" onclick="handleNextRound()">Next ▶️</button>
        </div>

        <div class="keyboard-and-lang-wrapper">
            <div class="keyboard-container"></div>
            <div id="languageSelectContainer">
                <select id="languageSelect">
                    <option value="french">French</option>
                    <option value="german">German</option>
                    <option value="spanish">Spanish</option>
                </select>
            </div>
        </div>
    </div>

    <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; display: none;"></div>

    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
        <div id="leaderboardStatus"></div>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Accuracy</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="restartGame()">🔄 Start Again</button>
    </div>
</div>

<script>
    const settings = {
        speed: 1500,
        mode: 'vowels',
        direction: 'to',
        language: 'french'
    };
    let sentencePairs = [];
    let exerciseSentences = [];
    let currentSentenceIndex = 0;
    let robotInterval = null;
    let gameInProgress = false;
    let focusedInput = null;

    let totalAttempts = 0;
    let totalTargetInputs = 0;
    let startTime = 0;
    let isFinished = false;

    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec"; 
    const GAME_NAME = "Sent_Robot"; 

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    document.addEventListener('DOMContentLoaded', () => {
        if (!sheetUrl) {
            document.getElementById('subtitle').textContent = "⚠️ Please provide a Google Sheet URL in the '?sheet=' parameter.";
            return;
        }

        Papa.parse(sheetUrl, {
            download: true,
            header: false,
            skipEmptyLines: true,
            complete: (results) => {
                const data = results.data;
                const contentRows = data.slice(1);

                contentRows.forEach(row => {
                    if (row[5] && row[6]) {
                        sentencePairs.push({ target: row[5].trim(), english: row[6].trim() });
                    }
                });

                if (sentencePairs.length > 0) {
                    document.getElementById('subtitle').style.display = 'none';
                    document.querySelector('.btn-start').disabled = false;
                } else {
                    document.getElementById('subtitle').textContent = "⚠️ No sentences found in columns F and G (after skipping header). Please check your sheet.";
                }
            }
        });

        document.querySelectorAll('.btn-mode').forEach(btn => btn.addEventListener('click', () => setChoice(btn, 'mode', 'mode')));
        document.querySelectorAll('.btn-direction').forEach(btn => btn.addEventListener('click', () => setChoice(btn, 'direction', 'direction')));
        document.querySelector('.btn-start').addEventListener('click', startGame);
        document.getElementById('languageSelect').addEventListener('change', (e) => {
            settings.language = e.target.value;
            generateKeyboard();
        });
    });
    
    function setChoice(element, settingKey, groupClass) {
        document.querySelectorAll(`.btn-${groupClass}`).forEach(b => b.classList.remove('btn-chosen'));
        element.classList.add('btn-chosen');
        settings[settingKey] = element.dataset[settingKey];
    }

    function startGame() {
        document.getElementById('level-selector-container').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('leaderboardSection').style.display = 'none';

        shuffleArray(sentencePairs);
        exerciseSentences = sentencePairs.slice(0, Math.min(10, sentencePairs.length));

        // Calculate total target input fields across the game
        totalTargetInputs = exerciseSentences.reduce((sum, item) => {
            const text = settings.direction === 'to' ? item.target : item.english;
            return sum + countInputsInText(text);
        }, 0);

        currentSentenceIndex = 0;
        totalAttempts = 0;
        isFinished = false;
        startTime = Date.now();

        generateKeyboard();
        startRound();
    }

    function restartGame() {
        document.getElementById('level-selector-container').style.display = 'block';
        document.getElementById('game-container').style.display = 'none';
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('leaderboardSection').style.display = 'none';
    }

    function countInputsInText(text) {
        let count = 0;
        const words = text.split(' ');
        words.forEach(word => {
            for (const char of word) {
                if (/[a-zA-ZÀ-ÿ]/.test(char)) {
                    const isVowel = 'aeiouAEIOUàáâäèéêëìíîïòóôöùúûü'.includes(char.toLowerCase());
                    const shouldBeInput = (settings.mode === 'vowels' && isVowel) || (settings.mode === 'consonants' && !isVowel);
                    if (shouldBeInput) count++;
                }
            }
        });
        return count;
    }

    function startRound() {
        if (currentSentenceIndex >= exerciseSentences.length) {
            finishGame();
            return;
        }

        gameInProgress = true;
        clearInterval(robotInterval);

        document.querySelectorAll('.status-overlay').forEach(o => o.classList.remove('visible'));
        document.getElementById('nextButton').style.display = 'none';
        document.getElementById('roundCounter').textContent = `Round ${currentSentenceIndex + 1} / ${exerciseSentences.length}`;
        
        const currentSentence = exerciseSentences[currentSentenceIndex];
        const sourceText = settings.direction === 'to' ? currentSentence.english : currentSentence.target;
        const targetText = settings.direction === 'to' ? currentSentence.target : currentSentence.english;
        
        document.querySelectorAll('.source-sentence').forEach(el => el.textContent = sourceText);
        
        setupPlayerBoard(targetText);
        setupRobotBoard(targetText);
        
        startRobotTyping();
    }
    
    function createSentenceHTML(text) {
        let html = '';
        const words = text.split(' ');
        words.forEach(word => {
            html += '<div class="word-wrapper">';
            for (const char of word) {
                if (/[a-zA-ZÀ-ÿ]/.test(char)) {
                    const isVowel = 'aeiouAEIOUàáâäèéêëìíîïòóôöùúûü'.includes(char.toLowerCase());
                    const shouldBeInput = (settings.mode === 'vowels' && isVowel) || (settings.mode === 'consonants' && !isVowel);
                    if (shouldBeInput) {
                        html += `<input type="text" class="single-letter" maxlength="1" data-original="${char}">`;
                    } else {
                        html += `<span class="static-char">${char}</span>`;
                    }
                } else {
                    html += `<span class="punctuation">${char}</span>`;
                }
            }
            html += '</div>';
        });
        return html;
    }

    function setupPlayerBoard(targetText) {
        const container = document.querySelector('.player .question-container');
        container.innerHTML = createSentenceHTML(targetText);
        
        const inputs = container.querySelectorAll('input.single-letter');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => handlePlayerInput(input, index, inputs));
            input.addEventListener('focus', () => { focusedInput = input; });
        });
        if (inputs.length > 0) {
            inputs[0].focus();
        }
    }
    
    function handlePlayerInput(input, index, inputs) {
        totalAttempts++;
        const originalChar = input.dataset.original.toLowerCase();
        const enteredChar = input.value.toLowerCase();

        if (enteredChar === originalChar) {
            input.classList.remove('wrong-answer');
            input.classList.add('correct-answer');
            if (index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            checkPlayerWin(inputs);
        } else {
            input.classList.add('wrong-answer');
        }
    }

    function checkPlayerWin(inputs) {
        if (!gameInProgress) return;
        const allCorrect = Array.from(inputs).every(inp => inp.value.toLowerCase() === inp.dataset.original.toLowerCase());
        if (allCorrect) {
            gameInProgress = false;
            clearInterval(robotInterval);
            document.querySelector('.player .status-overlay').classList.add('visible');
            document.getElementById('nextButton').style.display = 'inline-block';
        }
    }

    function setupRobotBoard(targetText) {
        const container = document.querySelector('.computer .question-container');
        container.innerHTML = createSentenceHTML(targetText);
        container.querySelectorAll('input.single-letter').forEach(input => {
            input.disabled = true;
        });
    }

    function startRobotTyping() {
        const robotInputs = document.querySelectorAll('.computer input.single-letter');
        let inputIndex = 0;
        
        robotInterval = setInterval(() => {
            if (inputIndex < robotInputs.length) {
                const currentInput = robotInputs[inputIndex];
                currentInput.value = currentInput.dataset.original;
                currentInput.classList.add('correct-answer');
                inputIndex++;
            } else {
                clearInterval(robotInterval);
                if (gameInProgress) {
                    gameInProgress = false;
                    document.querySelector('.computer .status-overlay').classList.add('visible');
                    document.querySelectorAll('.player input.single-letter').forEach(inp => {
                       if (!inp.value) inp.value = inp.dataset.original;
                       if (inp.value.toLowerCase() !== inp.dataset.original.toLowerCase()) inp.classList.add('wrong-answer');
                       else if (!inp.classList.contains('correct-answer')) inp.classList.add('correct-answer');
                    });
                    document.getElementById('nextButton').style.display = 'inline-block';
                }
            }
        }, settings.speed);
    }

    function handleNextRound() {
        currentSentenceIndex++;
        if (currentSentenceIndex >= exerciseSentences.length) {
            finishGame();
        } else {
            startRound();
        }
    }

    // Allow pressing Enter key to advance round
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            const nextBtn = document.getElementById('nextButton');
            if (nextBtn && nextBtn.style.display !== 'none') {
                event.preventDefault();
                handleNextRound();
            }
        }
    });

    function finishGame() {
        if (isFinished) return;
        isFinished = true;

        clearInterval(robotInterval);

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        const accuracy = Math.min(100, Math.round((totalTargetInputs / Math.max(totalTargetInputs, totalAttempts)) * 100));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        document.getElementById('game-container').style.display = "none";

        checkQualificationAndLoad(clockFormattedTime, accuracy);
    }

    // Converts M.SS stored numbers back into text ("Xm Ys") for display
    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader && statusDiv) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            statusDiv.appendChild(rankHeader);
        }

        if (highlightName) {
            let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
            if(rankHeader) {
                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            }
        } else {
            if(rankHeader) {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function generateKeyboard() {
        const keyboardContainer = document.querySelector('.keyboard-container');
        keyboardContainer.innerHTML = '';
        const lang = document.getElementById('languageSelect').value;
        settings.language = lang;
        let chars = [];
        switch (lang) {
            case 'german': chars = ['ä', 'ö', 'ü', 'ß']; break;
            case 'french': chars = ['à', 'â', 'é', 'è', 'ê', 'ë', 'î', 'ï', 'ô', 'ù', 'û', 'ü', 'ç']; break;
            case 'spanish': chars = ['á', 'é', 'í', 'ó', 'ú', 'ñ', 'ü']; break;
        }
        chars.forEach(c => {
            const btn = document.createElement('button');
            btn.textContent = c;
            btn.className = 'keyboard-button';
            btn.onclick = () => insertCharacter(c);
            keyboardContainer.appendChild(btn);
        });
    }

    function insertCharacter(char) {
        if (focusedInput) {
            focusedInput.value = char;
            focusedInput.dispatchEvent(new Event('input'));
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }
</script>
