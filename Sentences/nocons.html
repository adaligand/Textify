<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No consonant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5; /* Light grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        width: 95%;
        max-width: 800px; /* Constrain width on large screens */
        padding: 20px;
        box-sizing: border-box;
        background-color: white; /* White background for the game */
        border-radius: 15px; /* Rounded corners */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        text-align: center;
    }
    .title { font-size: 40px; font-weight: bold; text-align: center; margin-bottom: 20px; }
    .subtitle { font-size: 20px; margin-bottom: 10px; text-align: center; }
    .counter {
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
    }
    .english-sentence { 
        display: block; 
        margin: 0 auto 20px; 
        font-size: 20px; 
        padding: 10px 20px; 
        border-radius: 10px; 
        border: 2px solid #ccc;
        background-color: #f9f9f9; 
        text-align: center; 
        width: 100%;
        box-sizing: border-box;
    }
    .french-sentence { 
        font-size: 26px; 
        text-align: center; 
        margin-bottom: 20px; 
        line-height: 2;
        word-spacing: 10px; 
    }
    .missing-word { 
        width: 22px; 
        font-size: 22px; 
        border: none; 
        border-bottom: 2px solid #000; 
        background: transparent; 
        text-align: center; 
        margin-right: 2px; 
        font-weight: bold;
    }
    .correct { background-color: #cef4ce; border-bottom-color: #28a745; }
    .incorrect { background-color: #ffb6c19c; border-bottom-color: #dc3545; }
    .keyboard-container { text-align: center; margin-top: 20px; }
    .keyboard-button { 
        font-size: 18px; 
        padding: 10px 15px; 
        margin: 2px; 
        border: none; 
        border-radius: 10px; 
        background-color: #eee; 
        color: #000;
        cursor: pointer; 
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        transition: transform 0.2s, background-color 0.2s;
    }
    .keyboard-button:hover { background-color: #A9A9A9; transform: translateY(-4px); }
    .feedback { font-weight: bold; font-size: 18px; display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 10px; min-height: 45px; }
    
    /* Light grey styled Next Button */
    #nextButton { 
        padding: 10px 20px; 
        font-size: 18px;
        font-weight: bold;
        border-radius: 10px; 
        border: 2px solid #ccc; 
        background: #f9f9f9; 
        color: #000;
        cursor: pointer; 
        display: none; 
        transition: transform 0.2s, background-color 0.2s;
    }
    #nextButton:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }

    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
        margin-top: 25px;
        text-align: center;
        border-top: 2px solid #eee;
        padding-top: 20px;
    }

    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 16px;
        background-color: #fafafa;
        color: #333;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
        padding: 10px 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
        background-color: #f1f3f5;
        color: #333;
        font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
        border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
        background-color: #d4edda !important;
        color: #155724 !important;
        font-weight: bold;
    }

    .btn {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f9f9f9;
        border: 2px solid #ccc;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        margin: 20px 5px 5px 5px;
        transition: transform 0.2s, background-color 0.2s;
        font-family: Arial, sans-serif;
    }
    .btn:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }
</style>
</head>
<body>
<div class="container">
    <div class="title" id="gameTitle">No consonants</div>
    <div class="subtitle" id="subtitle">Fill in the missing consonants</div>
    <div class="counter" id="sentenceCounter"></div>

    <div id="exerciseBox">
        <div class="english-sentence" id="englishSentence"></div>
        <div class="french-sentence" id="frenchSentence"></div>
        <div id="keyboardContainer" class="keyboard-container"></div>
        <div id="feedback" class="feedback">
            <span id="correctSpan" style="display:none; color: #28a745;">Correct ✅</span>
            <button id="nextButton" onclick="nextText()">Next ▶️</button>
        </div>
    </div>

    <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; display: none;"></div>

    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
        <div id="leaderboardStatus"></div>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Accuracy</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="restartBtn" class="btn" onclick="restartGame()">🔄 Start Again</button>
    </div>
</div>

<script>
let sentencePairs = [];
let exerciseSentences = [];
let currentIndex = 0;
let lastFocusedInput = null;

let totalInputAttempts = 0;
let totalConsonantsCount = 0;
let startTime;
let isFinished = false;

const consonants = /[bcdfghjklmnpqrstvwxyzßçñBCDFGHJKLMNPQRSTVWXYZ]/;

// --- LEADERBOARD CONFIGURATION ---
const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec"; 
const GAME_NAME = "Sent_No cons"; 

// Get CSV URL from query string
const params = new URLSearchParams(window.location.search);
const csvUrl = params.get('sheet');

function getSpreadsheetId(url) {
    if (!url) return null;
    if (url.includes('/d/e/')) {
        const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return matches ? matches[1] : url;
}
const topicId = csvUrl ? getSpreadsheetId(csvUrl) : null;

if(!csvUrl){
    document.getElementById('subtitle').textContent = "⚠️ No CSV URL provided in query string.";
} else {
    document.getElementById('subtitle').textContent = "Loading data...";
    // Load CSV
    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results){
            results.data.forEach(row => {
                if (row['French sentences'] && row['English sentences']) {
                    sentencePairs.push({ 
                        french: row['French sentences'].trim(), 
                        english: row['English sentences'].trim() 
                    });
                }
            });

            if(sentencePairs.length === 0){
                document.getElementById('subtitle').textContent = "⚠️ No valid data found! Please check your Google Sheet headers.";
                return;
            }

            restartGame();
        },
        error: function(err){
            console.error(err);
            document.getElementById('subtitle').textContent = "⚠️ CSV load error: " + err;
        }
    });
}

function restartGame() {
    document.getElementById('gameTitle').style.display = "block";
    document.getElementById('subtitle').style.display = "block";
    document.getElementById('subtitle').textContent = "Fill in the missing consonants";
    document.getElementById('sentenceCounter').style.display = "block";
    document.getElementById('exerciseBox').style.display = "block";
    document.getElementById('scoreDisplay').style.display = "none";
    document.getElementById('leaderboardSection').style.display = "none";

    sentencePairs.sort(() => 0.5 - Math.random());
    exerciseSentences = sentencePairs.slice(0, Math.min(10, sentencePairs.length));

    totalConsonantsCount = exerciseSentences.reduce((sum, item) => {
        let count = 0;
        for (let char of item.french) {
            if (consonants.test(char)) count++;
        }
        return sum + count;
    }, 0);

    currentIndex = 0;
    totalInputAttempts = 0;
    isFinished = false;
    startTime = Date.now();

    generateSentence();
    generateKeyboard();
}

// Generate current sentence
function generateSentence(){
    if(currentIndex >= exerciseSentences.length){
        finishGame();
        return;
    }

    const sentence = exerciseSentences[currentIndex].french;
    document.getElementById('englishSentence').textContent = exerciseSentences[currentIndex].english;
    const sentenceDiv = document.getElementById('frenchSentence');
    sentenceDiv.innerHTML = '';

    for(let i=0; i<sentence.length; i++){
        const char = sentence[i];
        if(consonants.test(char)){
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'missing-word';
            input.dataset.index = i;
            input.addEventListener('input', validateInput);
            input.addEventListener('focus', () => { lastFocusedInput = input; });
            input.addEventListener('keydown', handleBackspace);
            sentenceDiv.appendChild(input);
        } else {
            const span = document.createElement('span');
            span.textContent = char;
            sentenceDiv.appendChild(span);
        }
    }

    document.getElementById('sentenceCounter').textContent = `${currentIndex + 1} / ${exerciseSentences.length}`;
    document.getElementById('correctSpan').style.display = "none";
    document.getElementById('nextButton').style.display = "none";

    // Auto focus first missing input field
    const firstInput = document.querySelector('.missing-word');
    if (firstInput) {
        firstInput.focus();
        lastFocusedInput = firstInput;
    }
}

// Validate input
function validateInput(e){
    const input = e.target;
    if (input.value.length === 1) {
        totalInputAttempts++;
    }

    const sentence = exerciseSentences[currentIndex].french;
    const correctChar = sentence[input.dataset.index];

    if(input.value.toLowerCase() === correctChar.toLowerCase()){
        input.classList.add('correct');
        input.classList.remove('incorrect');
    } else {
        input.classList.add('incorrect');
        input.classList.remove('correct');
    }

    // Move to next input automatically
    if(input.value.length === 1){
        let nextInput = input.nextElementSibling;
        while(nextInput && !nextInput.classList.contains('missing-word')){
            nextInput = nextInput.nextElementSibling;
        }
        if(nextInput) nextInput.focus();
    }

    // Show feedback & next button if all correct
    const allInputs = document.querySelectorAll('.missing-word');
    const allCorrect = Array.from(allInputs).every(inp => inp.classList.contains('correct'));
    if(allCorrect){
        document.getElementById('correctSpan').style.display = "inline";
        
        if (currentIndex >= exerciseSentences.length - 1) {
            setTimeout(() => {
                finishGame();
            }, 600);
        } else {
            document.getElementById('nextButton').style.display = "inline-block";
        }
    }
}

// Handle backspace
function handleBackspace(e){
    if(e.key === "Backspace"){
        e.preventDefault();
        const input = e.target;
        input.value = '';
        input.classList.remove('correct', 'incorrect');

        let prevInput = input.previousElementSibling;
        while(prevInput && !prevInput.classList.contains('missing-word')){
            prevInput = prevInput.previousElementSibling;
        }
        if(prevInput){
            prevInput.focus();
            prevInput.value = '';
            prevInput.classList.remove('correct', 'incorrect');
        }
    }
}

function nextText(){
    currentIndex++;
    generateSentence();
}

// Allow pressing Enter key to go next
document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        const nextBtn = document.getElementById('nextButton');
        if (nextBtn && nextBtn.style.display !== 'none') {
            event.preventDefault();
            nextText();
        }
    }
});

function finishGame() {
    if (isFinished) return;
    isFinished = true;

    const totalSeconds = Math.round((Date.now() - startTime) / 1000);
    const displayMins = Math.floor(totalSeconds / 60);
    const displaySecs = totalSeconds % 60;

    const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
    const formattedTimeText = `${displayMins}m ${displaySecs}s`;
    const accuracy = Math.min(100, Math.round((totalConsonantsCount / Math.max(totalConsonantsCount, totalInputAttempts)) * 100));

    const scoreDisplay = document.getElementById('scoreDisplay');
    scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
    scoreDisplay.style.display = "block";

    document.getElementById('gameTitle').style.display = "none";
    document.getElementById('subtitle').style.display = "none";
    document.getElementById('sentenceCounter').style.display = "none";
    document.getElementById('exerciseBox').style.display = "none";

    checkQualificationAndLoad(clockFormattedTime, accuracy);
}

// Keyboard
function generateKeyboard(){
    const container = document.getElementById('keyboardContainer');
    container.innerHTML = '';
    const chars = ['ß', 'ç', 'ñ'];

    chars.forEach(c => {
        const btn = document.createElement('button');
        btn.textContent = c;
        btn.className = 'keyboard-button';
        btn.type = 'button';
        btn.onclick = () => {
            if(lastFocusedInput){
                const pos = lastFocusedInput.selectionStart;
                const val = lastFocusedInput.value;
                lastFocusedInput.value = val.slice(0,pos) + c + val.slice(pos);
                lastFocusedInput.setSelectionRange(pos+1,pos+1);
                lastFocusedInput.focus();
                lastFocusedInput.dispatchEvent(new Event('input'));
            }
        };
        container.appendChild(btn);
    });
}

// Converts M.SS stored numbers back into text ("Xm Ys") for display
function formatTimeDisplay(minutesVal) {
    if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
    const num = parseFloat(minutesVal);
    const mins = Math.floor(num);
    const secs = Math.round((num - mins) * 100);
    return `${mins}m ${secs}s`;
}

function checkQualificationAndLoad(timeMinutes, accuracy) {
    const tbody = document.getElementById('leaderboardBody');
    const section = document.getElementById('leaderboardSection');
    
    tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
    section.style.display = "block";

    fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
    .then(res => res.json())
    .then(data => {
        let tempBoard = [...data];
        let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
        tempBoard.push(newAttempt);
        tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
        
        let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

        if (playerRank <= 5) {
            let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
            if (!studentName) studentName = "Anonymous";
            
            tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
            
            fetch(LEADERBOARD_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    topicId: topicId,
                    game: GAME_NAME,
                    name: studentName,
                    time: parseFloat(timeMinutes),
                    accuracy: parseFloat(accuracy)
                })
            })
            .then(res => res.json())
            .then(updatedData => {
                renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
            });
        } else {
            renderLeaderboardRows(data, null, null, null);
        }
    })
    .catch(err => {
        console.error("Leaderboard loading failure:", err);
        tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
    });
}

function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
    const tbody = document.getElementById('leaderboardBody');
    const statusDiv = document.getElementById('leaderboardStatus');
    if(!tbody) return;
    
    tbody.innerHTML = "";
    
    let rankHeader = document.getElementById('personalRankTitle');
    if(!rankHeader && statusDiv) {
        rankHeader = document.createElement('h4');
        rankHeader.id = 'personalRankTitle';
        rankHeader.style.fontSize = '18px';
        rankHeader.style.margin = '8px 0';
        statusDiv.appendChild(rankHeader);
    }

    if (highlightName) {
        let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
        if(rankHeader) {
            rankHeader.style.color = '#2ecc71';
            rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
        }
    } else {
        if(rankHeader) {
            rankHeader.style.color = '#e67e22';
            rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
        }
    }

    const medals = ['🥇 1', '🥈 2', '🥉 3'];

    data.forEach((entry, index) => {
        const tr = document.createElement('tr');
        const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
        const timeFormatted = formatTimeDisplay(entry.time);
        const rankDisplay = medals[index] || `#${index + 1}`;
        
        if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
            tr.className = 'highlight-row';
        }

        tr.innerHTML = `
            <td><strong>${rankDisplay}</strong></td>
            <td><strong>${entry.name}</strong></td>
            <td>${accVal}%</td>
            <td>${timeFormatted}</td>
        `;
        tbody.appendChild(tr);
    });
}
</script>
</body>
</html>
