<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag and Drop</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            touch-action: none; /* Prevents scrolling during drag */
        }
        .container {
            width: 95%; /* Set width to 95% of the screen */
            max-width: 800px; /* Sets a maximum width on large screens */
            padding: 20px; /* Reduced padding for smaller screens */
            box-sizing: border-box;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        .counter {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s, background-color 0.2s;
            font-size: 18px;
            font-weight: bold;
        }
        button:hover {
            background-color: #A9A9A9;
            transform: translateY(-4px);
        }
        #nextButton {
            background-color: #007bff;
            color: white;
            border-color: #007bff;
        }
        #nextButton:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        .hide {
            display: none;
        }
        .english-sentence {
            margin-bottom: 20px;
            font-size: 20px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            text-align: center;
        }
        .french-sentence {
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
        }
        .draggable-word {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            margin: 0 5px 5px 0;
            font-size: 20px;
            border: 1px solid black;
            padding: 2px 10px;
            border-radius: 5px;
            background-color: #f0f0f0;
            height: 30px;
            vertical-align: middle;
            user-select: none;
            -webkit-user-select: none;
        }
        .dropzone-container {
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .dropzone {
            border: 1px dashed #007bff;
            min-width: 30px;
            min-height: 30px;
            font-size: 20px;
            border-radius: 10px;
            display: inline-block;
            padding: 5px 10px;
            vertical-align: middle;
            margin: 2px;
            transition: border-color 0.3s, background-color 0.3s;
        }
        .dropzone.filled {
            border-color: #555;
            border-style: solid;
        }
        /* State for a correct sentence */
        .dropzone.attempt-correct {
            border-color: #28a745 !important;
            background-color: #e9f7ef;
        }
        /* State for an incorrect sentence */
        .dropzone.attempt-incorrect {
            border-color: #dc3545 !important;
            background-color: #fbebed;
        }
        .feedback {
            font-weight: bold;
            font-size: 20px;
        }
        .input-container {
            text-align: center;
        }
        .chunk-container {
            text-align: center;
            margin-top: 10px;
            min-height: 40px;
        }
        .feedback-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            min-height: 45px;
            margin-top: 10px;
        }
        .dragging-source {
            visibility: hidden;
        }
        .dragging-clone {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            opacity: 0.8;
            transform: translate(-50%, -50%);
        }

        /* Leaderboard Box & Table Styling */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }

        .btn {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 20px 5px 5px 5px;
            transition: transform 0.2s, background-color 0.2s;
            font-family: Arial, sans-serif;
        }
        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title" id="gameTitle">Drag and Drop</div>
        <div class="subtitle" id="subtitle">Drag and drop the words into the correct places.</div>
        <div class="counter" id="sentenceCounter"></div>
        <div id="exerciseOutput"></div>
        
        <div class="input-container" id="inputAreaContainer">
            <div class="feedback-container">
                <div id="feedback" class="hide"></div>
                <button id="nextButton" class="hide" onclick="nextText()">Next ▶️</button>
            </div>
        </div>

        <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; display: none;"></div>

        <!-- Leaderboard Container -->
        <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
            <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
            <div id="leaderboardStatus"></div>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Accuracy</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <button id="restartBtn" class="btn" onclick="restartGame()">🔄 Start Again</button>
        </div>
    </div>

<script>
    var currentTextIndex = 0;
    var originalChunks = [];
    var sentencePairs = [];
    var exerciseSentences = [];
    
    let touchDraggedItem = null;
    let ghostElement = null;

    let totalAttempts = 0;
    let startTime;
    let isFinished = false;

    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec"; 
    const GAME_NAME = "Sent_DragAndDrop"; 

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
        document.getElementById('subtitle').textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
    } else {
        document.getElementById('subtitle').textContent = "Loading data...";
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    if (row["French sentences"] && row["English sentences"]) {
                        sentencePairs.push({
                            english: row["English sentences"].trim(),
                            french: row["French sentences"].trim()
                        });
                    }
                });
                if (sentencePairs.length === 0) {
                    document.getElementById('subtitle').textContent = "⚠️ No data found. Check your column headers are 'French sentences' and 'English sentences'.";
                    return;
                }
                restartGame();
            },
            error: function(err) {
                document.getElementById('subtitle').textContent = "⚠️ Error loading the CSV file.";
                console.error(err);
            }
        });
    }

    function restartGame() {
        document.getElementById('gameTitle').style.display = "block";
        document.getElementById('subtitle').style.display = "block";
        document.getElementById('subtitle').textContent = "Drag and drop the words into the correct places.";
        document.getElementById('sentenceCounter').style.display = "block";
        document.getElementById('exerciseOutput').style.display = "block";
        document.getElementById('inputAreaContainer').style.display = "block";
        document.getElementById('scoreDisplay').style.display = "none";
        document.getElementById('leaderboardSection').style.display = "none";

        initialize();
    }

    function initialize() {
        shuffleArray(sentencePairs);
        exerciseSentences = sentencePairs.slice(0, Math.min(10, sentencePairs.length));
        currentTextIndex = 0;
        totalAttempts = 0;
        isFinished = false;
        startTime = Date.now();
        generateChunk();
    }

    function generateChunk() {
        if (currentTextIndex >= exerciseSentences.length) {
            finishGame();
            return;
        }

        const englishSentence = exerciseSentences[currentTextIndex].english;
        const frenchSentence = exerciseSentences[currentTextIndex].french;
        originalChunks = getWordChunks(frenchSentence);

        const halfChunksCount = Math.ceil(originalChunks.length / 2);
        const removedChunksIndices = getRandomIndices(originalChunks.length, halfChunksCount);

        let sentenceWithDropzones = '';
        for (let i = 0; i < originalChunks.length; i++) {
            if (removedChunksIndices.includes(i)) {
                sentenceWithDropzones += `<div class="dropzone" ondrop="drop(event)" ondragover="allowDrop(event)" onclick="emptyDropzone(event)" data-index="${i}"></div> `;
            } else {
                sentenceWithDropzones += originalChunks[i] + ' ';
            }
        }

        const exerciseOutput = document.getElementById('exerciseOutput');
        exerciseOutput.innerHTML = `
            <div class="english-sentence">${englishSentence}</div>
            <div class="french-sentence">${sentenceWithDropzones}</div>
            <div class="chunk-container"></div>
        `;

        shuffleArray(removedChunksIndices);

        removedChunksIndices.forEach(originalIndex => {
            const chunk = originalChunks[originalIndex];
            addDraggableWord(chunk, originalIndex);
        });
        
        checkCompletionState();
        document.getElementById('sentenceCounter').textContent = `${currentTextIndex + 1} / ${exerciseSentences.length}`;
        document.getElementById('sentenceCounter').classList.remove('hide');
    }

    // --- MOUSE DRAG AND DROP ---
    function drag(event) {
        event.dataTransfer.setData("text", event.target.textContent);
        event.dataTransfer.setData("original-index", event.target.getAttribute('data-original-index'));
    }
    function allowDrop(event) {
        event.preventDefault();
    }
    function drop(event) {
        event.preventDefault();
        const data = event.dataTransfer.getData("text");
        const originalIndex = event.dataTransfer.getData("original-index");
        placeWordInDropzone(event.target, data, originalIndex);
    }
    
    // --- TOUCH EVENT HANDLERS ---
    function handleTouchStart(event) {
        if (event.touches.length === 1) {
            touchDraggedItem = event.target;
            touchDraggedItem.classList.add('dragging-source');
            ghostElement = touchDraggedItem.cloneNode(true);
            ghostElement.classList.remove('dragging-source');
            ghostElement.classList.add('dragging-clone');
            document.body.appendChild(ghostElement);
            const touch = event.touches[0];
            ghostElement.style.left = `${touch.clientX}px`;
            ghostElement.style.top = `${touch.clientY}px`;
        }
    }
    function handleTouchMove(event) {
        if (touchDraggedItem && event.touches.length === 1) {
            event.preventDefault();
            const touch = event.touches[0];
            ghostElement.style.left = `${touch.clientX}px`;
            ghostElement.style.top = `${touch.clientY}px`;
        }
    }
    function handleTouchEnd(event) {
        if (!touchDraggedItem) return;
        ghostElement.style.display = 'none';
        const touch = event.changedTouches[0];
        const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
        if (dropTarget) {
            const wordText = touchDraggedItem.textContent;
            const wordOriginalIndex = touchDraggedItem.getAttribute('data-original-index');
            placeWordInDropzone(dropTarget, wordText, wordOriginalIndex);
        }
        touchDraggedItem.classList.remove('dragging-source');
        document.body.removeChild(ghostElement);
        ghostElement = null;
        touchDraggedItem = null;
    }

    // --- CORE LOGIC FUNCTIONS ---
    function placeWordInDropzone(dropTarget, wordText, wordOriginalIndex) {
        if (dropTarget && dropTarget.classList.contains('dropzone') && !dropTarget.textContent) {
            dropTarget.textContent = wordText;
            dropTarget.classList.add('filled');
            dropTarget.setAttribute('data-word-index', wordOriginalIndex);
            removeDraggableWord(wordText, wordOriginalIndex);
            checkCompletionState();
        }
    }

    function removeDraggableWord(text, originalIndex) {
        document.querySelectorAll('.draggable-word').forEach(word => {
            if (word.textContent === text && word.getAttribute('data-original-index') === originalIndex) {
                word.remove();
            }
        });
    }

    function emptyDropzone(event) {
        const target = event.target;
        if (target.classList.contains('dropzone') && target.textContent) {
            const word = target.textContent;
            const originalIndex = target.getAttribute('data-word-index');
            target.textContent = '';
            target.classList.remove('filled', 'attempt-correct', 'attempt-incorrect');
            target.removeAttribute('data-word-index');
            addDraggableWord(word, originalIndex);
            checkCompletionState();
        }
    }

    function addDraggableWord(word, index) {
        const chunkContainer = document.querySelector('.chunk-container');
        const chunkElement = document.createElement('div');
        chunkElement.textContent = word;
        chunkElement.className = 'draggable-word';
        chunkElement.setAttribute('draggable', 'true');
        chunkElement.setAttribute('ondragstart', 'drag(event)');
        chunkElement.setAttribute('data-original-index', String(index));
        chunkElement.addEventListener('touchstart', handleTouchStart, { passive: false });
        chunkElement.addEventListener('touchmove', handleTouchMove, { passive: false });
        chunkElement.addEventListener('touchend', handleTouchEnd);
        chunkContainer.appendChild(chunkElement);
    }

    function checkCompletionState() {
        const dropzones = document.querySelectorAll('.dropzone');
        const filledCount = document.querySelectorAll('.dropzone.filled').length;
        
        document.getElementById('feedback').classList.add('hide');
        document.getElementById('nextButton').classList.add('hide');
        
        dropzones.forEach(dz => dz.classList.remove('attempt-correct', 'attempt-incorrect'));
        
        if (dropzones.length > 0 && filledCount === dropzones.length) {
            validateAllAnswers();
        }
    }
    
    function validateAllAnswers() {
        totalAttempts++;
        const dropzones = document.querySelectorAll('.dropzone');
        let allCorrect = true;

        dropzones.forEach(dz => {
            const dropzoneIndex = dz.getAttribute('data-index');
            const correctWord = originalChunks[dropzoneIndex];
            const placedWord = dz.textContent;

            if (placedWord !== correctWord) {
                allCorrect = false;
            }
        });
        
        const feedbackElement = document.getElementById('feedback');
        if (allCorrect) {
            dropzones.forEach(dz => dz.classList.add('attempt-correct'));
            feedbackElement.textContent = 'Correct! Well done.';
            feedbackElement.style.color = '#28a745';
            feedbackElement.classList.remove('hide');

            if (currentTextIndex >= exerciseSentences.length - 1) {
                // Straight to scores automatically on final sentence
                setTimeout(() => {
                    finishGame();
                }, 800);
            } else {
                const nextBtn = document.getElementById('nextButton');
                nextBtn.textContent = 'Next ▶️';
                nextBtn.classList.remove('hide');
            }
        } else {
            dropzones.forEach(dz => dz.classList.add('attempt-incorrect'));
            feedbackElement.textContent = 'That is not quite right. Click a word to try again.';
            feedbackElement.style.color = '#dc3545';
            feedbackElement.classList.remove('hide');
        }
    }

    function finishGame() {
        if (isFinished) return;
        isFinished = true;

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        const accuracy = Math.min(100, Math.round((exerciseSentences.length / Math.max(exerciseSentences.length, totalAttempts)) * 100));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        document.getElementById('gameTitle').style.display = "none";
        document.getElementById('subtitle').style.display = "none";
        document.getElementById('sentenceCounter').style.display = "none";
        document.getElementById('exerciseOutput').style.display = "none";
        document.getElementById('inputAreaContainer').style.display = "none";

        checkQualificationAndLoad(clockFormattedTime, accuracy);
    }

    // Allow pressing Enter key to go next
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            const nextBtn = document.getElementById('nextButton');
            if (nextBtn && !nextBtn.classList.contains('hide')) {
                event.preventDefault();
                nextText();
            }
        }
    });

    // --- UTILITY AND NAVIGATION FUNCTIONS ---
    function nextText() {
        currentTextIndex++;
        generateChunk();
    }

    function getWordChunks(text) {
        return text.split(/\s+/).filter(Boolean);
    }

    function getRandomIndices(length, count) {
        const indices = new Set();
        while (indices.size < count) {
            indices.add(Math.floor(Math.random() * length));
        }
        return Array.from(indices);
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // Converts M.SS stored numbers back into text ("Xm Ys") for display
    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader && statusDiv) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            statusDiv.appendChild(rankHeader);
        }

        if (highlightName) {
            let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
            if(rankHeader) {
                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            }
        } else {
            if(rankHeader) {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
