<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1st letter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5; /* Light grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .container {
        width: 95%;
        max-width: 800px; /* Constrain width on large screens */
        padding: 20px;
        box-sizing: border-box;
        background-color: white; /* White background for the game area */
        border-radius: 15px; /* Rounded corners */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        text-align: center; /* Center the content inside the container */
    }
    .title {
        font-size: 40px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
    .subtitle {
        font-size: 20px;
        margin-bottom: 10px;
        text-align: center;
    }
    .counter {
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
    }
    .english-sentence {
        display: block;
        margin: 0 auto 20px;
        font-size: 20px;
        padding: 10px 20px;
        border: 2px solid #ccc;
        border-radius: 10px;
        background-color: #f9f9f9;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
    }
    .french-sentence {
        font-size: 24px;
        text-align: center;
        margin-bottom: 20px;
        line-height: 2;
        word-spacing: 6px;
    }
    .missing-word {
        width: 22px;
        font-size: 22px;
        border: none;
        border-bottom: 2px solid #000000;
        background-color: transparent;
        outline: none;
        margin-right: 2px;
        text-align: center;
        font-weight: bold;
    }
    .correct {
        background-color: #cef4ce;
        border-bottom-color: #28a745;
    }
    .incorrect {
        background-color: #ffb6c19c;
        border-bottom-color: #dc3545;
    }
    .feedback {
        font-weight: bold;
        font-size: 18px;
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        margin-top: 10px;
        min-height: 45px;
    }
    #keyboardContainer {
        text-align: center;
        margin-top: 20px;
    }
    .keyboard-button {
        font-size: 18px;
        padding: 10px 15px;
        margin: 2px;
        border: none;
        border-radius: 10px;
        background-color: #f0f0f0;
        color: #000000;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s, background-color 0.2s;
        cursor: pointer;
    }
    .keyboard-button:hover {
        background-color: #A9A9A9;
        transform: translateY(-4px);
    }
    select {
        width: auto;
        padding: 5px 10px;
        border-radius: 10px;
        margin: 15px auto 10px;
        height: 35px;
        font-size: 16px;
        display: block;
    }

    /* Light grey styled Next Button */
    #nextButton { 
        padding: 10px 20px; 
        font-size: 18px;
        font-weight: bold;
        border-radius: 10px; 
        border: 2px solid #ccc; 
        background: #f9f9f9; 
        color: #000;
        cursor: pointer; 
        display: none; 
        transition: transform 0.2s, background-color 0.2s;
    }
    #nextButton:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }

    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
        margin-top: 25px;
        text-align: center;
        border-top: 2px solid #eee;
        padding-top: 20px;
    }

    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 16px;
        background-color: #fafafa;
        color: #333;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
        padding: 10px 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
        background-color: #f1f3f5;
        color: #333;
        font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
        border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
        background-color: #d4edda !important;
        color: #155724 !important;
        font-weight: bold;
    }

    .btn {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f9f9f9;
        border: 2px solid #ccc;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        margin: 20px 5px 5px 5px;
        transition: transform 0.2s, background-color 0.2s;
        font-family: Arial, sans-serif;
    }
    .btn:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }
</style>
</head>
<body>
  <div class="container">
    <div class="title" id="gameTitle">First letter only</div>
    <div class="subtitle" id="subtitle">Loading exercise...</div>
    <div class="counter" id="sentenceCounter"></div>

    <div id="exerciseBox">
      <div id="exerciseOutput"></div>
      <select id="languageSelect" onchange="generateKeyboard(this.value)">
        <option value="french" selected>French</option>
        <option value="german">German</option>
        <option value="spanish">Spanish</option>
      </select>
      <div id="feedback" class="feedback">
        <span id="correctSpan" style="display:none; color: #28a745;">Correct ✅</span>
        <button id="nextButton" onclick="nextText()">Next ▶️</button>
      </div>
      <div id="keyboardContainer"></div>
    </div>

    <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; display: none;"></div>

    <!-- Leaderboard Container -->
    <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
        <div id="leaderboardStatus"></div>
        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Accuracy</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="restartBtn" class="btn" onclick="restartGame()">🔄 Start Again</button>
    </div>
  </div>

  <script>
    var currentTextIndex = 0;
    var sentencePairs = [];
    var exerciseSentences = [];
    var lastFocusedInput = null;
    var punctuations = [',', '!', '?', '.', ';', ':', "'", "’"];

    var totalInputAttempts = 0;
    var totalCharactersCount = 0;
    var startTime;
    var isFinished = false;

    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec"; 
    const GAME_NAME = "Sent_1st letter"; 

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
      document.getElementById('subtitle').textContent = "⚠️ No sheet URL provided in the address bar. Add ?sheet=YOUR_CSV_LINK to the end of the URL.";
    } else {
      Papa.parse(sheetUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          results.data.forEach(row => {
            if (row["French sentences"] && row["English sentences"]) {
              sentencePairs.push({
                french: row["French sentences"].trim(),
                english: row["English sentences"].trim()
              });
            }
          });

          if (sentencePairs.length === 0) {
            document.getElementById('subtitle').textContent = "⚠️ No valid data found. Check your sheet headers are 'French sentences' and 'English sentences'.";
            return;
          }
          
          restartGame();
        },
        error: function(err) {
          console.error("CSV Loading Error:", err);
          document.getElementById('subtitle').textContent = "⚠️ Error loading or parsing the CSV file.";
        }
      });
    }

    function shuffleArray(array) {
      for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function countMissingInSentence(frenchSentence) {
      let count = 0;
      let words = frenchSentence.split(' ');
      words.forEach((word) => {
        if (word.includes("'")) {
          let parts = word.split("'");
          count += parts[1].length;
        } else {
          for (let i = 1; i < word.length; i++) {
            if (!punctuations.includes(word[i])) {
              count++;
            }
          }
        }
      });
      return count;
    }

    function restartGame() {
      document.getElementById('gameTitle').style.display = "block";
      document.getElementById('subtitle').style.display = "block";
      document.getElementById('subtitle').textContent = "Fill in the sentence with the correct letters.";
      document.getElementById('sentenceCounter').style.display = "block";
      document.getElementById('exerciseBox').style.display = "block";
      document.getElementById('scoreDisplay').style.display = "none";
      document.getElementById('leaderboardSection').style.display = "none";

      shuffleArray(sentencePairs);
      exerciseSentences = sentencePairs.slice(0, Math.min(10, sentencePairs.length));

      totalCharactersCount = exerciseSentences.reduce((sum, item) => sum + countMissingInSentence(item.french), 0);

      currentTextIndex = 0;
      totalInputAttempts = 0;
      isFinished = false;
      startTime = Date.now();

      generateKeyboard(document.getElementById('languageSelect').value);
      generateChunk();
    }

    function generateKeyboard(language) {
      var keyboardContainer = document.getElementById('keyboardContainer');
      keyboardContainer.innerHTML = '';
      var characters = [];
      switch (language) {
        case 'german':
          characters = ['ä', 'ö', 'ü', 'ß'];
          break;
        case 'french':
          characters = ['à', 'â', 'ä', 'é', 'è', 'ê', 'ë', 'î', 'ï', 'ô', 'ö', 'ù', 'ü', 'û', 'ç'];
          break;
        case 'spanish':
          characters = ['á', 'é', 'í', 'ó', 'ú', 'ñ'];
          break;
      }
      characters.forEach(function(character) {
        var button = document.createElement('button');
        button.innerHTML = character;
        button.className = 'keyboard-button';
        button.setAttribute('type', 'button');
        button.addEventListener('click', function(event) {
          event.preventDefault();
          insertCharacter(character);
        });
        keyboardContainer.appendChild(button);
      });
    }

    function insertCharacter(character) {
      if (lastFocusedInput) {
        var cursorPosition = lastFocusedInput.selectionStart;
        var currentValue = lastFocusedInput.value;
        var newValue = currentValue.slice(0, cursorPosition) + character + currentValue.slice(cursorPosition);
        lastFocusedInput.value = newValue;
        lastFocusedInput.setSelectionRange(cursorPosition + 1, cursorPosition + 1);
        lastFocusedInput.dispatchEvent(new Event('input'));
      }
    }

    function generateChunk() {
      if (currentTextIndex >= exerciseSentences.length) {
          finishGame();
          return;
      }
      
      var englishSentence = exerciseSentences[currentTextIndex].english;
      var frenchSentence = exerciseSentences[currentTextIndex].french;
      var sentenceWithInputFields = '';
      var words = frenchSentence.split(' ');
      let globalCharIndex = 0;

      words.forEach((word) => {
        if (word.includes("'")) {
            let parts = word.split("'");
            sentenceWithInputFields += parts[0] + "'";
            globalCharIndex += parts[0].length + 1;
            let part1Index = frenchSentence.indexOf(parts[1], globalCharIndex - 1);
            for (let i = 0; i < parts[1].length; i++) {
                sentenceWithInputFields += `<input type="text" maxlength="1" class="missing-word" data-index="${part1Index + i}" oninput="validateCharacter(this)" onfocus="setLastFocusedInput(this)" onkeydown="handleInputKeydown(event, this)">`;
            }
            globalCharIndex += parts[1].length;
        } else {
            sentenceWithInputFields += word.charAt(0);
            globalCharIndex++;
            let firstCharIndex = frenchSentence.indexOf(word, globalCharIndex - 1);
            for (let i = 1; i < word.length; i++) {
                if (punctuations.includes(word[i])) {
                    sentenceWithInputFields += word[i];
                } else {
                    sentenceWithInputFields += `<input type="text" maxlength="1" class="missing-word" data-index="${firstCharIndex + i}" oninput="validateCharacter(this)" onfocus="setLastFocusedInput(this)" onkeydown="handleInputKeydown(event, this)">`;
                }
                globalCharIndex++;
            }
        }
        sentenceWithInputFields += " ";
        globalCharIndex++;
      });

      var exerciseOutput = document.getElementById('exerciseOutput');
      exerciseOutput.innerHTML = '';

      var englishSentenceDiv = document.createElement('div');
      englishSentenceDiv.classList.add('english-sentence');
      englishSentenceDiv.textContent = englishSentence;
      exerciseOutput.appendChild(englishSentenceDiv);

      var sentenceDiv = document.createElement('div');
      sentenceDiv.classList.add('french-sentence');
      sentenceDiv.innerHTML = sentenceWithInputFields.trim();
      exerciseOutput.appendChild(sentenceDiv);

      document.getElementById('correctSpan').style.display = "none";
      document.getElementById('nextButton').style.display = "none";
      document.getElementById('sentenceCounter').textContent = (currentTextIndex + 1) + ' / ' + exerciseSentences.length;

      // Auto focus first missing input field
      const firstInput = document.querySelector('.missing-word');
      if (firstInput) {
          firstInput.focus();
          lastFocusedInput = firstInput;
      }
    }

    function setLastFocusedInput(input) {
      lastFocusedInput = input;
    }

    function validateCharacter(input) {
      if (input.value.length === 1) {
          totalInputAttempts++;
      }

      var userInput = input.value.trim().toLowerCase();
      var correctChar = exerciseSentences[currentTextIndex].french[input.getAttribute('data-index')];
      
      if (userInput === '') {
        input.classList.remove('correct', 'incorrect');
      } else if (userInput === correctChar.toLowerCase()) {
        input.classList.add('correct');
        input.classList.remove('incorrect');
        let nextInput = findNextInput(input);
        if (nextInput) {
            nextInput.focus();
        }
      } else {
        input.classList.add('incorrect');
        input.classList.remove('correct');
      }
      
      checkAnswers();
    }

    function checkAnswers() {
      var inputFields = document.querySelectorAll('.missing-word');
      var allCorrect = Array.from(inputFields).every(input => input.classList.contains('correct'));

      if (allCorrect) {
        document.getElementById('correctSpan').style.display = "inline";

        if (currentTextIndex >= exerciseSentences.length - 1) {
          setTimeout(() => {
            finishGame();
          }, 600);
        } else {
          document.getElementById('nextButton').style.display = "inline-block";
        }
      }
    }

    function handleInputKeydown(event, input) {
        if (event.key === "Backspace" && input.value === '') {
            event.preventDefault();
            let prevInput = findPrevInput(input);
            if (prevInput) {
                prevInput.focus();
                prevInput.value = '';
                prevInput.classList.remove('correct', 'incorrect');
            }
        }
    }

    function findNextInput(currentInput) {
        let allInputs = Array.from(document.querySelectorAll('.missing-word'));
        let index = allInputs.indexOf(currentInput);
        return allInputs[index + 1] || null;
    }

    function findPrevInput(currentInput) {
        let allInputs = Array.from(document.querySelectorAll('.missing-word'));
        let index = allInputs.indexOf(currentInput);
        return allInputs[index - 1] || null;
    }

    function nextText() {
      currentTextIndex++;
      generateChunk();
    }

    // Allow pressing Enter key to go next
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            const nextBtn = document.getElementById('nextButton');
            if (nextBtn && nextBtn.style.display !== 'none') {
                event.preventDefault();
                nextText();
            }
        }
    });

    function finishGame() {
        if (isFinished) return;
        isFinished = true;

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        const accuracy = Math.min(100, Math.round((totalCharactersCount / Math.max(totalCharactersCount, totalInputAttempts)) * 100));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        document.getElementById('gameTitle').style.display = "none";
        document.getElementById('subtitle').style.display = "none";
        document.getElementById('sentenceCounter').style.display = "none";
        document.getElementById('exerciseBox').style.display = "none";

        checkQualificationAndLoad(clockFormattedTime, accuracy);
    }

    // Converts M.SS stored numbers back into text ("Xm Ys") for display
    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        
        let rankHeader = document.getElementById('personalRankTitle');
        if(!rankHeader && statusDiv) {
            rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            statusDiv.appendChild(rankHeader);
        }

        if (highlightName) {
            let studentRank = data.findIndex(entry => entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) + 1;
            if(rankHeader) {
                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            }
        } else {
            if(rankHeader) {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && entry.name === highlightName && entry.time === parseFloat(highlightTime) && entry.accuracy === parseFloat(highlightAcc)) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }
  </script>
</body>
</html>
