<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentence Builder - Stable Merging</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --accent: #2196f3; --green: #4caf50; --red: #f44336; --line: #94a3b8; --translation-blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        #builder-title { font-size: 24px; padding: 12px; width: 100%; max-width: 500px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .toolbar { background: white; padding: 12px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 8px; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.05); align-items: center; position: sticky; top: 10px; z-index: 1000; }
        .grid-canvas { display: inline-grid; background-color: var(--line); border: 2px solid var(--line); gap: 2px; border-radius: 4px; }
        .cell { background: white; min-width: 280px; display: flex; flex-direction: column; padding: 25px; position: relative; box-sizing: border-box; }
        .top-ui { position: absolute; top: 8px; left: 8px; }
        .vocab-item { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; margin-bottom: 5px; }
        .target-input, .translation-input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 16px; width: auto; min-width: 10px; }
        .target-input { font-weight: 600; }
        .bracket-wrapper { color: var(--translation-blue); font-size: 14px; font-style: italic; }
        #activity-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); display: none; z-index: 2000; width: 500px; max-height: 80vh; overflow-y: auto; }
        .menu-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        button { padding: 8px 14px; cursor: pointer; border: 1px solid #cbd5e1; background: white; border-radius: 6px; font-weight: 500; }
    </style>
</head>
<body>

<input type="text" id="builder-title" value="Substitution_Table_Pro">

<div class="toolbar">
    <button onclick="undo()">↩️ Undo</button>
    <button onclick="redo()">↪️ Redo</button>
    <button onclick="insertRow(grid.length)">+ Row</button>
    <button onclick="insertCol(grid[0].length)">+ Col</button>
    <button onclick="mergeSelected()" style="background:#f1f5f9;">🔗 Merge</button>
    <button onclick="splitSelected()" style="background:#f1f5f9;">✂️ Split</button>
    <button onclick="saveProject()">💾 Save</button>
    <button onclick="document.getElementById('fileIn').click()">📂 Load</button>
    <button onclick="exportPDF()" style="background:#e11d48; color:white; border:none;">📄 PDF</button>
    <button onclick="openActivityMenu()" style="background:#8b5cf6; color:white; border:none;">🎯 Multi-Activity</button>
    <input type="file" id="fileIn" style="display:none" onchange="loadProject(event)">
</div>

<div id="grid-container" class="grid-canvas"></div>

<div class="overlay" id="overlay" onclick="closeActivityMenu()"></div>
<div id="activity-menu">
    <h3 style="margin-top:0">Worksheet Settings</h3>
    <div style="margin-bottom:15px; padding:15px; background:#f1f5f9; border-radius:8px;">
        <label><b>Study List Sentences:</b> </label>
        <select id="study-list-count">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
        </select>
    </div>
    <div id="activity-list"></div>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="generateMasterDoc()" style="flex:1; background: var(--green); color: white; border: none;">Generate Word Doc</button>
        <button onclick="closeActivityMenu()" style="flex:1;">Cancel</button>
    </div>
</div>

<script>
    let grid = [[c(), c(), c()], [c(), c(), c()], [c(), c(), c()]];
    let history = [JSON.stringify(grid)];
    let historyStep = 0;

    const ACTIVITIES = [
        { id: 'study', label: 'Study List (Target + Translation)' },
        { id: 'vowels', label: 'Missing Vowels' },
        { id: 'consonants', label: 'Missing Consonants' },
        { id: 'no-spaces', label: 'No Spaces' },
        { id: 'to-target', label: 'Translation to Target Language' },
        { id: 'to-trans', label: 'Translation to English (Blue Text)' },
        { id: 'bad-trans', label: 'Bad Translation (Spot the Error)' },
        { id: 'jumbled', label: 'Unscramble Sentences' }
    ];

    function c() { return { items: [{t: "", tr: ""}], rS: 1, cS: 1, hidden: false, sel: false }; }

    function pushHistory() {
        const state = JSON.stringify(grid);
        if (state === history[historyStep]) return;
        history = history.slice(0, historyStep + 1);
        history.push(state);
        historyStep++;
    }

    function render(doPush = true) {
        if(doPush) pushHistory();
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${grid[0].length}, fit-content(800px))`;
        grid.forEach((row, r) => {
            row.forEach((cell, cIdx) => {
                if (cell.hidden) return;
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                cellDiv.style.gridColumn = `span ${cell.cS}`;
                cellDiv.style.gridRow = `span ${cell.rS}`;
                cellDiv.innerHTML = `
                    <div class="top-ui"><input type="checkbox" ${cell.sel?'checked':''} onchange="grid[${r}][${cIdx}].sel=this.checked"></div>
                    <div class="vocab-list">${cell.items.map((it, i) => `
                        <div class="vocab-item">
                            <input type="text" class="target-input" oninput="grid[${r}][${cIdx}].items[${i}].t=this.value" value="${it.t}">
                            <div class="bracket-wrapper">(<input type="text" class="translation-input" oninput="grid[${r}][${cIdx}].items[${i}].tr=this.value" value="${it.tr}">)</div>
                        </div>`).join('')}</div>`;
                container.appendChild(cellDiv);
            });
        });
    }

    // COORDINATE MAPPING
    function getCellAt(r, c) {
        for (let row = 0; row <= r; row++) {
            for (let col = 0; col <= c; col++) {
                let cell = grid[row][col];
                if (!cell.hidden && r < row + cell.rS && c < col + cell.cS) return cell;
            }
        }
        return null;
    }

    function getAssembledSentences() {
        let sentences = [];
        for (let r = 0; r < grid.length; r++) {
            let rowCells = [];
            for (let c = 0; c < grid[0].length; c++) rowCells.push(getCellAt(r, c));
            let maxLines = Math.max(...rowCells.map(cell => cell ? cell.items.length : 0));

            for (let l = 0; l < maxLines; l++) {
                let tParts = [], trParts = [];
                for (let c = 0; c < grid[0].length; c++) {
                    let cell = getCellAt(r, c);
                    if (!cell || (c > 0 && getCellAt(r, c - 1) === cell)) continue;
                    let it = cell.items[Math.min(l, cell.items.length - 1)];
                    if (it && it.t.trim()) { tParts.push(it.t.trim()); trParts.push(it.tr.trim()); }
                }
                if (tParts.length > 0) sentences.push({ t: tParts.join(' '), tr: trParts.join(' ') });
            }
        }
        return sentences.filter((v, i, a) => a.findIndex(t => (t.t === v.t)) === i);
    }

    function mergeSelected() {
        let sel = [];
        grid.forEach((r, ri) => r.forEach((c, ci) => { if(c.sel) sel.push({r:ri, c:ci}); }));
        if(sel.length < 2) return;

        let minR = Math.min(...sel.map(s => s.r)), maxR = Math.max(...sel.map(s => s.r + grid[s.r][s.c].rS));
        let minC = Math.min(...sel.map(s => s.c)), maxC = Math.max(...sel.map(s => s.c + grid[s.r][s.c].cS));

        let root = grid[minR][minC];
        root.rS = maxR - minR;
        root.cS = maxC - minC;
        root.sel = false;

        for (let r = minR; r < maxR; r++) {
            for (let c = minC; c < maxC; c++) {
                if (r === minR && c === minC) continue;
                grid[r][c].hidden = true;
                grid[r][c].sel = false;
            }
        }
        render();
    }

    function splitSelected() {
        grid.forEach((row, r) => row.forEach((cell, c) => {
            if (cell.sel) {
                let rowSpan = cell.rS;
                let colSpan = cell.cS;
                for (let i = r; i < r + rowSpan; i++) {
                    for (let j = c; j < c + colSpan; j++) {
                        grid[i][j].hidden = false;
                        grid[i][j].rS = 1;
                        grid[i][j].cS = 1;
                        grid[i][j].sel = false;
                    }
                }
            }
        }));
        render();
    }

    function undo() { if (historyStep > 0) { historyStep--; grid = JSON.parse(history[historyStep]); render(false); } }
    function redo() { if (historyStep < history.length - 1) { historyStep++; grid = JSON.parse(history[historyStep]); render(false); } }
    function saveProject() { saveAs(new Blob([JSON.stringify(grid)], {type: "application/json"}), "project.json"); }
    function loadProject(e) { 
        const fr = new FileReader(); 
        fr.onload = (ev) => { grid = JSON.parse(ev.target.result); history = [JSON.stringify(grid)]; historyStep = 0; render(false); }; 
        fr.readAsText(e.target.files[0]); 
    }

    function generateMasterDoc() {
        const fullList = getAssembledSentences();
        const selectedTypes = Array.from(document.querySelectorAll('#activity-list input:checked')).map(cb => cb.value);
        const studyLimit = parseInt(document.getElementById('study-list-count').value);
        let html = `<html><head><style>.blue{color:#2980b9; font-weight:bold; font-style:italic;}</style></head><body>`;

        selectedTypes.forEach(type => {
            let limit = (type === 'study') ? studyLimit : 10;
            let subset = [...fullList].sort(() => 0.5 - Math.random()).slice(0, limit);
            html += `<h2>${ACTIVITIES.find(a => a.id === type).label}</h2>`;
            subset.forEach((s, i) => {
                let ln = `${i+1}. `;
                if(type==='study') ln += `<b>${s.t}</b> <span class="blue">(${s.tr})</span>`;
                if(type==='vowels') ln += `${s.t.replace(/[aeiouàâéèêëîïôûù]/gi, '_')} (${s.tr})`;
                if(type==='consonants') ln += `${s.t.replace(/[^aeiouàâéèêëîïôûù\s]/gi, '_')} (${s.tr})`;
                if(type==='no-spaces') ln += `${s.t.replace(/\s/g, '').toLowerCase()} (${s.tr})`;
                if(type==='to-target') ln += `(${s.tr}) : __________________________`;
                if(type==='to-trans') ln += `${s.t} : <span class="blue">__________________________</span>`;
                if(type==='jumbled') ln += `[ ${s.t.split(' ').sort(()=>0.5-Math.random()).join(' / ')} ] (${s.tr})`;
                if(type==='bad-trans') {
                    let bad = fullList[Math.floor(Math.random()*fullList.length)].tr;
                    ln += `True or False? <b>${s.t}</b> = <i>${Math.random()>0.5?s.tr:bad}</i>`;
                }
                html += `<p>${ln}</p>`;
            });
            html += `<hr style="page-break-after:always;">`;
        });
        saveAs(new Blob(['\ufeff', html], {type:'application/msword'}), "Activities.doc");
        closeActivityMenu();
    }

    function insertRow(i) { grid.splice(i, 0, Array.from({length: grid[0].length}, () => c())); render(); }
    function insertCol(i) { grid.forEach(r => r.splice(i, 0, c())); render(); }
    function openActivityMenu() {
        document.getElementById('activity-list').innerHTML = ACTIVITIES.map(a => `<label class="menu-row"><input type="checkbox" value="${a.id}"> ${a.label}</label>`).join('');
        document.getElementById('activity-menu').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }
    function closeActivityMenu() { document.getElementById('activity-menu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    async function exportPDF() {
        const canvas = await html2canvas(document.getElementById('grid-container'));
        const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 275, 0);
        pdf.save("Table.pdf");
    }

    render();
</script>
</body>
</html>
