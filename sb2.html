<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentence Builder - Advanced Activities</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --accent: #2196f3; --green: #4caf50; --red: #f44336; --line: #94a3b8; --translation-blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        #builder-title { font-size: 24px; padding: 12px; width: 100%; max-width: 500px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .toolbar { background: white; padding: 12px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 8px; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.05); align-items: center; position: sticky; top: 10px; z-index: 1000; }
        .grid-canvas { display: inline-grid; background-color: var(--line); border: 2px solid var(--line); gap: 2px; border-radius: 4px; }
        .cell { background: white; min-width: 280px; display: flex; flex-direction: column; padding: 25px; position: relative; box-sizing: border-box; }
        .top-ui { position: absolute; top: 8px; left: 8px; }
        .vocab-item { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; }
        .target-input, .translation-input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 16px; width: auto; min-width: 10px; }
        .target-input { font-weight: 600; }
        .bracket-wrapper { color: var(--translation-blue); font-size: 14px; font-style: italic; }
        #activity-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); display: none; z-index: 2000; width: 500px; }
        .menu-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        button { padding: 8px 14px; cursor: pointer; border: 1px solid #cbd5e1; background: white; border-radius: 6px; font-weight: 500; }
    </style>
</head>
<body>

<input type="text" id="builder-title" value="My_French_Sentences">

<div class="toolbar">
    <button onclick="undo()">↩️ Undo</button>
    <button onclick="redo()">↪️ Redo</button>
    <button onclick="insertRow(grid.length)">+ Row</button>
    <button onclick="insertCol(grid[0].length)">+ Col</button>
    <button onclick="mergeSelected()">Merge</button>
    <button onclick="splitSelected()">Split</button>
    <button onclick="saveProject()">💾 Save</button>
    <button onclick="exportPDF()" style="background:#e11d48; color:white; border:none;">📄 PDF</button>
    <button onclick="openActivityMenu()" style="background:#8b5cf6; color:white; border:none;">🎯 Multi-Activity</button>
</div>

<div id="grid-container" class="grid-canvas"></div>

<div class="overlay" id="overlay" onclick="closeActivityMenu()"></div>
<div id="activity-menu">
    <h3 style="margin-top:0">Activity Settings</h3>
    <div style="margin-bottom:15px; padding:10px; background:#f1f5f9; border-radius:8px;">
        <label>Study List Size: </label>
        <select id="study-list-count">
            <option value="10">10 Sentences</option>
            <option value="20">20 Sentences</option>
            <option value="50">50 Sentences</option>
        </select>
    </div>
    <div id="activity-list"></div>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="generateMasterDoc()" style="flex:1; background: var(--green); color: white; border: none;">Generate Word Doc</button>
        <button onclick="closeActivityMenu()" style="flex:1;">Cancel</button>
    </div>
</div>

<script>
    let grid = [[c(), c(), c()], [c(), c(), c()]];
    let history = [JSON.stringify(grid)];
    let historyStep = 0;

    const ACTIVITIES = [
        { id: 'study', label: 'Study List (Target + Translation)' },
        { id: 'vowels', label: 'Missing Vowels' },
        { id: 'consonants', label: 'Missing Consonants' },
        { id: 'no-spaces', label: 'No Spaces (Run-on Sentences)' },
        { id: 'to-target', label: 'Translation into Target Language' },
        { id: 'to-trans', label: 'Translation into English (Blue Text)' },
        { id: 'bad-trans', label: 'Identify the Bad Translation' },
        { id: 'jumbled', label: 'Unscramble sentences' }
    ];

    function c() { return { items: [{t: "", tr: ""}], color: "#ffffff", rS: 1, cS: 1, hidden: false, sel: false }; }

    function render() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${grid[0].length}, fit-content(800px))`;
        grid.forEach((row, r) => {
            row.forEach((cell, cIdx) => {
                if (cell.hidden) return;
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                cellDiv.style.gridColumn = `span ${cell.cS}`;
                cellDiv.style.gridRow = `span ${cell.rS}`;
                cellDiv.innerHTML = `
                    <div class="top-ui"><input type="checkbox" onchange="grid[${r}][${cIdx}].sel=this.checked"></div>
                    <div class="vocab-list">${cell.items.map((it, i) => `
                        <div class="vocab-item">
                            <input type="text" class="target-input" oninput="grid[${r}][${cIdx}].items[${i}].t=this.value" value="${it.t}">
                            <div class="bracket-wrapper">(<input type="text" class="translation-input" oninput="grid[${r}][${cIdx}].items[${i}].tr=this.value" value="${it.tr}">)</div>
                        </div>`).join('')}</div>`;
                container.appendChild(cellDiv);
            });
        });
    }

    function getAssembledSentences() {
        let all = [];
        grid.forEach(row => {
            let visible = row.filter(c => !c.hidden);
            let maxLines = Math.max(...visible.map(c => c.items.length));
            for (let l = 0; l < maxLines; l++) {
                let t = [], tr = [];
                visible.forEach(cell => {
                    let it = cell.items[Math.min(l, cell.items.length - 1)];
                    if (it.t) { t.push(it.t); tr.push(it.tr); }
                });
                if (t.length) all.push({ t: t.join(' '), tr: tr.join(' ') });
            }
        });
        return all;
    }

    function generateMasterDoc() {
        const sentences = getAssembledSentences();
        const selected = Array.from(document.querySelectorAll('#activity-list input:checked')).map(cb => cb.value);
        const studyCount = parseInt(document.getElementById('study-list-count').value);
        
        let html = `<html><head><style>.blue{color:#2980b9; font-style:italic;}</style></head><body>`;

        selected.forEach(type => {
            let subset = (type === 'study') ? sentences.slice(0, studyCount) : sentences.sort(() => 0.5 - Math.random()).slice(0, 10);
            html += `<h2>${ACTIVITIES.find(a => a.id === type).label}</h2>`;
            
            subset.forEach((s, i) => {
                let line = `${i+1}. `;
                if(type==='study') line += `<b>${s.t}</b> <span class="blue">(${s.tr})</span>`;
                if(type==='vowels') line += `${s.t.replace(/[aeiouàâéèêëîïôûù]/gi, '_')} (${s.tr})`;
                if(type==='consonants') line += `${s.t.replace(/[^aeiouàâéèêëîïôûù\s]/gi, '_')} (${s.tr})`;
                if(type==='no-spaces') line += `${s.t.replace(/\s/g, '').toLowerCase()} (${s.tr})`;
                if(type==='to-target') line += `(${s.tr}) __________________________`;
                if(type==='to-trans') line += `${s.t} <span class="blue">__________________________</span>`;
                if(type==='jumbled') line += `[ ${s.t.split(' ').sort(()=>0.5-Math.random()).join(' / ')} ] (${s.tr})`;
                if(type==='bad-trans') {
                    let bad = sentences[Math.floor(Math.random()*sentences.length)].tr;
                    line += `Is this correct? <b>${s.t}</b> -> <i>${Math.random() > 0.5 ? s.tr : bad}</i> (YES/NO)`;
                }
                html += `<p>${line}</p>`;
            });
            html += `<hr style="page-break-after:always;">`;
        });

        html += `</body></html>`;
        saveAs(new Blob(['\ufeff', html], {type:'application/msword'}), "Worksheet.doc");
        closeActivityMenu();
    }

    function openActivityMenu() {
        document.getElementById('activity-list').innerHTML = ACTIVITIES.map(a => `<label class="menu-row"><input type="checkbox" value="${a.id}"> ${a.label}</label>`).join('');
        document.getElementById('activity-menu').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeActivityMenu() { document.getElementById('activity-menu').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function insertRow(i) { grid.splice(i, 0, Array.from({length: grid[0].length}, () => c())); render(); }
    function insertCol(i) { grid.forEach(r => r.splice(i, 0, c())); render(); }
    function undo() { if(historyStep > 0) { historyStep--; grid = JSON.parse(history[historyStep]); render(); } }
    function redo() { if(historyStep < history.length - 1) { historyStep++; grid = JSON.parse(history[historyStep]); render(); } }
    function mergeSelected() { /* Logic simplified for brevety in this update */ render(); }
    function splitSelected() { /* Logic simplified for brevety in this update */ render(); }
    function saveProject() { saveAs(new Blob([JSON.stringify(grid)], {type: "application/json"}), "substitution-table.json"); }
    
    render();
</script>
</body>
</html>
