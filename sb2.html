<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Générateur de Tableaux de Substitution</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --accent: #2196f3; --green: #4caf50; --red: #f44336; --line: #94a3b8; --translation-blue: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; }
        #builder-title { font-size: 24px; padding: 12px; width: 100%; max-width: 500px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 20px; outline: none; }
        .toolbar { background: white; padding: 12px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 8px; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.05); align-items: center; position: sticky; top: 10px; z-index: 1000; }
        .grid-canvas { display: inline-grid; background-color: var(--line); border: 2px solid var(--line); gap: 2px; border-radius: 4px; }
        .cell { background: white; min-width: 280px; display: flex; flex-direction: column; padding: 25px; position: relative; box-sizing: border-box; }
        .top-ui { position: absolute; top: 8px; left: 8px; }
        .vocab-item { display: flex; align-items: baseline; gap: 6px; white-space: nowrap; margin-bottom: 5px; }
        .target-input, .translation-input { border: none; background: transparent; outline: none; font-family: inherit; font-size: 16px; width: auto; min-width: 10px; }
        .target-input { font-weight: 600; }
        .bracket-wrapper { color: var(--translation-blue); font-size: 14px; font-style: italic; }
        #activity-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 16px; box-shadow: 0 20px 25px rgba(0,0,0,0.2); display: none; z-index: 2000; width: 500px; max-height: 80vh; overflow-y: auto; }
        .menu-row { display: flex; align-items: center; gap: 12px; padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 1999; }
        button { padding: 8px 14px; cursor: pointer; border: 1px solid #cbd5e1; background: white; border-radius: 6px; font-weight: 500; }
        button:hover { background: #f1f5f9; }
    </style>
</head>
<body>

<input type="text" id="builder-title" value="Ma_Substitution_Table">

<div class="toolbar">
    <button onclick="undo()">↩️ Annuler</button>
    <button onclick="redo()">↪️ Rétablir</button>
    <button onclick="insertRow(grid.length)">+ Ligne</button>
    <button onclick="insertCol(grid[0].length)">+ Colonne</button>
    <button onclick="mergeSelected()">Fusionner</button>
    <button onclick="splitSelected()">Diviser</button>
    <button onclick="saveProject()">💾 Sauvegarder</button>
    <button onclick="exportPDF()" style="background:#e11d48; color:white; border:none;">📄 PDF</button>
    <button onclick="openActivityMenu()" style="background:#8b5cf6; color:white; border:none;">🎯 Générer Activités</button>
</div>

<div id="grid-container" class="grid-canvas"></div>

<div class="overlay" id="overlay" onclick="closeActivityMenu()"></div>
<div id="activity-menu">
    <h3 style="margin-top:0">Paramètres des Activités</h3>
    <div style="margin-bottom:15px; padding:15px; background:#f1f5f9; border-radius:8px;">
        <label><b>Taille de la Liste d'Étude :</b> </label>
        <select id="study-list-count">
            <option value="10">10 Phrases</option>
            <option value="20" selected>20 Phrases</option>
            <option value="50">50 Phrases</option>
        </select>
        <p style="font-size:12px; margin-top:5px; color:#64748b;">Note: Les autres exercices sont limités à 10 phrases max.</p>
    </div>
    <div id="activity-list"></div>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <button onclick="generateMasterDoc()" style="flex:1; background: var(--green); color: white; border: none;">Générer Word (.doc)</button>
        <button onclick="closeActivityMenu()" style="flex:1;">Annuler</button>
    </div>
</div>

<script>
    let grid = [[c(), c(), c()], [c(), c(), c()]];
    let history = [JSON.stringify(grid)];
    let historyStep = 0;

    const ACTIVITIES = [
        { id: 'study', label: 'Liste d\'étude (Cible + Traduction)' },
        { id: 'vowels', label: 'Voyelles manquantes' },
        { id: 'consonants', label: 'Consonnes manquantes' },
        { id: 'no-spaces', label: 'Phrases sans espaces' },
        { id: 'to-target', label: 'Traduction vers Langue Cible' },
        { id: 'to-trans', label: 'Traduction vers Français (Texte Bleu)' },
        { id: 'bad-trans', label: 'Trouver la mauvaise traduction' },
        { id: 'jumbled', label: 'Phrases mélangées (Unscramble)' }
    ];

    function c() { return { items: [{t: "", tr: ""}], color: "#ffffff", rS: 1, cS: 1, hidden: false, sel: false }; }

    function render() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        container.style.gridTemplateColumns = `repeat(${grid[0].length}, fit-content(800px))`;
        grid.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell.hidden) return;
                const cellDiv = document.createElement('div');
                cellDiv.className = 'cell';
                cellDiv.style.gridColumn = `span ${cell.cS}`;
                cellDiv.style.gridRow = `span ${cell.rS}`;
                cellDiv.innerHTML = `
                    <div class="top-ui"><input type="checkbox" onchange="grid[${rIdx}][${cIdx}].sel=this.checked"></div>
                    <div class="vocab-list">${cell.items.map((it, i) => `
                        <div class="vocab-item">
                            <input type="text" class="target-input" oninput="updateVal(${rIdx},${cIdx},${i},'t',this.value)" value="${it.t}" placeholder="Cible...">
                            <div class="bracket-wrapper">(<input type="text" class="translation-input" oninput="updateVal(${rIdx},${cIdx},${i},'tr',this.value)" value="${it.tr}" placeholder="Trad...">)</div>
                        </div>`).join('')}</div>`;
                container.appendChild(cellDiv);
            });
        });
    }

    function updateVal(r, c, i, field, val) {
        grid[r][c].items[i][field] = val;
        // Optionnel : ajouter à l'historique après délai
    }

    // NOUVELLE LOGIQUE D'ASSEMBLAGE : Répétition des lignes courtes
    function getAssembledSentences() {
        let all = [];
        grid.forEach(row => {
            let visibleCells = row.filter(c => !c.hidden);
            if (visibleCells.length === 0) return;

            // Trouver le nombre maximum de lignes dans cette rangée
            let maxLinesInRow = Math.max(...visibleCells.map(c => c.items.length));

            for (let l = 0; l < maxLinesInRow; l++) {
                let tParts = [], trParts = [];
                visibleCells.forEach(cell => {
                    // LOGIQUE CARRY-OVER : 
                    // Si la cellule a moins de lignes que le max, on utilise sa dernière ligne disponible (répétition)
                    let indexToUse = Math.min(l, cell.items.length - 1);
                    let item = cell.items[indexToUse];
                    
                    if (item && item.t.trim()) {
                        tParts.push(item.t.trim());
                        trParts.push(item.tr.trim());
                    }
                });
                if (tParts.length > 0) {
                    all.push({ t: tParts.join(' '), tr: trParts.join(' ') });
                }
            }
        });
        return all;
    }

    function generateMasterDoc() {
        const fullList = getAssembledSentences();
        const selectedTypes = Array.from(document.querySelectorAll('#activity-list input:checked')).map(cb => cb.value);
        const studyLimit = parseInt(document.getElementById('study-list-count').value);
        
        let html = `<html><head><meta charset="UTF-8"><style>body{font-family:Arial;} .blue{color:#2980b9; font-style:italic; font-weight:bold;}</style></head><body>`;

        selectedTypes.forEach(type => {
            // Sélection des phrases : limite à 10 sauf pour la liste d'étude
            let limit = (type === 'study') ? studyLimit : 10;
            let subset = [...fullList].sort(() => 0.5 - Math.random()).slice(0, limit);
            
            html += `<h2>${ACTIVITIES.find(a => a.id === type).label}</h2>`;
            
            subset.forEach((s, i) => {
                let content = `${i+1}. `;
                if(type==='study') content += `<b>${s.t}</b> <span class="blue">(${s.tr})</span>`;
                if(type==='vowels') content += `${s.t.replace(/[aeiouàâéèêëîïôûù]/gi, '_')} (${s.tr})`;
                if(type==='consonants') content += `${s.t.replace(/[^aeiouàâéèêëîïôûù\s]/gi, '_')} (${s.tr})`;
                if(type==='no-spaces') content += `${s.t.replace(/\s/g, '').toLowerCase()} (${s.tr})`;
                if(type==='to-target') content += `(${s.tr}) : _________________________________________________`;
                if(type==='to-trans') content += `${s.t} : <span class="blue">______________________________________</span>`;
                if(type==='jumbled') content += `[ ${s.t.split(' ').sort(()=>0.5-Math.random()).join(' / ')} ] (${s.tr})`;
                if(type==='bad-trans') {
                    let isCorrect = Math.random() > 0.5;
                    let displayTr = isCorrect ? s.tr : fullList[Math.floor(Math.random()*fullList.length)].tr;
                    content += `Vrai ou Faux ? <b>${s.t}</b> = <i>${displayTr}</i> ( ________ )`;
                }
                html += `<p>${content}</p>`;
            });
            html += `<hr style="page-break-after:always;">`;
        });

        html += `</body></html>`;
        saveAs(new Blob(['\ufeff', html], {type:'application/msword'}), "Fiche_Activites.doc");
        closeActivityMenu();
    }

    function openActivityMenu() {
        document.getElementById('activity-list').innerHTML = ACTIVITIES.map(a => `<label class="menu-row"><input type="checkbox" value="${a.id}"> ${a.label}</label>`).join('');
        document.getElementById('activity-menu').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeActivityMenu() { 
        document.getElementById('activity-menu').style.display = 'none'; 
        document.getElementById('overlay').style.display = 'none'; 
    }

    function insertRow(i) { grid.splice(i, 0, Array.from({length: grid[0].length}, () => c())); render(); }
    function insertCol(i) { grid.forEach(r => r.splice(i, 0, c())); render(); }
    function saveProject() { saveAs(new Blob([JSON.stringify(grid)], {type: "application/json"}), "projet_substitution.json"); }
    
    render();
</script>
</body>
</html>
