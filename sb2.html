<body>

<script>
    let grid = [[c(), c(), c()], [c(), c(), c()]];
    let history = [JSON.stringify(grid)];
    let historyStep = 0;
    let currentMode = null;
    let typingTimer;
    
    const allColors = [
        "#ffffff", "#f1f5f9", "#fee2e2", "#ffedd5", "#fef9c3", "#dcfce7", "#d1fae5", 
        "#e0f2fe", "#e0e7ff", "#ede9fe", "#fae8ff", "#fce7f3", "#ffccd5", "#bbf7d0"
    ];

    function c() { return { items: [{t: "", tr: ""}], color: "#ffffff", rS: 1, cS: 1, hidden: false, sel: false, split: false }; }

    function pushHistory() {
        const state = JSON.stringify(grid);
        if (state === history[historyStep]) return;
        history = history.slice(0, historyStep + 1);
        history.push(state);
        historyStep++;
    }

    function undo() { if (historyStep > 0) { historyStep--; grid = JSON.parse(history[historyStep]); render(false); } }
    function redo() { if (historyStep < history.length - 1) { historyStep++; grid = JSON.parse(history[historyStep]); render(false); } }

    function render(doSave = true) {
        if (doSave) pushHistory();
        const container = document.getElementById('grid-container');
        container.innerHTML = '';
        const cols = grid[0].length;
        container.style.gridTemplateColumns = `repeat(${cols}, fit-content(900px))`;

        grid.forEach((row, r) => {
            row.forEach((cell, cIdx) => {
                if (cell.hidden) return;
                const cellDiv = document.createElement('div');
                cellDiv.className = `cell ${cell.split ? 'is-split' : ''}`;
                cellDiv.style.gridColumn = `span ${cell.cS}`;
                cellDiv.style.gridRow = `span ${cell.rS}`;
                cellDiv.style.backgroundColor = cell.color;

                const listHTML = cell.items.map((item, i) => `
                    <div class="vocab-item">
                        <input type="text" class="target-input" placeholder="Target" data-pos="${r}-${cIdx}-${i}"
                            onkeydown="handleKey(event, ${r}, ${cIdx}, ${i})" 
                            oninput="updateVal(${r},${cIdx},${i},'t',this.value); syncSize(this)" value="${item.t}">
                        <div class="bracket-wrapper"><span>(</span>
                        <input type="text" class="translation-input" placeholder="Translation" 
                            onkeydown="handleKey(event, ${r}, ${cIdx}, ${i})" 
                            oninput="updateVal(${r},${cIdx},${i},'tr',this.value); syncSize(this)" value="${item.tr}">
                        <span>)</span></div>
                    </div>
                `).join('');

                cellDiv.innerHTML = `
                    <div class="top-ui no-export"><input type="checkbox" class="cell-checkbox" ${cell.sel ? 'checked' : ''} onchange="grid[${r}][${cIdx}].sel=this.checked"></div>
                    <div class="vocab-list ${cell.split ? 'split' : ''}">${listHTML}</div>
                    <div class="bottom-ui no-export">
                        <span class="icon-btn" onclick="toggleCellSplit(${r},${cIdx})">Ξ</span>
                        <span class="icon-btn" onclick="showColors(event, ${r}, ${cIdx})">🎨</span>
                        <div class="color-picker" id="cp-${r}-${cIdx}">${allColors.map(p => `<div class="swatch" style="background:${p}" onclick="setClr(${r},${cIdx},'${p}')"></div>`).join('')}</div>
                    </div>
                `;
                
                if (currentMode === 'add-col' && r === 0) {
                    addIcon(cellDiv, 'btn-plus', 'left', '+', () => insertCol(cIdx));
                    if (cIdx === cols - 1) addIcon(cellDiv, 'btn-plus', 'right', '+', () => insertCol(cols));
                }
                if (currentMode === 'del-col' && r === 0) addIcon(cellDiv, 'btn-minus', 'top-center', '×', () => deleteCol(cIdx));
                if (currentMode === 'add-row' && cIdx === 0) {
                    addIcon(cellDiv, 'btn-plus', 'top-edge', '+', () => insertRow(r));
                    if (r === grid.length - 1) addIcon(cellDiv, 'btn-plus', 'bottom-edge', '+', () => insertRow(grid.length));
                }
                if (currentMode === 'del-row' && cIdx === 0) addIcon(cellDiv, 'btn-minus', 'left-edge', '×', () => deleteRow(r));

                container.appendChild(cellDiv);
                cellDiv.querySelectorAll('input').forEach(syncSize);
            });
        });
    }

    function updateVal(r, cIdx, i, f, v) { 
        grid[r][cIdx].items[i][f] = v; 
        clearTimeout(typingTimer); 
        typingTimer = setTimeout(pushHistory, 1000); 
    }

    function syncSize(el) { 
        if (el.value === "") {
            el.style.width = el.classList.contains('target-input') ? "120px" : "90px"; 
        } else {
            el.style.width = '0px'; 
            el.style.width = (el.scrollWidth + 5) + 'px'; 
        } 
    }

    function handleKey(e, r, cIdx, i) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            grid[r][cIdx].items.splice(i+1, 0, {t:"", tr:""}); 
            render();
            setTimeout(() => {
                const nextInput = document.querySelector(`input[data-pos="${r}-${cIdx}-${i+1}"]`);
                if(nextInput) nextInput.focus();
            }, 10);
        }
        if (e.key === 'Backspace' && e.target.value === "" && grid[r][cIdx].items.length > 1) {
            e.preventDefault(); 
            grid[r][cIdx].items.splice(i, 1); 
            render();
            setTimeout(() => {
                const prevInput = document.querySelector(`input[data-pos="${r}-${cIdx}-${Math.max(0, i-1)}"]`);
                if(prevInput) prevInput.focus();
            }, 10);
        }
    }

    function openPreview() {
        const sentences = getAssembledSentences();
        const content = sentences.map((s, i) => `<div class="preview-sentence">${i+1}. <b>${s.t}</b> <span class="tr-text">(${s.tr})</span></div>`).join('');
        document.getElementById('preview-content').innerHTML = content || "No content yet. Add some vocabulary to the grid!";
        document.getElementById('preview-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function openActivityMenu() {
        const list = [
            {id:'study', label:'Sentence Table'}, {id:'match', label:'Match up'},
            {id:'nospaces', label:'No Spaces'}, {id:'jumbled', label:'Unjumble'}, 
            {id:'gap-en', label:'Gap Fill (English)'}, {id:'gap-t', label:'Gap Fill (TL)'}, 
            {id:'vowels', label:'Missing Vowels'}, {id:'cons', label:'Missing Consonants'}, 
            {id:'faulty', label:'Faulty Translation'}, {id:'trans-en', label:'Translate (English)'}, 
            {id:'trans-target', label:'Translate (TL)'}
        ];
        
        document.getElementById('activity-list').innerHTML = list.map(a => `
            <div class="activity-row">
                <input type="checkbox" value="${a.id}" id="chk-${a.id}"> 
                <label for="chk-${a.id}" style="cursor:pointer">${a.label}</label>
            </div>
        `).join('');
        
        document.getElementById('activity-menu').style.display = 'block'; 
        document.getElementById('overlay').style.display = 'block';
    }

    function toggleAllActivities(master) {
        document.querySelectorAll('#activity-list input').forEach(cb => cb.checked = master.checked);
    }

  function generateWorksheet() {
    const count = parseInt(document.getElementById('sentence-count').value);
    const activityOrder = ['study', 'match', 'nospaces', 'jumbled', 'gap-en', 'gap-t', 'vowels', 'cons', 'faulty', 'trans-en', 'trans-target'];
    const selected = activityOrder.filter(id => document.getElementById(`chk-${id}`).checked);

    if (selected.length === 0) return alert("Select at least one activity!");

    // 1. Gather all combinations organized by row
    let rowBuckets = [];
    for (let r = 0; r < grid.length; r++) {
        let rowSents = getSentencesByRow(r);
        if (rowSents.length > 0) {
            // Shuffle each row's internal sentences first
            rowBuckets.push(rowSents.sort(() => 0.5 - Math.random()));
        }
    }

    if (rowBuckets.length === 0) return alert("Please fill in some vocab first!");

    // Helper: Picks 'limit' sentences distributed evenly across rows
    function getBalancedSelection(limit) {
        let selection = [];
        let tempBuckets = rowBuckets.map(b => [...b]); // Clone buckets to avoid depleting master
        let bucketIndex = 0;

        // Keep picking one sentence from each row bucket until we hit the limit 
        // or run out of all possible sentences
        while (selection.length < limit) {
            let activeBuckets = tempBuckets.filter(b => b.length > 0);
            if (activeBuckets.length === 0) break; // Safety: no more sentences available

            if (tempBuckets[bucketIndex].length > 0) {
                selection.push(tempBuckets[bucketIndex].shift());
            }
            
            bucketIndex = (bucketIndex + 1) % tempBuckets.length;
        }
        // Shuffle the result so it's not ordered by row
        return selection.sort(() => 0.5 - Math.random());
    }

    // 2. Generate HTML
    const line = "<br><br>__________________________________________________________________<br>";
    let html = `<html><head><meta charset="utf-8"><style>body{font-family:Arial; line-height:1.4;} .blue{color:#2980b9; font-style:italic;} table{width:100%; border-collapse:collapse; margin-bottom:20px;} td,th{border:1px solid black; padding:3px 8px;}</style></head><body>`;

    selected.forEach(type => {
        const label = document.querySelector(`label[for="chk-${type}"]`).innerText;
        html += `<h2>${label}</h2>`;
        
        // CRITICAL FIX: Study gets 'count' (10/20/50), others get 10.
        // We call the helper inside the loop so every activity is unique.
        let currentSents = (type === 'study') ? getBalancedSelection(count) : getBalancedSelection(10);

        if (type === 'study') {
            html += `<table><tr><th>Target Language</th><th>English</th></tr>`;
            currentSents.forEach(s => html += `<tr><td><b>${s.t}</b></td><td class="blue">${s.tr}</td></tr>`);
            html += `</table>`;
        } else if (type === 'match') {
            let pool = [...currentSents];
            let shuf = [...pool].sort(() => 0.5 - Math.random());
            html += `<table>`;
            pool.forEach((s, i) => html += `<tr><td style="border:none; padding:8px;">${i+1}. ${s.t}</td><td style="border:none; width:50px; text-align:center;">[ &nbsp; ]</td><td style="border:none; padding:8px;">${String.fromCharCode(65+i)}. ${shuf[i].tr}</td></tr>`);
            html += `</table>`;
        } else {
            currentSents.forEach((s, i) => {
                let out = s.t, hint = `<span class="blue">(${s.tr})</span>`;
                if (type === 'vowels' || type === 'cons') {
                    let pattern = (type === 'vowels') ? /[aeiouàéèíóúü]/gi : /[bcdfghjklmnpqrstvwxyz]/gi;
                    out = s.t.replace(pattern, '_').split(' ').join('&nbsp;&nbsp;&nbsp;');
                }
                else if (type === 'nospaces') out = s.t.replace(/\s+/g, '').toLowerCase();
                else if (type === 'jumbled') out = s.t.split(' ').sort(() => 0.5 - Math.random()).join(' / ');
                else if (type === 'gap-t') { 
                    let w = s.t.split(' '); 
                    let idx = Math.floor(Math.random() * w.length);
                    w[idx] = "________"; out = w.join(' '); 
                }
                else if (type === 'gap-en') { 
                    let w = s.tr.split(' '); 
                    let idx = Math.floor(Math.random() * w.length);
                    w[idx] = "________"; out = s.t; hint = `<span class="blue">(${w.join(' ')})</span>`; 
                }
                else if (type === 'trans-en') { out = s.t; hint = ""; }
                else if (type === 'trans-target') { out = `<span class="blue">${s.tr}</span>`; hint = ""; }
                else if (type === 'faulty') {
                    let parts = [...s.parts];
                    let idx = Math.floor(Math.random() * parts.length);
                    let rowSents = getSentencesByRow(parts[idx].row || 0); 
                    let alt = rowSents.filter(f => f.parts[idx] && f.parts[idx].tr !== parts[idx].tr);
                    let faultyTr = (alt.length > 0) ? alt[Math.floor(Math.random()*alt.length)].parts[idx].tr : "???";
                    let translatedParts = parts.map((p, i) => i === idx ? faultyTr : p.tr);
                    html += `<p>${i+1}. ${s.t} = <span class="blue">${translatedParts.join(' ')}</span>${line}</p>`; 
                    return;
                }
                html += `<p>${i+1}. ${out} ${hint}${line}</p>`;
            });
        }
        html += `<hr style="page-break-after:always;">`;
    });

    saveAs(new Blob(['\ufeff', html], { type: 'application/msword' }), "Worksheet.doc");
    closeModals();
}

// Helper to isolate Cartesian product to a single row
function getSentencesByRow(r) {
    let pathCells = [];
    for (let c = 0; c < grid[0].length; c++) {
        let cell = getCellAt(r, c);
        if (!cell || cell.hidden || (c > 0 && getCellAt(r, c - 1) === cell)) continue;
        let items = cell.items.filter(it => it.t.trim() || it.tr.trim());
        if (items.length > 0) pathCells.push(items.map(it => ({ t: it.t.trim(), tr: it.tr.trim(), col: c })));
    }
    return pathCells.length ? cartesian(pathCells).map(combo => ({ t: combo.map(p => p.t).join(' '), tr: combo.map(p => p.tr).join(' '), parts: combo })) : [];
}

  function getAssembledSentences() {
    let allCompiled = [];
    
    // We process the grid row by row to find valid horizontal paths
    for (let r = 0; r < grid.length; r++) {
        let pathCells = [];
        for (let c = 0; c < grid[0].length; c++) {
            let cell = getCellAt(r, c);
            // Avoid adding the same merged cell multiple times
            if (!cell || cell.hidden || (c > 0 && getCellAt(r, c - 1) === cell)) continue;
            
            // Collect items from this cell
            let validItems = cell.items.filter(it => it.t.trim() || it.tr.trim());
            if (validItems.length > 0) {
                pathCells.push(validItems.map(it => ({
                    t: it.t.trim(),
                    tr: it.tr.trim(),
                    col: c
                })));
            }
        }

        if (pathCells.length > 0) {
            // Generate every possible combination for this row's path
            let combinations = cartesian(pathCells);
            
            combinations.forEach(combo => {
                allCompiled.push({
                    t: combo.map(p => p.t).join(' '),
                    tr: combo.map(p => p.tr).join(' '),
                    parts: combo
                });
            });
        }
    }
    return allCompiled;
}

// Helper function to calculate Cartesian Product of multiple arrays
function cartesian(args) {
    return args.reduce((a, b) => {
        let ret = [];
        a.forEach(a_item => {
            b.forEach(b_item => {
                ret.push(a_item.concat([b_item]));
            });
        });
        return ret;
    }, [[]]);
}

    function getCellAt(r, c) { for (let row = 0; row <= r; row++) { for (let col = 0; col <= c; col++) { let cell = grid[row][col]; if (!cell.hidden && r < row + cell.rS && c < col + cell.cS) return cell; } } return null; }
    
    function mergeSelected() {
        let sel = []; grid.forEach((row, r) => row.forEach((cell, cIdx) => { if(cell.sel) sel.push({r, c: cIdx}); }));
        if(sel.length < 2) return;
        let root = sel[0], items = [];
        sel.forEach(p => { items = [...items, ...grid[p.r][p.c].items.filter(it => it.t || it.tr)]; });
        let maxR = Math.max(...sel.map(i => i.r + grid[i.r][i.c].rS)), maxC = Math.max(...sel.map(i => i.c + grid[i.r][i.c].cS));
        grid[root.r][root.c].items = items.length ? items : [{t:"", tr:""}];
        grid[root.r][root.c].rS = maxR - root.r; grid[root.r][root.c].cS = maxC - root.c;
        grid[root.r][root.c].sel = false;
        for(let r=root.r; r<maxR; r++) for(let c=root.c; c<maxC; c++) { if(r===root.r && c===root.c) continue; grid[r][c].hidden = true; grid[r][c].sel = false; }
        render();
    }
    function splitSelected() {
        grid.forEach((row, r) => row.forEach((cell, cIdx) => {
            if (cell.sel && (cell.rS > 1 || cell.cS > 1)) {
                const rs = cell.rS; const cs = cell.cS;
                for (let i = r; i < r + rs; i++) for (let j = cIdx; j < cIdx + cs; j++) {
                    grid[i][j].hidden = false; grid[i][j].rS = 1; grid[i][j].cS = 1; grid[i][j].sel = false;
                    if (i !== r || j !== cIdx) { grid[i][j].items = [{t: "", tr: ""}]; grid[i][j].color = "#ffffff"; }
                }
            }
            grid[r][cIdx].sel = false;
        }));
        render();
    }
    async function exportPDF() {
        const title = document.getElementById('builder-title').value;
        const edits = document.querySelectorAll('.no-export, .action-btn');
        edits.forEach(el => el.style.visibility = 'hidden');
        const canvas = await html2canvas(document.getElementById('grid-container'), { scale: 2 });
        edits.forEach(el => el.style.visibility = 'visible');
        const pdf = new jspdf.jsPDF('l', 'mm', 'a4');
        pdf.text(title, 14, 15);
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 20, 275, 0);
        pdf.save(`${title}.pdf`);
    }
    function toggleCellSplit(r, c) { grid[r][c].split = !grid[r][c].split; render(); }
    function setClr(r, c, clr) { grid[r][c].color = clr; render(); }
    function toggleMode(m) { currentMode = (currentMode === m) ? null : m; render(false); }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('overlay').style.display = 'none'; }
    function saveProject() { saveAs(new Blob([JSON.stringify(grid)], {type: "application/json"}), "project.json"); }
    function loadProject(e) { const fr = new FileReader(); fr.onload = (ev) => { grid = JSON.parse(ev.target.result); history = [JSON.stringify(grid)]; historyStep = 0; render(false); }; fr.readAsText(e.target.files[0]); }
    function insertRow(i) { grid.splice(i, 0, Array.from({length: grid[0].length}, () => c())); currentMode = null; render(); }
    function insertCol(i) { grid.forEach(r => r.splice(i, 0, c())); currentMode = null; render(); }
    function deleteRow(i) { if(grid.length > 1) { grid.splice(i, 1); currentMode = null; render(); } }
    function deleteCol(i) { if(grid[0].length > 1) { grid.forEach(r => r.splice(i, 1)); currentMode = null; render(); } }
    function addIcon(p, t, pos, l, a) { const b = document.createElement('div'); b.className = `action-btn ${t}`; b.innerText = l; b.style = { 'left': 'left:-15px; top:45%;', 'right': 'right:-15px; top:45%;', 'top-center': 'top:-15px; left:45%;', 'top-edge': 'top:-15px; left:15px;', 'bottom-edge': 'bottom:-15px; left:15px;', 'left-edge': 'left:-15px; top:15px;' }[pos]; b.onclick = (e) => { e.stopPropagation(); a(); }; p.appendChild(b); }
    function showColors(e, r, c) { e.stopPropagation(); document.querySelectorAll('.color-picker').forEach(p => p.style.display = 'none'); document.getElementById(`cp-${r}-${c}`).style.display = 'grid'; }
    window.onclick = () => document.querySelectorAll('.color-picker').forEach(p => p.style.display = 'none');
    render(false);
</script>
