function getAssembledSentences() {
    let allSentences = [];
    for (let r = 0; r < grid.length; r++) {
        if (!grid[r][0].hidden) {
            allSentences = allSentences.concat(findPaths(r, 0, r));
        }
    }

    const unique = [];
    const seen = new Set();
    allSentences.forEach(s => {
        const text = s.t.trim();
        if (text && !seen.has(text)) {
            unique.push(s);
            seen.add(text);
        }
    });
    return unique;
}

function findPaths(r, c, originRow) {
    let cell = getCellAt(r, c);
    if (!cell) return [];

    let cellColSpan = cell.cS || 1;
    let nextCol = c + cellColSpan;

    let currentOptions = (cell.items || [])
        .filter(it => it.t && it.t.trim() !== "")
        .map(it => ({
            t: it.t.trim(),
            tr: it.tr ? it.tr.trim() : "",
            originRow: originRow, 
            parts: [{ t: it.t, tr: it.tr || "", r: r, c: c }],
            details: [{ tWord: it.t, eWord: it.tr || "", r: r, c: c }]
        }));

    if (nextCol >= grid[0].length) {
        return currentOptions.filter(path => !isExcludedCombination(path.parts));
    }

    let combinedSubPaths = [];

    const isColumnBridge = (colIdx) => {
        if (colIdx >= grid[0].length) return false;
        return grid.every(row => {
            const cEl = row[colIdx];
            return !cEl || !cEl.items || cEl.items.every(it => !it.t || it.t.trim() === "");
        });
    };

    if (isColumnBridge(nextCol)) {
        let targetCol = nextCol + 1;
        while (isColumnBridge(targetCol) && targetCol < grid[0].length) targetCol++;

        if (targetCol < grid[0].length) {
            for (let tr = 0; tr < grid.length; tr++) {
                let targetCell = grid[tr][targetCol];
                if (targetCell && !targetCell.hidden) {
                    combinedSubPaths = combinedSubPaths.concat(findPaths(tr, targetCol, originRow));
                }
            }
        }
    } else {
        for (let tr = 0; tr < grid.length; tr++) {
            let nextCell = grid[tr][nextCol];
            if (!nextCell) continue;

            let targetCell = nextCell.hidden ? getCellAt(tr, nextCol) : nextCell;
            if (!targetCell) continue;

            let targetRootRow = tr;
            if (nextCell.hidden) {
                for (let testR = tr; testR >= 0; testR--) {
                    if (!grid[testR][nextCol].hidden) {
                        targetRootRow = testR;
                        break;
                    }
                }
            }

            const nextStart = targetRootRow;
            const nextEnd = targetRootRow + (targetCell.rS || 1);

            if (originRow >= nextStart && originRow < nextEnd) {
                if (tr === targetRootRow) {
                    combinedSubPaths = combinedSubPaths.concat(findPaths(tr, nextCol, originRow));
                }
            }
        }
    }

    if (currentOptions.length === 0) return combinedSubPaths.filter(p => !isExcludedCombination(p.parts));
    if (combinedSubPaths.length === 0) return currentOptions.filter(p => !isExcludedCombination(p.parts));

    let finalPaths = [];
    currentOptions.forEach(curr => {
        combinedSubPaths.forEach(sub => {
            const combinedParts = [...curr.parts, ...sub.parts];
            const combinedDetails = [...(curr.details || []), ...(sub.details || [])];
            
            if (!isExcludedCombination(combinedParts)) {
                finalPaths.push({
                    t: (curr.t + " " + sub.t).trim(),
                    tr: (curr.tr + " " + sub.tr).trim(),
                    originRow: originRow, 
                    parts: combinedParts,
                    details: combinedDetails
                });
            }
        });
    });

    return finalPaths;
}

function getCellAt(r, c) {
    if (r < 0 || r >= grid.length || c < 0 || c >= grid[0].length) return null;
    let cell = grid[r][c];
    if (!cell.hidden) return cell;

    for (let i = r; i >= 0; i--) {
        for (let j = c; j >= 0; j--) {
            let root = grid[i][j];
            if (root && !root.hidden && (i + (root.rS || 1) > r) && (j + (root.cS || 1) > c)) {
                return root;
            }
        }
    }
    return cell;
}

function toggleAllActivities(master) {
    document.querySelectorAll('#activity-list input').forEach(cb => cb.checked = master.checked);
}

function generateWorksheet() {
    const activityOrder = ['study', 'match', 'nospaces', 'jumbled', 'gap-en', 'gap-t', 'vowels', 'cons', 'faulty', 'trans-en', 'trans-target'];
    const selected = activityOrder.filter(id => {
        const el = document.getElementById(`chk-${id}`);
        return el && el.checked;
    });
    
    if (selected.length === 0) return alert("Select at least one activity!");

    const allSentences = getAssembledSentences();
    if (allSentences.length === 0) return alert("Prerequisite: Structure combinations required.");

    let rowBuckets = {};
    allSentences.forEach(s => {
        const r = s.originRow;
        if (!rowBuckets[r]) rowBuckets[r] = [];
        rowBuckets[r].push(s);
    });

    const bucketList = Object.keys(rowBuckets).map(r => ({
        rowIndex: parseInt(r),
        sentences: rowBuckets[r]
    }));

    const getBalancedSelection = (limit) => {
        let selection = [];
        let tempBuckets = bucketList.map(b => {
            let shuffledSents = [...b.sentences].sort(() => 0.5 - Math.random());
            return { ...b, sentences: shuffledSents };
        });

        let bucketPointer = 0;
        while (selection.length < limit) {
            let activeBuckets = tempBuckets.filter(b => b.sentences.length > 0);
            if (activeBuckets.length === 0) break;
            
            if (tempBuckets[bucketPointer].sentences.length === 0) {
                bucketPointer = (bucketPointer + 1) % tempBuckets.length;
                continue;
            }

            selection.push(tempBuckets[bucketPointer].sentences.shift());
            bucketPointer = (bucketPointer + 1) % tempBuckets.length;
        }
        return selection;
    };

    let contentHtml = "";
    let answerKeyHtml = "<br clear='all' style='page-break-before:always' /><div><h2>Answer Key</h2>";

    selected.forEach(type => {
        const labelEl = document.querySelector(`label[for="chk-${type}"]`);
        const label = labelEl ? labelEl.innerText : type;
        let activityHtml = `<div class="activity-container"><h2>${label}</h2>`;
        
        let isStudy = (type === 'study');
        const countDropdown = document.getElementById('sentence-count');
        const chosenLimit = countDropdown ? parseInt(countDropdown.value, 10) : 20;

        let currentSents = getBalancedSelection(isStudy ? chosenLimit : 10);
        currentSents.sort((a, b) => a.originRow - b.originRow);

        let activityAnswersHtml = "";
        if (!isStudy) {
            activityAnswersHtml += `<h3>${label}</h3><ol>`;
        }

        if (type === 'study') {
            activityHtml += `<table><tr><th>Target Language</th><th>English</th></tr>`;
            currentSents.forEach(s => {
                activityHtml += `<tr><td><b>${s.t}</b></td><td class="blue">${s.tr}</td></tr>`;
            });
            activityHtml += `</table>`;
        } else if (type === 'match') {
            let shuf = [...currentSents].sort(() => 0.5 - Math.random());
            activityHtml += `<table>`;
            currentSents.forEach((s, i) => {
                activityHtml += `<tr><td style="border:none;">${i+1}. ${s.t}</td><td style="border:none; width:40pt; text-align:center;">[ &nbsp; ]</td><td style="border:none;">${String.fromCharCode(65+i)}. ${shuf[i].tr}</td></tr>`;
                
                let matchIndex = shuf.indexOf(s);
                let correctLetter = String.fromCharCode(65 + matchIndex);
                activityAnswersHtml += `<li>${correctLetter}</li>`;
            });
            activityHtml += `</table>`;
        } else {
            currentSents.forEach((s, i) => {
                let out = s.t, hint = `<span class="blue">(${s.tr})</span>`;
                let answerText = s.t; 
                
                if (type === 'vowels') {
                    let text = s.t.replace(/[aeiouAEIOU]/g, '_');
                    activityHtml += `<div>${i+1}. ${text} ${hint}</div>`;
                    activityAnswersHtml += `<li>${s.t}</li>`;
                } else if (type === 'cons') {
                    let text = s.t.replace(/[^aeiouAEIOU\s\d\W]/g, '_');
                    activityHtml += `<div>${i+1}. ${text} ${hint}</div>`;
                    activityAnswersHtml += `<li>${s.t}</li>`;
                } else if (type === 'nospaces') {
                    let text = s.t.replace(/\s+/g, '');
                    activityHtml += `<div>${i+1}. ${text} ${hint}</div>`;
                    activityAnswersHtml += `<li>${s.t}</li>`;
                } else if (type === 'jumbled') {
                    let words = s.t.split(/\s+/).sort(() => 0.5 - Math.random()).join(' / ');
                    activityHtml += `<div>${i+1}. [ ${words} ] ${hint}</div>`;
                    activityAnswersHtml += `<li>${s.t}</li>`;
                } else if (type === 'gap-en') {
                    let words = s.tr.split(/\s+/);
                    let idx = Math.floor(Math.random() * words.length);
                    let removed = words[idx];
                    words[idx] = '_______';
                    activityHtml += `<div>${i+1}. <b>${s.t}</b> <br><i>English: ${words.join(' ')}</i></div>`;
                    activityAnswersHtml += `<li>${removed}</li>`;
                } else if (type === 'gap-t') {
                    let words = s.t.split(/\s+/);
                    let idx = Math.floor(Math.random() * words.length);
                    let removed = words[idx];
                    words[idx] = '_______';
                    activityHtml += `<div>${i+1}. ${words.join(' ')} ${hint}</div>`;
                    activityAnswersHtml += `<li>${removed}</li>`;
                } else if (type === 'trans-en') {
                    activityHtml += `<div>${i+1}. ${s.t} <br><br>____________________________________________________</div>`;
                    activityAnswersHtml += `<li>${s.tr}</li>`;
                } else if (type === 'trans-target') {
                    activityHtml += `<div>${i+1}. <i>${s.tr}</i> <br><br>____________________________________________________</div>`;
                    activityAnswersHtml += `<li>${s.t}</li>`;
                } else {
                    activityHtml += `<div>${i+1}. ${out} ${hint}</div>`;
                    activityAnswersHtml += `<li>${answerText}</li>`;
                }
            });
        }
        activityHtml += `</div>`;
        contentHtml += activityHtml;
        if (!isStudy) {
            activityAnswersHtml += `</ol>`;
            answerKeyHtml += activityAnswersHtml;
        }
    });

    answerKeyHtml += "</div>";
    
    // Open a print execution view frame
    let win = window.open("", "_blank");
    win.document.write(`
        <html>
        <head>
            <title>Worksheet Output</title>
            <style>
                body { font-family: system-ui, sans-serif; padding: 30px; color: #1e293b; background: #fff; }
                .activity-container { margin-bottom: 40px; page-break-inside: avoid; }
                h2 { border-bottom: 2px solid #cbd5e1; padding-bottom: 8px; margin-bottom: 15px; color: #000; }
                table { width: 100%; border-collapse: collapse; margin-top: 10px; }
                th, td { border: 1px solid #cbd5e1; padding: 10px; text-align: left; }
                th { background: #f1f5f9; font-weight: bold; }
                div { margin-bottom: 12px; font-size: 15px; line-height: 1.6; }
                .blue { color: #2980b9; font-style: italic; }
            </style>
        </head>
        <body>
            ${contentHtml}
            ${answerKeyHtml}
        </body>
        </html>
    `);
    win.document.close();
}

function isExcludedCombination(parts) {
    if (!parts || parts.length < 2 || excludedPairs.length === 0) return false;
    for (let i = 0; i < parts.length - 1; i++) {
        const currentPart = parts[i];
        const nextPart = parts[i + 1];
        
        const matchingPair = excludedPairs.some(pair => {
            const matchA_Current = (pair.a.r === currentPart.r && pair.a.c === currentPart.c);
            const matchB_Next = (pair.b.r === nextPart.r && pair.b.c === nextPart.c);
            const matchB_Current = (pair.b.r === currentPart.r && pair.b.c === currentPart.c);
            const matchA_Next = (pair.a.r === nextPart.r && pair.a.c === nextPart.c);
            
            return (matchA_Current && matchB_Next) || (matchB_Current && matchA_Next);
        });
        
        if (matchingPair) return true;
    }
    return false;
}
