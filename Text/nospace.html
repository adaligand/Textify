<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No spaces</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            padding: 40px;
            box-sizing: border-box;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        .english-text-box {
            margin-bottom: 20px;
            font-size: 20px;
            padding: 12px 20px;
            border: 2px solid #ccc;
            text-align: justify;
            border-radius: 10px;
            background-color: #f9f9f9;
            width: 100%;
            box-sizing: border-box;
        }
        .exercise-box {
            font-size: 24px;
            word-wrap: break-word;
            white-space: pre-wrap;
            text-align: justify;
            margin-top: 15px;
            margin-bottom: 15px;
            width: 100%;
            line-height: 2;
        }
        .space-span, .letter-span {
            cursor: pointer;
            user-select: none;
        }
        .space-span {
            background-color: #f0f0f0;
            border-radius: 4px;
            padding: 0 2px;
        }
        .hide {
            display: none !important;
        }
        .counter-container {
            text-align: center;
            margin: 0;
            margin-top: 20px;
            width: 100%;
        }
        .counter,
        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin: 5px 0;
        }
        .wrong-number {
            color: #dc3545;
        }
        .correct-number {
            color: #28a745;
        }

        /* Light Grey Button Styling */
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        /* Leaderboard Box & Table Styling */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
            width: 100%;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">No spaces</div>
        <div class="subtitle" id="subtitle">Click where you want to insert spaces to recreate the correct text.</div>
        
        <!-- Active Gameplay View -->
        <div id="game-screen" style="width: 100%;">
            <div class="english-text-box hide" id="englishText"></div>
            <div id="frenchText" class="hide"></div>

            <div class="exercise-box" style="display: none;">
                <p class="frenchText no-spaces" id="exercise-frenchText"></p>
            </div>
            <div class="counter-container">
                <div class="counter" id="counter" style="display: none;">Spaces remaining: 0</div>
                <div class="feedback" id="feedback"></div>
                <div class="feedback" id="wrong-clicks" style="display: none;">Wrong clicks: <span class="wrong-number">0</span></div>
                <div class="feedback" id="correct-clicks" style="display: none;">Correct clicks: <span class="correct-number">0</span></div>
            </div>
        </div>

        <!-- Summary End Screen with Leaderboard -->
        <div id="end-screen" class="hide" style="width: 100%;">
            <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

            <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
                <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
                <div id="leaderboardStatus"></div>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Accuracy</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
                <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
            </div>
        </div>
    </div>

<script>
    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
    const GAME_NAME = "Text_NoSpaces";

    let wrongClicks = [];
    let correctClicks = 0;
    let totalTargetSpaces = 0;

    let startTime = 0;
    let isFinished = false;

    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
        document.getElementById('subtitle').textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
    } else {
        document.getElementById('subtitle').textContent = "Loading data...";
        Papa.parse(sheetUrl, {
            download: true,
            header: false,
            skipEmptyLines: false,
            complete: function(results) {
                try {
                    const frenchText = results.data[1][8]; // Cell I2
                    const englishText = results.data[13][8]; // Cell I14

                    if (!frenchText || !englishText) {
                        throw new Error("Text is missing from cell French text & English text.");
                    }

                    document.getElementById('englishText').textContent = englishText.trim();
                    document.getElementById('frenchText').textContent = frenchText.trim();
                    
                    document.getElementById('subtitle').textContent = "Click where you want to insert spaces to recreate the correct text.";
                    document.getElementById('englishText').classList.remove('hide');
                    
                    startGame();

                } catch (e) {
                    document.getElementById('subtitle').textContent = "⚠️ Error reading data. Check your sheet has text in cells French text & English text and is published correctly.";
                    console.error(e);
                }
            },
            error: function(err) {
                document.getElementById('subtitle').textContent = "⚠️ Error loading the CSV file.";
                console.error(err);
            }
        });
    }

    // Enter Key to restart when game is finished
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && isFinished) {
            event.preventDefault();
            resetActivity();
        }
    });

    function startGame() {
        isFinished = false;
        startTime = Date.now();
        wrongClicks = [];
        correctClicks = 0;

        document.getElementById('subtitle').style.display = 'block';
        document.getElementById('game-screen').classList.remove('hide');
        document.getElementById('end-screen').classList.add('hide');
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('leaderboardSection').style.display = 'none';
        document.querySelector('.exercise-box').style.display = 'block';

        const frenchText = document.getElementById('frenchText').textContent;

        let hiddenSpaces = 0;
        const punctuation = ['.', ',', ';', ':', '!', '?'];
        const html = frenchText.split('').map((char, index, arr) => {
            if (char === ' ') {
                const prevChar = arr[index - 1];
                const nextChar = arr[index + 1];
                if (punctuation.includes(prevChar) || punctuation.includes(nextChar)) {
                    return `<span class='letter-span' data-index='${index}'>&nbsp;</span>`;
                } else {
                    hiddenSpaces++;
                    return `<span class='space-span' onclick='check_space(this, ${index})'><span class='space-inner' style='display:none'>&nbsp;</span></span>`;
                }
            } else {
                return `<span class='letter-span' data-index='${index}' onclick='check_space(this, ${index})'>${char}</span>`;
            }
        }).join('');

        totalTargetSpaces = hiddenSpaces;

        document.getElementById('exercise-frenchText').innerHTML = html;
        document.getElementById('counter').innerText = `Spaces remaining: ${hiddenSpaces}`;
        document.getElementById('counter').style.display = 'block';
        document.getElementById('feedback').innerText = '';
        document.querySelector('#wrong-clicks .wrong-number').innerText = '0';
        document.querySelector('#correct-clicks .correct-number').innerText = '0';
        document.getElementById('wrong-clicks').style.display = 'block';
        document.getElementById('correct-clicks').style.display = 'block';
    }

    function check_space(element, index) {
        if (isFinished) return;

        let isCorrectClick = false;

        const checkAdjacent = (sibling) => {
            if (sibling && sibling.classList.contains('space-span')) {
                const spaceInner = sibling.querySelector('.space-inner');
                if (spaceInner && spaceInner.style.display === 'none') {
                    spaceInner.style.display = 'inline';
                    updateCounter(-1);
                    correctClicks++;
                    isCorrectClick = true;
                }
            }
        };

        checkAdjacent(element.previousElementSibling);
        checkAdjacent(element.nextElementSibling);
        if (element.classList.contains('space-span')) {
             checkAdjacent(element);
        }

        if (isCorrectClick) {
            updateCorrectClicks();
        } else {
            if (!element.classList.contains('space-span') || element.querySelector('.space-inner').style.display === 'none') {
                wrongClicks.push(index);
                updateWrongClicks();
            }
        }
        
        // When all spaces are revealed, finish game immediately to show leaderboard summary
        if (document.querySelectorAll('.space-inner[style="display:none"]').length === 0) {
            finishGame();
        }
    }

    function updateCounter(change) {
        const counter = document.getElementById('counter');
        const currentCount = parseInt(counter.innerText.split(':')[1].trim());
        const newCount = currentCount + change;
        counter.innerText = `Spaces remaining: ${newCount}`;
    }

    function updateWrongClicks() {
        document.querySelector('#wrong-clicks .wrong-number').innerText = wrongClicks.length;
    }

    function updateCorrectClicks() {
        document.querySelector('#correct-clicks .correct-number').innerText = correctClicks;
    }

    function finishGame() {
        if (isFinished) return;
        isFinished = true;

        // Hide active gameplay view and header subtitle to transform into summary result screen
        document.getElementById('game-screen').classList.add('hide');
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('end-screen').classList.remove('hide');

        const statusDiv = document.getElementById('leaderboardStatus');
        if (statusDiv) statusDiv.innerHTML = '';

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        
        // Accuracy calculation based on target spaces vs total clicks/errors
        const accuracy = Math.max(0, Math.min(100, Math.round((totalTargetSpaces / (totalTargetSpaces + wrongClicks.length)) * 100)));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        checkQualificationAndLoad(clockFormattedTime, accuracy);
    }

    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if (!tbody) return;
        
        tbody.innerHTML = "";
        if (statusDiv) statusDiv.innerHTML = "";
        
        let rankHeader = document.createElement('h4');
        rankHeader.id = 'personalRankTitle';
        rankHeader.style.fontSize = '18px';
        rankHeader.style.margin = '8px 0';
        if (statusDiv) statusDiv.appendChild(rankHeader);

        if (highlightName) {
            let studentRank = data.findIndex(entry => 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
            ) + 1;

            rankHeader.style.color = '#2ecc71';
            rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
        } else {
            rankHeader.style.color = '#e67e22';
            rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function resetActivity() {
        startGame();
    }
</script>
</body>
</html>
