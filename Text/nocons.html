<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No consonants</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5; /* Light grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }
    .container {
        width: 95%;
        max-width: 1200px;
        padding: 40px;
        box-sizing: border-box;
        background-color: white; /* White background for the game */
        border-radius: 15px; /* Rounded corners */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    .title { 
        font-size: 40px; 
        font-weight: bold; 
        text-align: center; 
        margin-bottom: 20px; 
    }
    .subtitle { 
        font-size: 20px; 
        margin-bottom: 10px; 
        text-align: center; 
    }
    .english-sentence { 
        font-size: 24px; 
        text-align: center; 
        margin-bottom: 20px; 
        padding: 12px 20px; 
        border-radius: 10px; 
        background-color: #f9f9f9; 
        border: 2px solid #ccc;
        width: 100%;
        box-sizing: border-box;
    }
    .french-sentence { 
        font-size: 30px; 
        text-align: center; 
        margin-bottom: 20px; 
        word-spacing: 15px; 
        line-height: 2;
        width: 100%;
    }
    .missing-word { 
        width: 24px; 
        font-size: 28px; 
        font-weight: bold;
        border: none; 
        border-bottom: 2px solid #333; 
        background: transparent; 
        text-align: center; 
        margin-right: 2px; 
        outline: none;
        transition: background-color 0.2s, border-color 0.2s;
    }
    .missing-word:focus {
        border-bottom-color: #007bff;
        background-color: #f0f8ff;
    }
    .correct { 
        background-color: #d4edda !important; 
        border-bottom-color: #28a745 !important;
    }
    .incorrect { 
        background-color: #f8d7da !important; 
        border-bottom-color: #dc3545 !important;
    }
    .keyboard-container { 
        text-align: center; 
        margin-top: 20px; 
        width: 100%;
    }
    .keyboard-button { 
        font-size: 18px; 
        font-weight: bold;
        padding: 10px 16px; 
        margin: 3px; 
        border: 2px solid #ccc; 
        border-radius: 8px; 
        background-color: #f9f9f9; 
        color: #000;
        cursor: pointer; 
        transition: transform 0.1s, background-color 0.1s;
    }
    .keyboard-button:hover { 
        background-color: #e0e0e0; 
        transform: translateY(-2px); 
    }

    /* Light Grey Button Styling */
    .btn {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f9f9f9;
        border: 2px solid #ccc;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px 5px;
        transition: transform 0.2s, background-color 0.2s;
    }
    .btn:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }

    .hide {
        display: none !important;
    }

    .feedback { 
        font-weight: bold; 
        font-size: 20px; 
        display: flex; 
        flex-direction: column;
        gap: 10px; 
        justify-content: center; 
        align-items: center; 
        margin-top: 15px; 
    }

    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
        margin-top: 25px;
        text-align: center;
        border-top: 2px solid #eee;
        padding-top: 20px;
        width: 100%;
    }

    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 16px;
        background-color: #fafafa;
        color: #333;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
        padding: 10px 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
        background-color: #f1f3f5;
        color: #333;
        font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
        border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
        background-color: #d4edda !important;
        color: #155724 !important;
        font-weight: bold;
    }
</style>
</head>
<body>
<div class="container">
    <div class="title">No consonants</div>
    <div class="subtitle" id="subtitle">Fill in the missing consonants</div>

    <!-- Active Gameplay View -->
    <div id="game-screen" style="width: 100%;">
        <div class="english-sentence" id="englishSentence">Loading exercise...</div>
        <div class="french-sentence" id="frenchSentence"></div>
        <div id="keyboardContainer" class="keyboard-container"></div>
        <div id="feedback" class="feedback" style="display:none;">
            <span style="color: #28a745;">🎉 Correct! 🎉</span>
            <button id="nextBtn" class="btn" onclick="finishGame()">Next ➡️</button>
        </div>
    </div>

    <!-- Summary End Screen with Leaderboard -->
    <div id="end-screen" class="hide" style="width: 100%;">
        <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

        <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
            <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
            <div id="leaderboardStatus"></div>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Accuracy</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
        </div>
    </div>
</div>

<script>
// --- LEADERBOARD CONFIGURATION ---
const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
const GAME_NAME = "Text_No_Cons";

let lastFocusedInput = null;
let currentFrenchSentence = '';
let currentEnglishSentence = '';

let startTime = 0;
let totalErrors = 0;
let totalTargetBlanks = 0;
let isFinished = false;

const consonants = /[bcdfghjklmnpqrstvwxyzßçñBCDFGHJKLMNPQRSTVWXYZ]/;

// Get CSV URL from query string
const params = new URLSearchParams(window.location.search);
const csvUrl = params.get('sheet');

function getSpreadsheetId(url) {
    if (!url) return null;
    if (url.includes('/d/e/')) {
        const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return matches ? matches[1] : url;
}
const topicId = csvUrl ? getSpreadsheetId(csvUrl) : null;

if (!csvUrl) {
    document.getElementById('englishSentence').textContent = "⚠️ No CSV URL provided in query string.";
} else {
    // Load CSV
    Papa.parse(csvUrl, {
        download: true,
        header: false,
        skipEmptyLines: false,
        complete: function(results) {
            try {
                const frenchText = results.data[1][8]; 
                const englishText = results.data[13][8];

                if (frenchText && englishText) {
                    currentFrenchSentence = frenchText.trim();
                    currentEnglishSentence = englishText.trim();
                    startNewGame();
                } else {
                    throw new Error("Text not found in the correct cells.");
                }
            } catch (e) {
                console.error(e);
                document.getElementById('englishSentence').textContent = "⚠️ Error: Could not find text in cells French text & English text. Please check your sheet's structure.";
            }
        },
        error: function(err) {
            console.error(err);
            document.getElementById('englishSentence').textContent = "⚠️ CSV load error: " + err;
        }
    });
}

function startNewGame() {
    isFinished = false;
    totalErrors = 0;
    startTime = Date.now();

    document.getElementById('subtitle').style.display = 'block';
    document.getElementById('game-screen').classList.remove('hide');
    document.getElementById('end-screen').classList.add('hide');
    document.getElementById('scoreDisplay').style.display = 'none';
    document.getElementById('leaderboardSection').style.display = 'none';

    generateSentence(currentFrenchSentence, currentEnglishSentence);
    generateKeyboard();
}

// Global Enter key support
document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        if (isFinished) {
            event.preventDefault();
            resetActivity();
            return;
        }

        // If feedback is shown (all correct), pressing enter advances
        const feedback = document.getElementById('feedback');
        if (feedback && feedback.style.display !== "none") {
            event.preventDefault();
            finishGame();
        }
    }
});

// Generate the sentence on the page
function generateSentence(frenchSentence, englishSentence) {
    document.getElementById('englishSentence').textContent = englishSentence;
    const sentenceDiv = document.getElementById('frenchSentence');
    sentenceDiv.innerHTML = '';
    totalTargetBlanks = 0;

    for (let i = 0; i < frenchSentence.length; i++) {
        const char = frenchSentence[i];
        if (consonants.test(char)) {
            totalTargetBlanks++;
            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = 1;
            input.className = 'missing-word';
            input.dataset.index = i;
            input.dataset.penalized = "false";
            input.addEventListener('input', validateInput);
            input.addEventListener('focus', () => { lastFocusedInput = input; });
            input.addEventListener('keydown', handleInputKeydown);
            sentenceDiv.appendChild(input);
        } else {
            const span = document.createElement('span');
            span.textContent = char;
            sentenceDiv.appendChild(span);
        }
    }
    document.getElementById('feedback').style.display = "none";

    // Auto focus first input
    setTimeout(() => {
        const firstInput = sentenceDiv.querySelector('.missing-word');
        if (firstInput) firstInput.focus();
    }, 100);
}

// Validate input
function validateInput(e) {
    const input = e.target;
    const correctChar = currentFrenchSentence[input.dataset.index];

    if (input.value.trim() === '') {
        input.classList.remove('correct', 'incorrect');
        return;
    }

    if (input.value.toLowerCase() === correctChar.toLowerCase()) {
        input.classList.add('correct');
        input.classList.remove('incorrect');
    } else {
        input.classList.add('incorrect');
        input.classList.remove('correct');
        
        // Count total unique errors made
        if (input.dataset.penalized !== "true") {
            totalErrors++;
            input.dataset.penalized = "true";
        }
    }

    // Move to next input automatically if 1 character is entered
    if (input.value.length === 1) {
        let nextInput = input.nextElementSibling;
        while (nextInput && !nextInput.classList.contains('missing-word')) {
            nextInput = nextInput.nextElementSibling;
        }
        if (nextInput) nextInput.focus();
    }

    checkCompletion();
}

function checkCompletion() {
    const allInputs = document.querySelectorAll('.missing-word');
    const allCorrect = Array.from(allInputs).every(inp => inp.classList.contains('correct'));
    if (allCorrect) {
        document.getElementById('feedback').style.display = "flex";
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) nextBtn.focus();
    }
}

// Keydown handler on individual inputs
function handleInputKeydown(e) {
    if (e.key === "Backspace") {
        const input = e.target;
        if (input.value === '') {
            e.preventDefault();
            let prevInput = input.previousElementSibling;
            while (prevInput && !prevInput.classList.contains('missing-word')) {
                prevInput = prevInput.previousElementSibling;
            }
            if (prevInput) {
                prevInput.focus();
                prevInput.value = '';
                prevInput.classList.remove('correct', 'incorrect');
            }
        }
    } else if (e.key === "Enter") {
        e.preventDefault();
        const input = e.target;
        
        // If complete, advance
        const feedback = document.getElementById('feedback');
        if (feedback && feedback.style.display !== "none") {
            finishGame();
            return;
        }

        // Navigate to next blank on Enter
        let nextInput = input.nextElementSibling;
        while (nextInput && !nextInput.classList.contains('missing-word')) {
            nextInput = nextInput.nextElementSibling;
        }
        if (nextInput) {
            nextInput.focus();
        } else {
            // Loop around to first unfulfilled input if any
            const allInputs = Array.from(document.querySelectorAll('.missing-word'));
            const firstEmpty = allInputs.find(inp => !inp.classList.contains('correct'));
            if (firstEmpty) firstEmpty.focus();
        }
    }
}

// Onscreen Keyboard
function generateKeyboard() {
    const container = document.getElementById('keyboardContainer');
    container.innerHTML = '';
    const chars = ['ß', 'ç', 'ñ'];
    chars.forEach(c => {
        const btn = document.createElement('button');
        btn.textContent = c;
        btn.className = 'keyboard-button';
        btn.type = 'button';
        btn.onclick = () => {
            if (lastFocusedInput) {
                const pos = lastFocusedInput.selectionStart;
                const val = lastFocusedInput.value;
                lastFocusedInput.value = val.slice(0, pos) + c + val.slice(pos);
                lastFocusedInput.setSelectionRange(pos + 1, pos + 1);
                lastFocusedInput.focus();
                lastFocusedInput.dispatchEvent(new Event('input'));
            }
        };
        container.appendChild(btn);
    });
}

function finishGame() {
    if (isFinished) return;
    isFinished = true;

    // Hide gameplay screen & header subtitle to convert into dedicated summary screen
    document.getElementById('game-screen').classList.add('hide');
    document.getElementById('subtitle').style.display = 'none';
    document.getElementById('end-screen').classList.remove('hide');

    const statusDiv = document.getElementById('leaderboardStatus');
    if (statusDiv) statusDiv.innerHTML = '';

    const totalSeconds = Math.round((Date.now() - startTime) / 1000);
    const displayMins = Math.floor(totalSeconds / 60);
    const displaySecs = totalSeconds % 60;

    const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
    const formattedTimeText = `${displayMins}m ${displaySecs}s`;
    
    // Accuracy calculation
    const accuracy = Math.max(0, Math.min(100, Math.round((totalTargetBlanks / (totalTargetBlanks + totalErrors)) * 100)));

    const scoreDisplay = document.getElementById('scoreDisplay');
    scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
    scoreDisplay.style.display = "block";

    checkQualificationAndLoad(clockFormattedTime, accuracy);
}

function formatTimeDisplay(minutesVal) {
    if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
    const num = parseFloat(minutesVal);
    const mins = Math.floor(num);
    const secs = Math.round((num - mins) * 100);
    return `${mins}m ${secs}s`;
}

function checkQualificationAndLoad(timeMinutes, accuracy) {
    const tbody = document.getElementById('leaderboardBody');
    const section = document.getElementById('leaderboardSection');
    
    tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
    section.style.display = "block";

    fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
    .then(res => res.json())
    .then(data => {
        let tempBoard = [...data];
        let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
        tempBoard.push(newAttempt);
        tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
        
        let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

        if (playerRank <= 5) {
            let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
            if (!studentName) studentName = "Anonymous";
            
            tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
            
            fetch(LEADERBOARD_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    topicId: topicId,
                    game: GAME_NAME,
                    name: studentName,
                    time: parseFloat(timeMinutes),
                    accuracy: parseFloat(accuracy)
                })
            })
            .then(res => res.json())
            .then(updatedData => {
                renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
            });
        } else {
            renderLeaderboardRows(data, null, null, null);
        }
    })
    .catch(err => {
        console.error("Leaderboard loading failure:", err);
        tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
    });
}

function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
    const tbody = document.getElementById('leaderboardBody');
    const statusDiv = document.getElementById('leaderboardStatus');
    if (!tbody) return;
    
    tbody.innerHTML = "";
    if (statusDiv) statusDiv.innerHTML = "";
    
    let rankHeader = document.createElement('h4');
    rankHeader.id = 'personalRankTitle';
    rankHeader.style.fontSize = '18px';
    rankHeader.style.margin = '8px 0';
    if (statusDiv) statusDiv.appendChild(rankHeader);

    if (highlightName) {
        let studentRank = data.findIndex(entry => 
            String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
            Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
            Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
        ) + 1;

        rankHeader.style.color = '#2ecc71';
        rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
    } else {
        rankHeader.style.color = '#e67e22';
        rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
    }

    const medals = ['🥇 1', '🥈 2', '🥉 3'];

    data.forEach((entry, index) => {
        const tr = document.createElement('tr');
        const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
        const timeFormatted = formatTimeDisplay(entry.time);
        const rankDisplay = medals[index] || `#${index + 1}`;
        
        if (highlightName && 
            String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
            Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
            Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
            tr.className = 'highlight-row';
        }

        tr.innerHTML = `
            <td><strong>${rankDisplay}</strong></td>
            <td><strong>${entry.name}</strong></td>
            <td>${accVal}%</td>
            <td>${timeFormatted}</td>
        `;
        tbody.appendChild(tr);
    });
}

function resetActivity() {
    startNewGame();
}
</script>
</body>
</html>
