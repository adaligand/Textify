<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1st Letter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5; /* Light grey background */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }
    .container {
        width: 95%;
        max-width: 1200px;
        padding: 40px;
        box-sizing: border-box;
        background-color: white; /* White background for the game */
        border-radius: 15px; /* Rounded corners */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .title {
        font-size: 40px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }
    .subtitle {
        font-size: 20px;
        margin-bottom: 10px;
    }
    .english-sentence {
        margin-bottom: 20px;
        font-size: 20px;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 10px;
        background-color: #f9f9f9;
        text-align: center;
        width: 100%;
        box-sizing: border-box;
    }
    .french-sentence {
        margin-bottom: 20px;
        font-size: 22px;
        line-height: 1.6;
    }
    .missing-word {
        width: 18px;
        padding: 0px;
        font-size: 20px;
        border: none;
        border-bottom: 1.5px solid #000000;
        background-color: transparent;
        outline: none;
        margin-right: 2px;
        text-align: center;
        font-weight: bold;
    }
    .correct {
        background-color: #cef4ce;
    }
    .incorrect {
        background-color: #ffb6c19c;
    }
    .feedback {
        font-weight: bold;
        font-size: 24px;
        text-align: center;
        margin-top: 20px;
    }
    #keyboardContainer {
        text-align: center;
        margin-top: 20px;
    }
    .keyboard-button {
        font-size: 18px;
        padding: 10px 15px;
        margin: 2px;
        border: 2px solid #ccc;
        border-radius: 10px;
        background-color: #f9f9f9;
        color: #000000;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.2s;
    }
    .keyboard-button:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }
    select {
        width: auto;
        padding: 8px 12px;
        border-radius: 10px;
        border: 2px solid #ccc;
        background-color: #f9f9f9;
        font-size: 16px;
        margin-bottom: 10px;
        height: 40px;
        cursor: pointer;
    }
    .hide {
        display: none !important;
    }

    /* Standard Light Grey Button Styling */
    .btn {
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f9f9f9;
        border: 2px solid #ccc;
        color: #000000;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px 5px;
        transition: transform 0.2s, background-color 0.2s;
    }
    .btn:hover {
        background-color: #e0e0e0;
        transform: translateY(-2px);
    }

    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
        margin-top: 25px;
        text-align: center;
        border-top: 2px solid #eee;
        padding-top: 20px;
        width: 100%;
    }

    .leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
        font-size: 16px;
        background-color: #fafafa;
        color: #333;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
        padding: 10px 12px;
        text-align: center;
        border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
        background-color: #f1f3f5;
        color: #333;
        font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
        border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
        background-color: #d4edda !important;
        color: #155724 !important;
        font-weight: bold;
    }
</style>
</head>
<body>
    <div class="container">
        <div class="title">First letter only</div>
        <div class="subtitle" id="subtitle">Loading exercise...</div>
        <br>
        
        <div id="game-screen" style="width: 100%;">
            <div id="exerciseOutput"></div>
            <div class="input-container">
                <select id="languageSelect" onchange="generateKeyboard(this.value)">
                    <option value="french" selected>French</option>
                    <option value="german">German</option>
                    <option value="spanish">Spanish</option>
                </select>
                <div id="feedback" class="feedback hide">🎉 Correct! Well done. 🎉</div>
                <br>
                <div id="keyboardContainer"></div>
            </div>
        </div>

        <div id="end-screen" class="hide" style="width: 100%;">
            <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

            <!-- Leaderboard Container -->
            <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
                <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
                <div id="leaderboardStatus"></div>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Accuracy</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
                <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
            </div>
        </div>
    </div>

    <script>
        // --- GAME & LEADERBOARD STATE ---
        const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
        const GAME_NAME = "Text_1st Letter";

        var lastFocusedInput = null;
        var currentFrenchSentence = '';
        var currentEnglishSentence = '';
        var punctuations = [',', '!', '?', '.', ';', ':', "'", "’"];

        var startTime = 0;
        var totalAttempts = 0;
        var totalMissingChars = 0;
        var isFinished = false;

        // --- DATA LOADING LOGIC ---
        const params = new URLSearchParams(window.location.search);
        const sheetUrl = params.get('sheet');

        function getSpreadsheetId(url) {
            if (!url) return null;
            if (url.includes('/d/e/')) {
                const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
                return matches ? matches[1] : url;
            }
            const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

        if (!sheetUrl) {
            document.getElementById('subtitle').textContent = "⚠️ No sheet URL provided. Add ?sheet=YOUR_CSV_LINK to the end of the URL.";
        } else {
            Papa.parse(sheetUrl, {
                download: true,
                header: false,
                skipEmptyLines: false,
                complete: function(results) {
                    try {
                        const frenchText = results.data[1][8];
                        const englishText = results.data[13][8];

                        if (!frenchText || !englishText) {
                            throw new Error("Text is missing from cell French Text & English text");
                        }
                        
                        currentFrenchSentence = frenchText.trim();
                        currentEnglishSentence = englishText.trim();
                        
                        startGame();

                    } catch (e) {
                        console.error("Data Parsing Error:", e);
                        document.getElementById('subtitle').textContent = "⚠️ Error reading data. Ensure your sheet has text in cells French Text & English text and is published correctly.";
                    }
                },
                error: function(err) {
                    console.error("CSV Loading Error:", err);
                    document.getElementById('subtitle').textContent = "⚠️ Error loading or parsing the CSV file.";
                }
            });
        }

        function startGame() {
            isFinished = false;
            totalAttempts = 0;
            startTime = Date.now();

            document.getElementById('subtitle').style.display = 'block';
            document.getElementById('subtitle').textContent = "Fill in the sentence with the correct letters.";
            document.getElementById('game-screen').classList.remove('hide');
            document.getElementById('end-screen').classList.add('hide');
            document.getElementById('feedback').classList.add('hide');
            document.getElementById('scoreDisplay').style.display = 'none';
            document.getElementById('leaderboardSection').style.display = 'none';

            const statusDiv = document.getElementById('leaderboardStatus');
            if (statusDiv) statusDiv.innerHTML = '';

            generateKeyboard(document.getElementById('languageSelect').value);
            generateChunk(currentFrenchSentence, currentEnglishSentence);

            // Auto-focus first input field
            setTimeout(() => {
                let firstInput = document.querySelector('.missing-word');
                if (firstInput) firstInput.focus();
            }, 100);
        }

        function insertCharacter(character) {
            if (lastFocusedInput) {
                lastFocusedInput.value = character;
                validateCharacter(lastFocusedInput);
            }
        }

        function generateKeyboard(language) {
            var keyboardContainer = document.getElementById('keyboardContainer');
            keyboardContainer.innerHTML = '';
            var characters = [];
            switch (language) {
                case 'german':
                    characters = ['ä', 'ö', 'ü', 'ß'];
                    break;
                case 'french':
                    characters = ['à', 'â', 'ä', 'é', 'è', 'ê', 'ë', 'î', 'ï', 'ô', 'ö', 'ù', 'ü', 'û', 'ç'];
                    break;
                case 'spanish':
                    characters = ['á', 'é', 'í', 'ó', 'ú', 'ñ'];
                    break;
            }
            characters.forEach(function(character) {
                var button = document.createElement('button');
                button.innerHTML = character;
                button.className = 'keyboard-button';
                button.setAttribute('type', 'button');
                button.addEventListener('click', function(event) {
                    event.preventDefault();
                    insertCharacter(character);
                });
                keyboardContainer.appendChild(button);
            });
        }

        function generateChunk(frenchSentence, englishSentence) {
            var sentenceWithInputFields = '';
            var words = frenchSentence.split(' ');
            let globalCharIndex = 0;

            words.forEach((word) => {
                if (word.length === 0) return;

                let firstCharIndex = frenchSentence.indexOf(word, globalCharIndex);
                sentenceWithInputFields += word.charAt(0);

                for (let i = 1; i < word.length; i++) {
                    const char = word[i];
                    const charIndex = firstCharIndex + i;

                    if (punctuations.includes(char)) {
                        sentenceWithInputFields += char;
                    } else {
                        sentenceWithInputFields += `<input type="text" maxlength="1" class="missing-word" data-index="${charIndex}" oninput="validateCharacter(this)" onfocus="setLastFocusedInput(this)" onkeydown="handleKeyDown(event, this)">`;
                    }
                }
                
                globalCharIndex = firstCharIndex + word.length;
                sentenceWithInputFields += " ";
            });

            var exerciseOutput = document.getElementById('exerciseOutput');
            exerciseOutput.innerHTML = `
                <div class="english-sentence">${englishSentence}</div>
                <div class="french-sentence">${sentenceWithInputFields.trim()}</div>
            `;

            totalMissingChars = document.querySelectorAll('.missing-word').length;
        }

        function setLastFocusedInput(input) {
            lastFocusedInput = input;
        }

        function handleKeyDown(event, input) {
            if (event.key === "Enter") {
                let nextInput = findNextInput(input);
                if (nextInput) {
                    nextInput.focus();
                } else if (isFinished) {
                    resetActivity();
                }
                event.preventDefault();
            } else if (event.key === "Backspace" && input.value === '') {
                let prevInput = findPrevInput(input);
                if (prevInput) {
                    prevInput.focus();
                }
                event.preventDefault();
            }
        }

        // Global keydown for pressing enter anywhere once game is finished
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && isFinished) {
                const restartBtn = document.getElementById('restartBtn');
                if (restartBtn && restartBtn.offsetParent !== null) {
                    event.preventDefault();
                    resetActivity();
                }
            }
        });

        function findNextInput(currentInput) {
            let allInputs = Array.from(document.querySelectorAll('.missing-word'));
            let currentIndex = allInputs.indexOf(currentInput);
            return allInputs[currentIndex + 1] || null;
        }

        function findPrevInput(currentInput) {
            let allInputs = Array.from(document.querySelectorAll('.missing-word'));
            let currentIndex = allInputs.indexOf(currentInput);
            return allInputs[currentIndex - 1] || null;
        }

        function validateCharacter(input) {
            const userInput = input.value.trim();
            const correctChar = currentFrenchSentence[input.getAttribute('data-index')];
            const apostrophes = ["'", "’"];
            
            let isMatch = false;

            if (userInput !== '') {
                totalAttempts++;
            }

            if (apostrophes.includes(correctChar)) {
                if (apostrophes.includes(userInput)) {
                    isMatch = true;
                }
            } else {
                if (userInput.toLowerCase() === correctChar.toLowerCase()) {
                    isMatch = true;
                }
            }
            
            if (userInput === '') {
                input.classList.remove('correct', 'incorrect');
            } else if (isMatch) {
                input.classList.add('correct');
                input.classList.remove('incorrect');
                let nextInput = findNextInput(input);
                if (nextInput) {
                    nextInput.focus();
                }
            } else {
                input.classList.add('incorrect');
                input.classList.remove('correct');
            }
            
            checkAllAnswers();
        }

        function checkAllAnswers() {
            var inputFields = document.querySelectorAll('.missing-word');
            var allCorrect = Array.from(inputFields).every(input => input.classList.contains('correct'));

            if (allCorrect && !isFinished) {
                document.getElementById('feedback').classList.remove('hide');
                setTimeout(() => {
                    finishGame(true);
                }, 800);
            }
        }

        function finishGame(isWin) {
            if (isFinished) return;
            isFinished = true;

            // Hide game elements to show standalone summary screen
            document.getElementById('game-screen').classList.add('hide');
            document.getElementById('subtitle').style.display = 'none';
            document.getElementById('feedback').classList.add('hide');
            document.getElementById('end-screen').classList.remove('hide');

            const statusDiv = document.getElementById('leaderboardStatus');
            if (statusDiv) statusDiv.innerHTML = '';

            const totalSeconds = Math.round((Date.now() - startTime) / 1000);
            const displayMins = Math.floor(totalSeconds / 60);
            const displaySecs = totalSeconds % 60;

            const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
            const formattedTimeText = `${displayMins}m ${displaySecs}s`;
            const accuracy = Math.min(100, Math.round((totalMissingChars / Math.max(totalMissingChars, totalAttempts)) * 100));

            const scoreDisplay = document.getElementById('scoreDisplay');
            scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
            scoreDisplay.style.display = "block";

            checkQualificationAndLoad(clockFormattedTime, accuracy);
        }

        function formatTimeDisplay(minutesVal) {
            if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
            const num = parseFloat(minutesVal);
            const mins = Math.floor(num);
            const secs = Math.round((num - mins) * 100);
            return `${mins}m ${secs}s`;
        }

        function checkQualificationAndLoad(timeMinutes, accuracy) {
            const tbody = document.getElementById('leaderboardBody');
            const section = document.getElementById('leaderboardSection');
            
            tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
            section.style.display = "block";

            fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
            .then(res => res.json())
            .then(data => {
                let tempBoard = [...data];
                let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
                tempBoard.push(newAttempt);
                tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
                
                let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

                if (playerRank <= 5) {
                    let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                    if (!studentName) studentName = "Anonymous";
                    
                    tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                    
                    fetch(LEADERBOARD_API_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            topicId: topicId,
                            game: GAME_NAME,
                            name: studentName,
                            time: parseFloat(timeMinutes),
                            accuracy: parseFloat(accuracy)
                        })
                    })
                    .then(res => res.json())
                    .then(updatedData => {
                        renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                    });
                } else {
                    renderLeaderboardRows(data, null, null, null);
                }
            })
            .catch(err => {
                console.error("Leaderboard loading failure:", err);
                tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
            });
        }

        function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
            const tbody = document.getElementById('leaderboardBody');
            const statusDiv = document.getElementById('leaderboardStatus');
            if(!tbody) return;
            
            tbody.innerHTML = "";
            if (statusDiv) statusDiv.innerHTML = "";
            
            let rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            if (statusDiv) statusDiv.appendChild(rankHeader);

            if (highlightName) {
                let studentRank = data.findIndex(entry => 
                    String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                    Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                    Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
                ) + 1;

                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            } else {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }

            const medals = ['🥇 1', '🥈 2', '🥉 3'];

            data.forEach((entry, index) => {
                const tr = document.createElement('tr');
                const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
                const timeFormatted = formatTimeDisplay(entry.time);
                const rankDisplay = medals[index] || `#${index + 1}`;
                
                if (highlightName && 
                    String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                    Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                    Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
                    tr.className = 'highlight-row';
                }

                tr.innerHTML = `
                    <td><strong>${rankDisplay}</strong></td>
                    <td><strong>${entry.name}</strong></td>
                    <td>${accVal}%</td>
                    <td>${timeFormatted}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resetActivity() {
            startGame();
        }
    </script>
</body>
</html>
