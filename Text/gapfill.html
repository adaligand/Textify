<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gapfill</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            padding: 40px;
            box-sizing: border-box;
            background-color: white; /* White background */
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* Light Grey Button Styling */
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .english-text-box {
            margin-bottom: 20px;
            font-size: 20px;
            text-align: justify;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            display: inline-block;
            margin-bottom: 5px;
            font-size: 18px;
        }
        .hide {
            display: none !important;
        }
        #exerciseOutput {
            font-size: 20px;
            line-height: 2.5;
            text-align: justify;
            width: 100%;
            margin-top: 15px;
        }
        .filled-word {
            display: inline-block;
            margin: 0 3px;
            padding: 4px 8px;
            vertical-align: middle;
            height: 36px;
            font-size: 18px;
            font-weight: bold;
            font-family: inherit;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #fafafa;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .filled-word:focus {
            border-color: #007bff;
            background-color: #ffffff;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
            display: inline-block;
            vertical-align: middle;
        }
        .keyboard-container {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        .keyboard-button {
            font-size: 18px;
            font-weight: bold;
            padding: 8px 14px;
            margin: 3px;
            border: 2px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            color: #000000;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }
        .keyboard-button:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
        select {
            width: auto;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #ccc;
            background-color: #f9f9f9;
            font-size: 16px;
            margin-bottom: 10px;
            height: 42px;
            cursor: pointer;
        }

        /* Leaderboard Box & Table Styling */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
            width: 100%;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Gapfill</div>
        <div class="subtitle" id="subtitle">Gapfill: Select the amount of words to remove from the text and your language keyboard, then click on Generate exercise.</div>
        <br>
        
        <div id="game-screen" style="width: 100%;">
            <div class="english-text-box hide" id="englishTextBox">
                <div id="englishText"></div>
            </div>
            <div id="frenchText" class="hide"></div>
            
            <div style="text-align: center; margin-bottom: 15px;">
                <label for="percentageSelect">Select the amount of words to remove: </label>
                <select id="percentageSelect">
                    <option value="aFewWords">A few words</option>
                    <option value="someWords" selected>Some words</option>
                    <option value="moreWords">More words</option>
                    <option value="half">Half</option>
                    <option value="evenMoreWords">Even more words</option>
                </select>
                <select id="languageSelect">
                    <option value="french" selected>French</option>
                    <option value="german">German</option>
                    <option value="spanish">Spanish</option>
                </select>
                <button class="btn" onclick="generateExercise()">Generate Exercise</button>
            </div>

            <div id="exerciseOutput" class="hide"></div>

            <div id="checkFeedbackContainer" class="hide" style="text-align: center; margin-top: 20px;">
                <button id="checkButton" class="btn" onclick="checkExercise()">Check Exercise</button>
                <button id="resetButton" class="btn hide" onclick="resetExercise()">Reset</button>
                <div id="feedback" class="hide"></div>
            </div>

            <div class="keyboard-container" id="keyboardContainer"></div>
        </div>

        <div id="end-screen" class="hide" style="width: 100%;">
            <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

            <!-- Leaderboard Container -->
            <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
                <h3 id="leaderboardHeaderTitle" style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
                <div id="leaderboardStatus"></div>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Accuracy</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
                <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
            </div>
        </div>
    </div>

<script>
    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbzO9F1mpXF88pMcM1X5lsx7Wn7r25u4Ye8KUFbD3hGa0jlEIkkvBnIeDcDqlLboxtS2/exec";
    const GAME_NAME = "Text_Gapfill";

    let focusedInput = null;
    var startTime = 0;
    var totalErrors = 0;
    var totalTargetBlanks = 0;
    var isFinished = false;

    // --- DATA LOADING FROM GOOGLE SHEET ---
    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
        document.getElementById('subtitle').textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
    } else {
        document.getElementById('subtitle').textContent = "Loading data...";
        Papa.parse(sheetUrl, {
            download: true,
            header: false,
            skipEmptyLines: false,
            complete: function(results) {
                try {
                    const frenchText = results.data[1][8];
                    const englishText = results.data[13][8];

                    if (!frenchText || !englishText) {
                        throw new Error("Text is missing from cell French text & English text.");
                    }
                    
                    document.getElementById('frenchText').textContent = frenchText.trim();
                    document.getElementById('englishText').textContent = englishText.trim();
                    document.getElementById('englishTextBox').classList.remove('hide');

                    document.getElementById('subtitle').textContent = "Gapfill: Select the amount of words to remove, then click 'Generate Exercise'.";
                    
                    initialize();

                } catch (e) {
                    document.getElementById('subtitle').textContent = "⚠️ Error reading data. Check that your sheet has text in cells French text & English text.";
                    console.error(e);
                }
            },
            error: function(err) {
                document.getElementById('subtitle').textContent = "⚠️ Error loading the CSV file.";
                console.error(err);
            }
        });
    }

    function initialize() {
        document.getElementById('languageSelect').value = 'french';
        generateKeyboard('french');
        document.addEventListener('focusin', function(event) {
            if (event.target.classList.contains('filled-word')) {
                focusedInput = event.target;
            }
        });
    }

    // Keyboard support for Enter Key (next blank / check / restart)
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            if (isFinished) {
                event.preventDefault();
                resetActivity();
                return;
            }
            if (document.activeElement && document.activeElement.tagName !== 'INPUT') {
                var checkButton = document.getElementById('checkButton');
                if (checkButton && !checkButton.parentNode.classList.contains('hide') && !checkButton.classList.contains('hide')) {
                    event.preventDefault();
                    checkExercise();
                }
            }
        }
    });

    function handleInputKeydown(event, inputElement) {
        if (event.key === 'Enter') {
            event.preventDefault();
            var filledInputs = Array.from(document.getElementsByClassName('filled-word'));
            var currentIndex = filledInputs.indexOf(inputElement);
            
            if (checkFilledInputs()) {
                checkExercise();
            } else {
                for (var i = currentIndex + 1; i < filledInputs.length; i++) {
                    if (filledInputs[i].value.trim() === '') {
                        filledInputs[i].focus();
                        return;
                    }
                }
                for (var j = 0; j < currentIndex; j++) {
                    if (filledInputs[j].value.trim() === '') {
                        filledInputs[j].focus();
                        return;
                    }
                }
            }
        }
    }

    function generateKeyboard(language) {
        var keyboardContainer = document.getElementById('keyboardContainer');
        keyboardContainer.innerHTML = '';
        var characters = [];
        switch (language) {
            case 'german': characters = ['ä', 'ö', 'ü', 'ß']; break;
            case 'french': characters = ['à', 'â', 'ä','é', 'è', 'ê', 'ë', 'î', 'ï', 'ô','ö', 'ù', 'ü', 'û', 'ç']; break;
            case 'spanish': characters = ['á', 'é', 'í', 'ó', 'ú', 'ñ']; break;
        }
        characters.forEach(function (character) {
            var button = document.createElement('button');
            button.textContent = character;
            button.className = 'keyboard-button';
            button.onclick = function() { insertCharacter(character); };
            keyboardContainer.appendChild(button);
        });
    }
    
    document.getElementById('languageSelect').addEventListener('change', function () {
        generateKeyboard(this.value);
    });

    function generateExercise() {
        generateFillBlanksExercise();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function generateFillBlanksExercise() {
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('exerciseOutput').innerHTML = '';
        document.getElementById('checkFeedbackContainer').classList.add('hide');

        isFinished = false;
        totalErrors = 0;
        startTime = Date.now();

        document.getElementById('game-screen').classList.remove('hide');
        document.getElementById('end-screen').classList.add('hide');
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('leaderboardSection').style.display = 'none';

        var textInputValue = document.getElementById('frenchText').textContent;
        var selectValue = document.getElementById('percentageSelect').value;
        var percentage;

        switch (selectValue) {
            case "aFewWords": percentage = 5; break;
            case "someWords": percentage = 10; break;
            case "moreWords": percentage = 20; break;
            case "half": percentage = 50; break;
            case "evenMoreWords": percentage = 60; break;
            default: percentage = 10;
        }

        var tokens = textInputValue.match(/[\wÀ-ÿ'’-]+|[^\w\s'’-]+/gu) || [];
        var eligibleIndices = [];
        tokens.forEach(function(token, index) {
            if (/^[\wÀ-ÿ'’-]+$/u.test(token) && token.length > 1) {
                eligibleIndices.push(index);
            }
        });

        if (eligibleIndices.length === 0) {
            alert("Not enough words in the text to generate exercise.");
            return;
        }

        var numWordsToRemove = Math.min(Math.round((percentage / 100) * eligibleIndices.length), eligibleIndices.length);
        if (numWordsToRemove < 1) numWordsToRemove = 1;

        totalTargetBlanks = numWordsToRemove;

        var shuffledIndices = shuffle([...eligibleIndices]);
        var removedIndicesSet = new Set(shuffledIndices.slice(0, numWordsToRemove));

        var modifiedText = '';
        tokens.forEach(function(token, index) {
            if (removedIndicesSet.has(index)) {
                var widthPx = Math.max(60, token.length * 15 + 20);
                var safeAttr = escapeHtml(token);
                modifiedText += '<input type="text" class="filled-word" style="width:' + widthPx + 'px;" data-correct-answer="' + safeAttr + '" oninput="updateCheckingButtonVisibility()" onkeydown="handleInputKeydown(event, this)"> ';
            } else {
                modifiedText += escapeHtml(token) + ' ';
            }
        });

        var exerciseOutput = document.getElementById('exerciseOutput');
        exerciseOutput.innerHTML = modifiedText.trim();
        exerciseOutput.classList.remove('hide');
        
        resetFeedback();
        updateCheckingButtonVisibility();

        // Focus first blank automatically
        setTimeout(() => {
            var firstInput = exerciseOutput.querySelector('input');
            if (firstInput) firstInput.focus();
        }, 100);
    }
    
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function updateCheckingButtonVisibility() {
        var checkButton = document.getElementById('checkButton');
        if (checkFilledInputs()) {
            checkButton.parentNode.classList.remove('hide');
            checkButton.classList.remove('hide');
        } else {
            checkButton.parentNode.classList.add('hide');
            checkButton.classList.add('hide');
        }
    }

    function checkFilledInputs() {
        var filledInputs = document.getElementsByClassName('filled-word');
        if (filledInputs.length === 0) return false;
        for (var i = 0; i < filledInputs.length; i++) {
            if (filledInputs[i].value.trim() === '') {
                return false;
            }
        }
        return true;
    }

    function checkExercise() {
        if (isFinished) return;

        var filledInputs = document.getElementsByClassName('filled-word');
        var feedback = document.getElementById('feedback');
        var incorrectCount = 0;

        for (var i = 0; i < filledInputs.length; i++) {
            var correctAnswer = filledInputs[i].dataset.correctAnswer;
            if (filledInputs[i].value.trim().toLowerCase() !== correctAnswer.toLowerCase()) {
                incorrectCount++;
                filledInputs[i].style.backgroundColor = '#f8d7da'; // light red
            } else {
                filledInputs[i].style.backgroundColor = '#d4edda'; // light green
            }
        }

        if (incorrectCount === 0) {
            feedback.textContent = '🎉 All answers are correct! 🎉';
            feedback.style.color = '#28a745';
            feedback.classList.remove('hide');
            setTimeout(() => {
                finishGame(true);
            }, 800);
        } else {
            totalErrors += incorrectCount;
            feedback.textContent = '❌ Number of incorrect answers: ' + incorrectCount;
            feedback.style.color = '#dc3545';
            feedback.classList.remove('hide');
        }
    }

    function resetFeedback() {
        var feedback = document.getElementById('feedback');
        feedback.textContent = '';
        feedback.classList.add('hide');
    }

    function resetExercise() {
        document.getElementById('exerciseOutput').innerHTML = '';
        document.getElementById('exerciseOutput').classList.add('hide');
        document.getElementById('feedback').classList.add('hide');
        document.getElementById('feedback').textContent = '';
        document.getElementById('resetButton').classList.add('hide');
        document.getElementById('checkButton').classList.remove('hide');
        document.getElementById('checkFeedbackContainer').classList.add('hide');
        document.getElementById('subtitle').style.display = 'block';
    }

    function finishGame(isWin) {
        if (isFinished) return;
        isFinished = true;

        // Hide active gameplay container and subtitle to convert to a standalone summary result screen
        document.getElementById('game-screen').classList.add('hide');
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('feedback').classList.add('hide');
        document.getElementById('end-screen').classList.remove('hide');

        const statusDiv = document.getElementById('leaderboardStatus');
        if (statusDiv) statusDiv.innerHTML = '';

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        
        // Accuracy calculation based on target blanks vs total errors made
        const accuracy = Math.max(0, Math.min(100, Math.round((totalTargetBlanks / (totalTargetBlanks + totalErrors)) * 100)));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        const percentageSelect = document.getElementById('percentageSelect');
        const categoryLabel = percentageSelect.options[percentageSelect.selectedIndex].text;

        checkQualificationAndLoad(clockFormattedTime, accuracy, categoryLabel);
    }

    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy, categoryLabel) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        const headerTitle = document.getElementById('leaderboardHeaderTitle');
        
        if (headerTitle) {
            headerTitle.textContent = `🏆 Top 5 Leaderboard (${categoryLabel}) 🏆`;
        }

        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            // Filter entries specifically for current word removal mode
            const categoryData = data.filter(entry => entry.name && entry.name.includes(`(${categoryLabel})`));

            let tempBoard = [...categoryData];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard (${categoryLabel})! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                const formattedName = `${studentName.trim()} (${categoryLabel})`;

                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: formattedName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    const updatedCategoryData = updatedData.filter(entry => entry.name && entry.name.includes(`(${categoryLabel})`));
                    renderLeaderboardRows(updatedCategoryData, formattedName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(categoryData, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        if (statusDiv) statusDiv.innerHTML = "";
        
        let rankHeader = document.createElement('h4');
        rankHeader.id = 'personalRankTitle';
        rankHeader.style.fontSize = '18px';
        rankHeader.style.margin = '8px 0';
        if (statusDiv) statusDiv.appendChild(rankHeader);

        if (highlightName) {
            let studentRank = data.findIndex(entry => 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
            ) + 1;

            rankHeader.style.color = '#2ecc71';
            rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
        } else {
            rankHeader.style.color = '#e67e22';
            rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function resetActivity() {
        generateExercise();
    }

    function insertCharacter(character) {
        if (focusedInput) {
            var start = focusedInput.selectionStart;
            var end = focusedInput.selectionEnd;
            var text = focusedInput.value;
            focusedInput.value = text.substring(0, start) + character + text.substring(end);
            focusedInput.selectionStart = focusedInput.selectionEnd = start + 1;
            focusedInput.focus();
            updateCheckingButtonVisibility();
        }
    }
</script>
</body>
</html>
