<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            padding: 40px;
            box-sizing: border-box;
            background-color: white; /* White background for the game */
            border-radius: 15px; /* Rounded corners */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* Light Grey Button Styling */
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .english-section,
        .exercise-section {
            width: 100%;
            font-size: 20px;
            text-align: justify;
            margin-bottom: 20px;
        }
        .english-text-container {
            margin-bottom: 20px;
            font-size: 20px;
            padding: 12px;
            border: 2px solid #ccc;
            border-radius: 10px;
            background-color: #f9f9f9;
            text-align: center;
        }
        label {
            display: inline-block;
            margin-bottom: 5px;
            font-size: 18px;
        }
        .hide {
            display: none !important;
        }
        #exerciseOutput {
            font-size: 20px;
            line-height: 2;
            text-align: justify;
        }
        .removed-word {
            display: inline-block;
            margin: 4px;
            padding: 6px 12px;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: background-color 0.2s, transform 0.2s;
        }
        .removed-word:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
        .drop-target {
            display: inline-block;
            border: 2px dashed #ccc;
            padding: 0px;
            margin: 0px 5px;
            cursor: pointer;
            border-radius: 8px;
            min-width: 60px;
            min-height: 32px;
            text-align: center;
            vertical-align: bottom;
            background-color: #fafafa;
        }
        .filled-word {
            display: inline-block;
            margin: 0 3px;
            padding: 2px 8px;
            vertical-align: bottom;
            font-weight: bold;
        }
        #feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
            color: #28a745;
            display: inline-block;
            vertical-align: middle;
        }
        select {
            width: auto;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #ccc;
            background-color: #f9f9f9;
            font-size: 16px;
            margin-bottom: 10px;
            height: 42px;
            cursor: pointer;
        }

        /* Leaderboard Box & Table Styling */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
            width: 100%;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="title">Drag & Drop</div>
    <div class="subtitle" id="subtitle">Drag and drop: Select the amount of words to remove from your text and click on Generate exercise.</div>
    <br>
    
    <div id="game-screen" style="width: 100%;">
        <div style="text-align: center; margin-bottom: 15px;">
            <label for="percentageSelect">Select the amount of words to remove: </label>
            <select id="percentageSelect">
                <option value="aFewWords">A few words</option>
                <option value="someWords" selected>Some words</option>
                <option value="moreWords">More words</option>
                <option value="half">Half</option>
                <option value="evenMoreWords">Even more words</option>
            </select>
            <button class="btn" onclick="generateExercise()">Generate Exercise</button>
        </div>

        <div class="english-section">
            <div class="english-text-container">
                <div id="frenchText" class="hide"></div>
                <div id="englishTranslation"></div>
            </div>
        </div>

        <div class="exercise-section">
            <div id="exerciseOutput" class="hide"></div>
            <div id="removedWords" class="hide" style="text-align: center; margin-top: 15px;"></div>
            <div id="checkFeedbackContainer" class="hide" style="text-align: center; margin-top: 20px;">
                <button id="checkButton" class="btn" onclick="checkExercise()">Check Exercise</button>
                <button id="resetButton" class="btn hide" onclick="resetExercise()">Reset Exercise</button>
                <div id="feedback" class="hide"></div>
            </div>
        </div>
    </div>

    <div id="end-screen" class="hide" style="width: 100%;">
        <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

        <!-- Leaderboard Container -->
        <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
            <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
            <div id="leaderboardStatus"></div>
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Player</th>
                        <th>Accuracy</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
        </div>
    </div>
</div>

<script>
// --- LEADERBOARD CONFIGURATION ---
const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
const GAME_NAME = "Text_Drag&Drop";

var removedWordSet = new Set();
var sentencePair = {};

var startTime = 0;
var totalErrors = 0;
var totalTargetBlanks = 0;
var isFinished = false;

// --- DATA LOADING FROM GOOGLE SHEET ---
const params = new URLSearchParams(window.location.search);
const sheetUrl = params.get('sheet');

function getSpreadsheetId(url) {
    if (!url) return null;
    if (url.includes('/d/e/')) {
        const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    return matches ? matches[1] : url;
}
const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

if (!sheetUrl) {
    document.getElementById('subtitle').textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
} else {
    document.getElementById('subtitle').textContent = "Loading data...";
    Papa.parse(sheetUrl, {
        download: true,
        header: false,
        skipEmptyLines: false,
        complete: function(results) {
            try {
                const frenchText = results.data[1][8];
                const englishText = results.data[13][8];
                if (!frenchText || !englishText) {
                    throw new Error("Text is missing from cell French text & English text.");
                }
                
                sentencePair = {
                    french: frenchText.trim(),
                    english: englishText.trim()
                };

                document.getElementById('frenchText').textContent = sentencePair.french;
                document.getElementById('englishTranslation').textContent = sentencePair.english;
                document.getElementById('subtitle').textContent = "Drag and drop: Select the amount of words to remove and click 'Generate Exercise'.";
            } catch (e) {
                document.getElementById('subtitle').textContent = "⚠️ Error reading data. Check your sheet has text in cells French text & English text.";
                console.error(e);
            }
        },
        error: function(err) {
            document.getElementById('subtitle').textContent = "⚠️ Error loading the CSV file.";
            console.error(err);
        }
    });
}

// Keyboard support for Check / Start Again
document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        if (isFinished) {
            event.preventDefault();
            resetActivity();
            return;
        }
        var checkButton = document.getElementById('checkButton');
        if (checkButton && !checkButton.classList.contains('hide') && !checkButton.disabled) {
            event.preventDefault();
            checkExercise();
        }
    }
});

function generateExercise() {
    resetExercise();
    var frenchText = document.getElementById('frenchText').textContent.trim();
    if (!frenchText) {
        alert("Text has not been loaded yet. Please wait or check the sheet URL.");
        return;
    }

    isFinished = false;
    totalErrors = 0;
    startTime = Date.now();

    document.getElementById('game-screen').classList.remove('hide');
    document.getElementById('end-screen').classList.add('hide');
    document.getElementById('scoreDisplay').style.display = 'none';
    document.getElementById('leaderboardSection').style.display = 'none';

    generateDragDropExercise(frenchText);
    document.getElementById('subtitle').style.display = 'none';
}

function escapeHtml(text) {
    return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function generateDragDropExercise(frenchText) {
    document.getElementById('exerciseOutput').innerHTML = '';
    document.getElementById('removedWords').innerHTML = '';

    var selectValue = document.getElementById('percentageSelect').value;
    var percentage;
    switch (selectValue) {
        case "aFewWords": percentage = 5; break;
        case "someWords": percentage = 10; break;
        case "moreWords": percentage = 20; break;
        case "half": percentage = 50; break;
        case "evenMoreWords": percentage = 60; break;
        default: percentage = 10;
    }

    var tokens = frenchText.match(/[\wÀ-ÿ'’-]+|[^\w\s'’-]+/gu) || [];
    
    // Find candidate word indices (only actual words with length > 1)
    var eligibleIndices = [];
    tokens.forEach(function(token, index) {
        if (/^[\wÀ-ÿ'’-]+$/u.test(token) && token.length > 1) {
            eligibleIndices.push(index);
        }
    });

    if (eligibleIndices.length === 0) {
        alert("Not enough words in the text to generate exercise.");
        return;
    }

    var numWordsToRemove = Math.min(Math.round((percentage / 100) * eligibleIndices.length), eligibleIndices.length);
    if (numWordsToRemove < 1) {
        numWordsToRemove = 1;
    }

    totalTargetBlanks = numWordsToRemove;

    // Pick specific word positions (indices) to turn into gaps
    var shuffledIndices = shuffle([...eligibleIndices]);
    var removedIndicesSet = new Set(shuffledIndices.slice(0, numWordsToRemove));

    var allRemovedInstances = [];
    var modifiedText = '';

    tokens.forEach(function(token, index) {
        if (removedIndicesSet.has(index)) {
            allRemovedInstances.push(token);
            var safeAttr = token.replace(/"/g, '&quot;');
            modifiedText += '<span class="drop-target" data-correct-answer="' + safeAttr + '" onclick="emptyDropBox(this)"></span> ';
        } else {
            modifiedText += '<span class="filled-word">' + escapeHtml(token) + '</span> ';
        }
    });

    var exerciseOutput = document.getElementById('exerciseOutput');
    exerciseOutput.innerHTML = modifiedText.trim();
    exerciseOutput.classList.remove('hide');

    var removedWordsContainer = document.getElementById('removedWords');
    removedWordsContainer.innerHTML = '';
    removedWordsContainer.classList.remove('hide');
    
    shuffle(allRemovedInstances).forEach((word, index) => {
        var removedWord = document.createElement('div');
        removedWord.textContent = word;
        removedWord.className = 'removed-word';
        removedWord.draggable = true;
        removedWord.id = 'drag-' + index;
        removedWord.ondragstart = function(event) {
            drag(event);
        };
        removedWordsContainer.appendChild(removedWord);
    });
    
    resetFeedback();

    var dropTargets = document.getElementsByClassName('drop-target');
    for (var i = 0; i < dropTargets.length; i++) {
        dropTargets[i].addEventListener('drop', drop);
        dropTargets[i].addEventListener('dragover', allowDrop);
    }

    updateCheckingButtonVisibility();
}

function emptyDropBox(dropTarget) {
    if (isFinished) return;
    var filledWord = dropTarget.querySelector('.filled-word');
    if (filledWord) {
        var wordText = filledWord.textContent;
        var newId = 'drag-' + Date.now();

        var wordToAddBack = document.createElement('div');
        wordToAddBack.textContent = wordText;
        wordToAddBack.className = 'removed-word';
        wordToAddBack.draggable = true;
        wordToAddBack.id = newId;
        wordToAddBack.ondragstart = function(event) {
            drag(event);
        };
        document.getElementById('removedWords').appendChild(wordToAddBack);
        dropTarget.innerHTML = '';
    }
    updateCheckingButtonVisibility();
}

function allowDrop(event) {
    event.preventDefault();
}

function drag(event) {
    if (isFinished) return;
    event.dataTransfer.setData("text", event.target.textContent);
    event.dataTransfer.setData("element-id", event.target.id);
}

function drop(event) {
    if (isFinished) return;
    event.preventDefault();
    var data = event.dataTransfer.getData("text");
    var elementId = event.dataTransfer.getData("element-id");
    var target = event.target;
    
    if (target.classList.contains("drop-target") && !target.querySelector(".filled-word")) {
        var droppedWord = document.createElement("span");
        droppedWord.textContent = data;
        droppedWord.className = "filled-word";
        target.appendChild(droppedWord);
        
        var draggedElement = document.getElementById(elementId);
        if (draggedElement) {
            draggedElement.remove();
        }
        
        setTimeout(updateCheckingButtonVisibility, 100);
    }
}

function updateCheckingButtonVisibility() {
    var checkButton = document.getElementById('checkButton');
    if (checkFilledBoxes()) {
        checkButton.parentNode.classList.remove('hide');
        checkButton.classList.remove('hide');
    } else {
        checkButton.parentNode.classList.add('hide');
        checkButton.classList.add('hide');
    }
}

function checkFilledBoxes() {
    var removedWords = document.getElementById('removedWords');
    return removedWords.children.length === 0;
}

function checkExercise() {
    if (isFinished) return;

    var dropTargets = document.getElementsByClassName('drop-target');
    var feedback = document.getElementById('feedback');
    var incorrectCount = 0;

    for (var i = 0; i < dropTargets.length; i++) {
        var correctAnswer = dropTargets[i].dataset.correctAnswer;
        var filledWord = dropTargets[i].querySelector('.filled-word');
        if (!filledWord || filledWord.textContent.trim() !== correctAnswer) {
            incorrectCount++;
        }
    }

    if (incorrectCount === 0) {
        feedback.textContent = '🎉 All answers are correct! 🎉';
        feedback.style.color = '#28a745';
        feedback.classList.remove('hide');
        setTimeout(() => {
            finishGame(true);
        }, 800);
    } else {
        totalErrors += incorrectCount;
        feedback.textContent = '❌ Number of incorrect answers: ' + incorrectCount;
        feedback.style.color = '#dc3545';
        feedback.classList.remove('hide');
    }
}

function resetFeedback() {
    var feedback = document.getElementById('feedback');
    feedback.textContent = '';
    feedback.classList.add('hide');
}

function resetExercise() {
    removedWordSet.clear();
    document.getElementById('exerciseOutput').classList.add('hide');
    document.getElementById('removedWords').classList.add('hide');
    document.getElementById('subtitle').style.display = 'block';
    var feedback = document.getElementById('feedback');
    feedback.textContent = '';
    feedback.classList.add('hide');
    var resetButton = document.getElementById('resetButton');
    resetButton.classList.add('hide');
    var checkFeedbackContainer = document.getElementById('checkFeedbackContainer');
    checkFeedbackContainer.classList.add('hide');
}

function finishGame(isWin) {
    if (isFinished) return;
    isFinished = true;

    // Hide active gameplay container and subtitle to convert to a standalone summary result screen
    document.getElementById('game-screen').classList.add('hide');
    document.getElementById('subtitle').style.display = 'none';
    document.getElementById('feedback').classList.add('hide');
    document.getElementById('end-screen').classList.remove('hide');

    const statusDiv = document.getElementById('leaderboardStatus');
    if (statusDiv) statusDiv.innerHTML = '';

    const totalSeconds = Math.round((Date.now() - startTime) / 1000);
    const displayMins = Math.floor(totalSeconds / 60);
    const displaySecs = totalSeconds % 60;

    const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
    const formattedTimeText = `${displayMins}m ${displaySecs}s`;
    
    // Accuracy calculation based on target blanks vs total errors made
    const accuracy = Math.max(0, Math.min(100, Math.round((totalTargetBlanks / (totalTargetBlanks + totalErrors)) * 100)));

    const scoreDisplay = document.getElementById('scoreDisplay');
    scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
    scoreDisplay.style.display = "block";

    checkQualificationAndLoad(clockFormattedTime, accuracy);
}

function formatTimeDisplay(minutesVal) {
    if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
    const num = parseFloat(minutesVal);
    const mins = Math.floor(num);
    const secs = Math.round((num - mins) * 100);
    return `${mins}m ${secs}s`;
}

function checkQualificationAndLoad(timeMinutes, accuracy) {
    const tbody = document.getElementById('leaderboardBody');
    const section = document.getElementById('leaderboardSection');
    
    tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
    section.style.display = "block";

    fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
    .then(res => res.json())
    .then(data => {
        let tempBoard = [...data];
        let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
        tempBoard.push(newAttempt);
        tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
        
        let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

        if (playerRank <= 5) {
            let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
            if (!studentName) studentName = "Anonymous";
            
            tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
            
            fetch(LEADERBOARD_API_URL, {
                method: "POST",
                body: JSON.stringify({
                    topicId: topicId,
                    game: GAME_NAME,
                    name: studentName,
                    time: parseFloat(timeMinutes),
                    accuracy: parseFloat(accuracy)
                })
            })
            .then(res => res.json())
            .then(updatedData => {
                renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
            });
        } else {
            renderLeaderboardRows(data, null, null, null);
        }
    })
    .catch(err => {
        console.error("Leaderboard loading failure:", err);
        tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
    });
}

function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
    const tbody = document.getElementById('leaderboardBody');
    const statusDiv = document.getElementById('leaderboardStatus');
    if(!tbody) return;
    
    tbody.innerHTML = "";
    if (statusDiv) statusDiv.innerHTML = "";
    
    let rankHeader = document.createElement('h4');
    rankHeader.id = 'personalRankTitle';
    rankHeader.style.fontSize = '18px';
    rankHeader.style.margin = '8px 0';
    if (statusDiv) statusDiv.appendChild(rankHeader);

    if (highlightName) {
        let studentRank = data.findIndex(entry => 
            String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
            Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
            Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
        ) + 1;

        rankHeader.style.color = '#2ecc71';
        rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
    } else {
        rankHeader.style.color = '#e67e22';
        rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
    }

    const medals = ['🥇 1', '🥈 2', '🥉 3'];

    data.forEach((entry, index) => {
        const tr = document.createElement('tr');
        const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
        const timeFormatted = formatTimeDisplay(entry.time);
        const rankDisplay = medals[index] || `#${index + 1}`;
        
        if (highlightName && 
            String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
            Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
            Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
            tr.className = 'highlight-row';
        }

        tr.innerHTML = `
            <td><strong>${rankDisplay}</strong></td>
            <td><strong>${entry.name}</strong></td>
            <td>${accVal}%</td>
            <td>${timeFormatted}</td>
        `;
        tbody.appendChild(tr);
    });
}

function resetActivity() {
    generateExercise();
}

function shuffle(array) {
    for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = array[i];
        array[i] = array[j];
        array[j] = temp;
    }
    return array;
}
</script>
</body>
</html>
