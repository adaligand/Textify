<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chunk</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            padding: 40px;
            box-sizing: border-box;
            background-color: white; /* White background for the game */
            border-radius: 15px; /* Rounded corners */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* Subtle shadow */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* Standard Light Grey Button Styling */
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .hide {
            display: none !important;
        }
        .english-text-box {
            border: 2px solid #ccc;
            padding: 12px;
            font-size: 20px;
            text-align: center;
            background-color: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        #exerciseOutput {
            font-size: 20px;
            line-height: 2;
            text-align: center;
            word-spacing: 0.5em;
            margin-top: 20px;
            width: 100%;
        }
        .draggable-word {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin: 4px;
            border: 2px solid #ccc;
            padding: 8px 16px;
            border-radius: 10px;
            background-color: #f9f9f9;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            transition: background-color 0.2s, transform 0.2s;
        }
        .draggable-word:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }
        .correct-chunk {
            background-color: #d4edda !important;
            border-color: #c3e6cb !important;
            color: #155724 !important;
            font-weight: bold;
        }
        .wrong-chunk {
            background-color: #f8d7da !important;
            border-color: #f5c6cb !important;
        }
        .dropzone-container {
            margin-top: 20px;
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        .dropzone {
            border: 2px dashed #ccc;
            min-height: 28px;
            font-size: 20px;
            height: auto;
            border-radius: 10px;
            display: inline-block;
            padding: 6px 14px;
            vertical-align: top;
            margin: 4px;
            background-color: #fafafa;
        }
        select {
            width: auto;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #ccc;
            background-color: #f9f9f9;
            font-size: 16px;
            margin-bottom: 10px;
            height: 42px;
            cursor: pointer;
        }
        .input-container {
            text-align: center;
            margin-bottom: 10px;
        }
        #feedback {
            text-align: center;
            font-weight: bold;
            font-size: 22px;
            color: #28a745;
            margin-top: 20px;
        }

        /* Leaderboard Box & Table Styling */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
            width: 100%;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Chunks</div>
        <div class="subtitle" id="subtitle">Unjumble the chunks.</div>
        <br>
        
        <div id="game-screen" style="width: 100%;">
            <div class="english-text-box hide" id="englishText"></div>
            <div id="frenchText" class="hide"></div>

            <div class="input-container">
                <label for="chunkSize" style="font-size: 18px; margin-right: 8px;">Select Chunk Size:</label>
                <select id="chunkSize" onchange="startGame()">
                    <option value="1">Single Words</option>
                    <option value="2">Small chunks</option>
                    <option value="4" selected>Medium chunks</option>
                    <option value="6">Big chunks</option>
                </select>
                <button id="generateButtonChunk" class="btn" onclick="startGame()">Generate Exercise</button>
            </div>
            <div id="exerciseOutput" class="hide"></div>
            <div class="dropzone-container hide" id="dropZones"></div>
            <div id="feedback" class="hide">🎉 All chunks are in the correct order! 🎉</div>
        </div>

        <div id="end-screen" class="hide" style="width: 100%;">
            <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

            <!-- Leaderboard Container -->
            <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
                <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
                <div id="leaderboardStatus"></div>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Accuracy</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
                <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
            </div>
        </div>
    </div>

    <script>
        // --- LEADERBOARD CONFIGURATION ---
        const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
        const GAME_NAME = "Text_Chunks";

        var originalChunks = [];
        var currentChunkIndex = 0;

        var startTime = 0;
        var totalClicks = 0;
        var totalTargetChunks = 0;
        var isFinished = false;

        const params = new URLSearchParams(window.location.search);
        const sheetUrl = params.get('sheet');

        function getSpreadsheetId(url) {
            if (!url) return null;
            if (url.includes('/d/e/')) {
                const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
                return matches ? matches[1] : url;
            }
            const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

        if (!sheetUrl) {
            document.getElementById('subtitle').textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
        } else {
            document.getElementById('subtitle').textContent = "Loading data...";
            Papa.parse(sheetUrl, {
                download: true,
                header: false,
                skipEmptyLines: false,
                complete: function(results) {
                    try {
                        const frenchText = results.data[1][8];
                        const englishText = results.data[13][8];

                        if (!frenchText || !englishText) {
                            throw new Error("Text is missing from cell French text & English text.");
                        }
                        
                        document.getElementById('englishText').textContent = englishText.trim();
                        document.getElementById('frenchText').textContent = frenchText.trim();
                        
                        document.getElementById('subtitle').textContent = "Unjumble the chunks.";
                        document.getElementById('englishText').classList.remove('hide');

                        startGame();

                    } catch (e) {
                        document.getElementById('subtitle').textContent = "⚠️ Error reading data. Check that your sheet has text in cells French text & English text and is published correctly.";
                        console.error(e);
                    }
                },
                error: function(err) {
                    document.getElementById('subtitle').textContent = "⚠️ Error loading the CSV file.";
                    console.error(err);
                }
            });
        }

        function startGame() {
            isFinished = false;
            totalClicks = 0;
            startTime = Date.now();

            document.getElementById('game-screen').classList.remove('hide');
            document.getElementById('end-screen').classList.add('hide');
            document.getElementById('feedback').classList.add('hide');
            document.getElementById('scoreDisplay').style.display = 'none';
            document.getElementById('leaderboardSection').style.display = 'none';

            const statusDiv = document.getElementById('leaderboardStatus');
            if (statusDiv) statusDiv.innerHTML = '';

            generateChunk();
        }

        // Keyboard navigation to start again
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && isFinished) {
                event.preventDefault();
                resetActivity();
            }
        });

        function generateChunk() {
            var textInput = document.getElementById('frenchText').textContent;
            if (!textInput) return;
            
            var exerciseOutput = document.getElementById('exerciseOutput');
            exerciseOutput.innerHTML = '';
            var dropZones = document.getElementById('dropZones');
            dropZones.innerHTML = '';

            var chunkSize = parseInt(document.getElementById('chunkSize').value);
            originalChunks = getWordChunks(textInput, chunkSize);
            totalTargetChunks = originalChunks.length;

            var shuffledChunks = shuffleArray([...originalChunks]);

            for (var i = 0; i < originalChunks.length; i++) {
                var dropZone = document.createElement('div');
                dropZone.classList.add('dropzone');
                dropZones.appendChild(dropZone);
            }

            for (var i = 0; i < shuffledChunks.length; i++) {
                var chunk = shuffledChunks[i].join(' ');
                var chunkElement = document.createElement('div');
                chunkElement.textContent = chunk;
                chunkElement.classList.add('draggable-word');
                chunkElement.setAttribute('onclick', 'selectChunk(this)');
                exerciseOutput.appendChild(chunkElement);
            }

            exerciseOutput.classList.remove('hide');
            dropZones.classList.remove('hide');
            document.getElementById('feedback').classList.add('hide');
            currentChunkIndex = 0;
        }

        function getWordChunks(text, chunkSize) {
            var words = text.split(/\s+/).filter(Boolean);
            var chunks = [];
            for (var i = 0; i < words.length; i += chunkSize) {
                chunks.push(words.slice(i, i + chunkSize));
            }
            return chunks;
        }

        function shuffleArray(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        function selectChunk(element) {
            if (isFinished) return;
            totalClicks++;

            var chunkText = element.textContent;
            var correctChunk = originalChunks[currentChunkIndex].join(' ');

            if (chunkText === correctChunk) {
                var dropZones = document.getElementById('dropZones');
                var dropZone = dropZones.children[currentChunkIndex];
                dropZone.textContent = chunkText;
                dropZone.classList.add('correct-chunk');
                element.remove();
                currentChunkIndex++;

                if (currentChunkIndex === originalChunks.length) {
                    document.getElementById('feedback').classList.remove('hide');
                    setTimeout(() => {
                        finishGame(true);
                    }, 800);
                }
            } else {
                element.classList.add('wrong-chunk');
                setTimeout(() => {
                    element.classList.remove('wrong-chunk');
                }, 800);
            }
        }

        function finishGame(isWin) {
            if (isFinished) return;
            isFinished = true;

            document.getElementById('end-screen').classList.remove('hide');

            const statusDiv = document.getElementById('leaderboardStatus');
            if (statusDiv) statusDiv.innerHTML = '';

            const totalSeconds = Math.round((Date.now() - startTime) / 1000);
            const displayMins = Math.floor(totalSeconds / 60);
            const displaySecs = totalSeconds % 60;

            const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
            const formattedTimeText = `${displayMins}m ${displaySecs}s`;
            const accuracy = Math.min(100, Math.round((totalTargetChunks / Math.max(totalTargetChunks, totalClicks)) * 100));

            const scoreDisplay = document.getElementById('scoreDisplay');
            scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
            scoreDisplay.style.display = "block";

            checkQualificationAndLoad(clockFormattedTime, accuracy);
        }

        function formatTimeDisplay(minutesVal) {
            if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
            const num = parseFloat(minutesVal);
            const mins = Math.floor(num);
            const secs = Math.round((num - mins) * 100);
            return `${mins}m ${secs}s`;
        }

        function checkQualificationAndLoad(timeMinutes, accuracy) {
            const tbody = document.getElementById('leaderboardBody');
            const section = document.getElementById('leaderboardSection');
            
            tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
            section.style.display = "block";

            fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
            .then(res => res.json())
            .then(data => {
                let tempBoard = [...data];
                let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
                tempBoard.push(newAttempt);
                tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
                
                let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

                if (playerRank <= 5) {
                    let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                    if (!studentName) studentName = "Anonymous";
                    
                    tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                    
                    fetch(LEADERBOARD_API_URL, {
                        method: "POST",
                        body: JSON.stringify({
                            topicId: topicId,
                            game: GAME_NAME,
                            name: studentName,
                            time: parseFloat(timeMinutes),
                            accuracy: parseFloat(accuracy)
                        })
                    })
                    .then(res => res.json())
                    .then(updatedData => {
                        renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                    });
                } else {
                    renderLeaderboardRows(data, null, null, null);
                }
            })
            .catch(err => {
                console.error("Leaderboard loading failure:", err);
                tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
            });
        }

        function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
            const tbody = document.getElementById('leaderboardBody');
            const statusDiv = document.getElementById('leaderboardStatus');
            if(!tbody) return;
            
            tbody.innerHTML = "";
            if (statusDiv) statusDiv.innerHTML = "";
            
            let rankHeader = document.createElement('h4');
            rankHeader.id = 'personalRankTitle';
            rankHeader.style.fontSize = '18px';
            rankHeader.style.margin = '8px 0';
            if (statusDiv) statusDiv.appendChild(rankHeader);

            if (highlightName) {
                let studentRank = data.findIndex(entry => 
                    String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                    Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                    Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
                ) + 1;

                rankHeader.style.color = '#2ecc71';
                rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
            } else {
                rankHeader.style.color = '#e67e22';
                rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
            }

            const medals = ['🥇 1', '🥈 2', '🥉 3'];

            data.forEach((entry, index) => {
                const tr = document.createElement('tr');
                const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
                const timeFormatted = formatTimeDisplay(entry.time);
                const rankDisplay = medals[index] || `#${index + 1}`;
                
                if (highlightName && 
                    String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                    Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                    Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
                    tr.className = 'highlight-row';
                }

                tr.innerHTML = `
                    <td><strong>${rankDisplay}</strong></td>
                    <td><strong>${entry.name}</strong></td>
                    <td>${accVal}%</td>
                    <td>${timeFormatted}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function resetActivity() {
            startGame();
        }
    </script>
</body>
</html>
