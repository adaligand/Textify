<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pyramid</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5; /* Light grey background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      width: 95%;
      max-width: 1200px;
      padding: 40px;
      box-sizing: border-box;
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    #title {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
    }
    .subtitle {
      font-size: 20px;
      margin-bottom: 10px;
      text-align: center;
    }
    #text-container {
      margin-bottom: 20px;
      text-align: justify;
      padding: 12px 20px;
      font-size: 20px;
      border: 2px solid #ccc;
      border-radius: 10px;
      background-color: #f9f9f9;
      width: 100%;
      box-sizing: border-box;
    }
    #choices-container {
      margin-bottom: 20px;
      text-align: center;
      width: 100%;
    }
    .choice {
      display: inline-block;
      padding: 8px 16px;
      margin: 6px;
      font-size: 20px;
      font-weight: bold;
      border: 2px solid #ccc;
      border-radius: 10px;
      cursor: pointer;
      background-color: #f9f9f9;
      color: #000;
      transition: transform 0.2s, background-color 0.2s;
    }
    .choice:hover {
      background-color: #e0e0e0;
      transform: translateY(-2px);
    }
    #dropbox-container {
      margin-bottom: 20px;
      font-size: 22px;
      line-height: 1.8;
      text-align: justify;
      width: 100%;
      min-height: 40px;
    }
    .dropped-chunk {
      display: inline-block;
      padding: 4px 8px;
      margin-right: 6px;
      font-size: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #dff0d8;
    }
    #chunk-length {
      width: auto;
      padding: 6px 12px;
      border-radius: 10px;
      border: 2px solid #ccc;
      background-color: #f9f9f9;
      height: 40px;
      font-size: 16px;
      cursor: pointer;
    }
    .controls-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      margin-bottom: 20px;
      width: 100%;
    }

    /* Light Grey Button Styling */
    .btn {
      padding: 10px 20px;
      font-size: 18px;
      font-weight: bold;
      background-color: #f9f9f9;
      border: 2px solid #ccc;
      color: #000000;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px 5px;
      transition: transform 0.2s, background-color 0.2s;
    }
    .btn:hover {
      background-color: #e0e0e0;
      transform: translateY(-2px);
    }

    .hide {
      display: none !important;
    }

    /* Leaderboard Box & Table Styling */
    .leaderboard-box {
      margin-top: 25px;
      text-align: center;
      border-top: 2px solid #eee;
      padding-top: 20px;
      width: 100%;
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 16px;
      background-color: #fafafa;
      color: #333;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .leaderboard-table th, .leaderboard-table td {
      padding: 10px 12px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .leaderboard-table th {
      background-color: #f1f3f5;
      color: #333;
      font-weight: bold;
    }

    .leaderboard-table tr:last-child td {
      border-bottom: none;
    }

    .leaderboard-table tr.highlight-row {
      background-color: #d4edda !important;
      color: #155724 !important;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="title">Pyramid</div>
    <div class="subtitle" id="subtitle">One in four: Reconstruct the text by choosing the correct chunk.</div>

    <!-- Active Gameplay Screen -->
    <div id="game-screen" style="width: 100%;">
      <div id="text-container" style="display: none;"></div>
      <div id="dropbox-container"></div>
      <div id="choices-container"></div>

      <div class="controls-container">
        <label for="chunk-length" style="font-size: 16px; font-weight: bold;">Select chunk length:</label>
        <select id="chunk-length">
          <option value="1">Single words</option>
          <option value="2">Small chunks</option>
          <option value="4">Medium chunks</option>
          <option value="6">Big chunks</option>
        </select>
        <button id="reset-btn" class="btn" style="display: none;">🔄 Restart</button>
      </div>
    </div>

    <!-- Summary End Screen with Leaderboard -->
    <div id="end-screen" class="hide" style="width: 100%;">
      <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

      <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
        <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
        <div id="leaderboardStatus"></div>
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Accuracy</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody"></tbody>
        </table>
        <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
      </div>
    </div>
  </div>

  <script>
    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
    const GAME_NAME = "Text_Pyramid";

    document.addEventListener('DOMContentLoaded', function() {
      const textContainer = document.getElementById('text-container');
      const choicesContainer = document.getElementById('choices-container');
      const dropboxContainer = document.getElementById('dropbox-container');
      const resetBtn = document.getElementById('reset-btn');
      const chunkLengthSelect = document.getElementById('chunk-length');
      const subtitle = document.getElementById('subtitle');

      let englishText = "";
      let frenchText = "";
      let chunks = [];
      let correctChunks = [];
      let droppedChunks = [];
      let currentIndex = 0;
      
      let startTime = 0;
      let wrongAttempts = 0;
      let totalTargetChunks = 0;
      let isFinished = false;

      const params = new URLSearchParams(window.location.search);
      const sheetUrl = params.get('sheet');

      function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
          const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
          return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
      }
      const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

      if (!sheetUrl) {
        subtitle.textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
      } else {
        subtitle.textContent = "Loading data...";
        Papa.parse(sheetUrl, {
          download: true,
          header: false,
          skipEmptyLines: false,
          complete: function(results) {
            try {
              frenchText = results.data[1][8]; // I2
              englishText = results.data[13][8]; // I14
              if (!frenchText || !englishText) throw new Error("Missing French text & English text.");
              subtitle.textContent = "One in four: Reconstruct the text by choosing the correct chunk.";
              textContainer.textContent = englishText;
              textContainer.style.display = 'block';
              startExercise();
            } catch (e) {
              subtitle.textContent = "⚠️ Error reading data. Check sheet has text in French text & English text.";
              console.error(e);
            }
          },
          error: function(err) {
            subtitle.textContent = "⚠️ Error loading the CSV file.";
            console.error(err);
          }
        });
      }

      // Enter key to restart activity when game is finished
      document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter' && isFinished) {
          event.preventDefault();
          resetActivity();
        }
      });

      function startExercise() {
        isFinished = false;
        wrongAttempts = 0;
        startTime = Date.now();

        document.getElementById('subtitle').style.display = 'block';
        document.getElementById('game-screen').classList.remove('hide');
        document.getElementById('end-screen').classList.add('hide');
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('leaderboardSection').style.display = 'none';

        const chunkLength = parseInt(chunkLengthSelect.value);
        generateChunks(frenchText, chunkLength);
        correctChunks = [...chunks];
        totalTargetChunks = correctChunks.length;
        droppedChunks = [];
        currentIndex = 0;
        
        dropboxContainer.innerHTML = '';
        choicesContainer.style.display = 'block';
        resetBtn.style.display = 'inline-block';
        displayChoices();
      }

      function generateChunks(text, length) {
        const words = text.split(' ');
        chunks = [];
        for (let i = 0; i < words.length; i += length) {
          chunks.push(words.slice(i, i + length).join(' '));
        }
      }

      function displayChoices() {
        choicesContainer.innerHTML = '';
        if (currentIndex >= correctChunks.length) return;
        let wrongChoicesPool = chunks.filter(chunk => chunk !== correctChunks[currentIndex]);
        let shuffledWrongChoices = shuffle(wrongChoicesPool).slice(0, 3);
        let finalChoices = shuffle([correctChunks[currentIndex], ...shuffledWrongChoices]);
        finalChoices.forEach(chunk => {
          const choiceElement = createChoiceElement(chunk);
          choicesContainer.appendChild(choiceElement);
        });
      }

      function createChoiceElement(chunk) {
        const choiceElement = document.createElement('div');
        choiceElement.classList.add('choice');
        choiceElement.textContent = chunk;
        choiceElement.addEventListener('click', function() {
          if (isFinished) return;
          if (choiceElement.textContent === correctChunks[currentIndex]) {
            droppedChunks.push(choiceElement.textContent);
            displayDroppedChunks();
            currentIndex++;
            if (currentIndex >= correctChunks.length) {
              finishGame();
            } else {
              displayChoices();
            }
          } else {
            wrongAttempts++;
            choiceElement.style.backgroundColor = '#f8d7da';
            setTimeout(() => { choiceElement.style.backgroundColor = '#f9f9f9'; }, 500);
          }
        });
        return choiceElement;
      }

      function displayDroppedChunks() {
        dropboxContainer.innerHTML = droppedChunks.join(' ');
      }

      function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function finishGame() {
        if (isFinished) return;
        isFinished = true;

        document.getElementById('game-screen').classList.add('hide');
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('end-screen').classList.remove('hide');

        const statusDiv = document.getElementById('leaderboardStatus');
        if (statusDiv) statusDiv.innerHTML = '';

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        
        const accuracy = Math.max(0, Math.min(100, Math.round((totalTargetChunks / (totalTargetChunks + wrongAttempts)) * 100)));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        checkQualificationAndLoad(clockFormattedTime, accuracy);
      }

      function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
      }

      function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
      }

      function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if (!tbody) return;
        
        tbody.innerHTML = "";
        if (statusDiv) statusDiv.innerHTML = "";
        
        let rankHeader = document.createElement('h4');
        rankHeader.id = 'personalRankTitle';
        rankHeader.style.fontSize = '18px';
        rankHeader.style.margin = '8px 0';
        if (statusDiv) statusDiv.appendChild(rankHeader);

        if (highlightName) {
            let studentRank = data.findIndex(entry => 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
            ) + 1;

            rankHeader.style.color = '#2ecc71';
            rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
        } else {
            rankHeader.style.color = '#e67e22';
            rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
      }

      window.resetActivity = function() {
        startExercise();
      };

      chunkLengthSelect.addEventListener('change', startExercise);
      resetBtn.addEventListener('click', startExercise);
    });
  </script>
</body>
</html>
