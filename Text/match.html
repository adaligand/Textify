<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Match</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5; /* Light grey background */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            padding: 40px;
            box-sizing: border-box;
            background-color: white; /* White background */
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 40px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Light Grey Button Styling */
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f9f9f9;
            border: 2px solid #ccc;
            color: #000000;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        .columns-wrapper {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            width: 100%;
        }
        .column {
            width: 48%;
        }
        .chunk-btn {
            display: block;
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            background: #f9f9f9;
            border: 2px solid #ccc;
            cursor: pointer;
            border-radius: 10px;
            user-select: none;
            font-size: 18px;
            font-weight: bold;
            text-align: left;
            box-sizing: border-box;
            transition: background-color 0.2s, transform 0.1s;
        }
        .chunk-btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-1px);
        }
        .chunk-btn.selected {
            background-color: #cce5ff;
            border-color: #3399ff;
        }
        .feedback {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
            min-height: 1.5em;
            text-align: center;
        }
        .hide {
            display: none !important;
        }

        /* Leaderboard Box & Table Styling */
        .leaderboard-box {
            margin-top: 25px;
            text-align: center;
            border-top: 2px solid #eee;
            padding-top: 20px;
            width: 100%;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 16px;
            background-color: #fafafa;
            color: #333;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 10px 12px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        .leaderboard-table th {
            background-color: #f1f3f5;
            color: #333;
            font-weight: bold;
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr.highlight-row {
            background-color: #d4edda !important;
            color: #155724 !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Matchor</div>
        <div class="subtitle" id="subtitle">Match the English and French chunks.</div>

        <div id="game-screen" style="width: 100%;">
            <div class="columns-wrapper">
                <div class="column" id="english-column">
                    <h2>English</h2>
                    <div id="english-chunks"></div>
                </div>
                <div class="column" id="french-column">
                    <h2>French</h2>
                    <div id="french-chunks"></div>
                </div>
            </div>
            
            <div class="feedback" id="feedback">Loading data...</div>
            
            <div style="text-align: center; margin-top: 15px;">
                <button id="nextBatchBtn" class="btn hide" onclick="loadNextBatch()">Next Batch ➔</button>
            </div>
        </div>

        <div id="end-screen" class="hide" style="width: 100%;">
            <div id="scoreDisplay" style="font-size: 28px; font-weight: bold; margin: 20px 0; color: #333; padding: 15px; background-color: #f8f9fa; border-radius: 12px; width: 100%; box-sizing: border-box; display: none;"></div>

            <!-- Leaderboard Container -->
            <div id="leaderboardSection" class="leaderboard-box" style="display:none;">
                <h3 style="margin: 5px 0;">🏆 Top 5 Leaderboard 🏆</h3>
                <div id="leaderboardStatus"></div>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Player</th>
                            <th>Accuracy</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
                <button id="restartBtn" class="btn" style="margin-top:20px;" onclick="resetActivity()">🔄 Start Again</button>
            </div>
        </div>
    </div>

<script>
    // --- LEADERBOARD CONFIGURATION ---
    const LEADERBOARD_API_URL = "https://script.google.com/macros/s/AKfycbwoSxSMnLX2NFBBsp61a3qcWkohu0VjJjZ-GFbS9SvD5WBWqVKO7gL71TFw7WvobtkPhA/exec";
    const GAME_NAME = "Text_Match";

    let pairs = [];
    const batchSize = 10;
    let currentBatchIndex = 0;
    let selectedEnglish = null;
    let selectedFrench = null;
    let matchedCount = 0;

    var startTime = 0;
    var totalErrors = 0;
    var totalTargetPairs = 0;
    var isFinished = false;

    const englishChunksDiv = document.getElementById('english-chunks');
    const frenchChunksDiv = document.getElementById('french-chunks');
    const feedback = document.getElementById('feedback');
    const nextBatchBtn = document.getElementById('nextBatchBtn');

    // --- DATA LOADING FROM GOOGLE SHEET ---
    const params = new URLSearchParams(window.location.search);
    const sheetUrl = params.get('sheet');

    function getSpreadsheetId(url) {
        if (!url) return null;
        if (url.includes('/d/e/')) {
            const matches = url.match(/\/d\/e\/([a-zA-Z0-9-_]+)/);
            return matches ? matches[1] : url;
        }
        const matches = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        return matches ? matches[1] : url;
    }
    const topicId = sheetUrl ? getSpreadsheetId(sheetUrl) : null;

    if (!sheetUrl) {
        feedback.textContent = "⚠️ No CSV URL provided. Please add ?sheet=YOUR_LINK to the address bar.";
    } else {
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                pairs = [];
                results.data.forEach(row => {
                    const engChunk = row["English chunk"] || "";
                    const frChunk = row["French chunk"] || "";
                    if (engChunk.trim() && frChunk.trim()) {
                        pairs.push({
                            eng: engChunk.trim(),
                            fr: frChunk.trim()
                        });
                    }
                });

                if (pairs.length === 0) {
                    feedback.textContent = "⚠️ No data found. Check your column headers are 'English chunk' and 'French chunk'.";
                    return;
                }

                totalTargetPairs = pairs.length;
                startNewGame();
            },
            error: function(err) {
                feedback.textContent = "⚠️ Error loading the CSV file.";
                console.error(err);
            }
        });
    }

    // Keyboard support for Enter key (Next Batch / Start Again)
    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            if (isFinished) {
                event.preventDefault();
                resetActivity();
                return;
            }
            if (nextBatchBtn && !nextBatchBtn.classList.contains('hide')) {
                event.preventDefault();
                loadNextBatch();
            }
        }
    });

    function startNewGame() {
        isFinished = false;
        currentBatchIndex = 0;
        totalErrors = 0;
        startTime = Date.now();

        document.getElementById('game-screen').classList.remove('hide');
        document.getElementById('end-screen').classList.add('hide');
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('leaderboardSection').style.display = 'none';

        renderBatch();
    }

    function shuffle(array) {
        const copy = array.slice();
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function renderBatch() {
        feedback.textContent = '';
        feedback.style.color = '#000000';
        selectedEnglish = null;
        selectedFrench = null;
        matchedCount = 0;

        englishChunksDiv.innerHTML = '';
        frenchChunksDiv.innerHTML = '';
        nextBatchBtn.classList.add('hide');

        const start = currentBatchIndex * batchSize;
        const end = Math.min(start + batchSize, pairs.length);
        if (start >= pairs.length) return;
        const batchPairs = pairs.slice(start, end);

        const engChunks = batchPairs.map(p => p.eng);
        const frChunks = batchPairs.map(p => p.fr);

        const shuffledEng = shuffle(engChunks);
        const shuffledFr = shuffle(frChunks);

        shuffledEng.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'chunk-btn';
            btn.textContent = text;
            btn.dataset.lang = 'eng';
            btn.dataset.text = text;
            englishChunksDiv.appendChild(btn);
        });

        shuffledFr.forEach(text => {
            const btn = document.createElement('button');
            btn.className = 'chunk-btn';
            btn.textContent = text;
            btn.dataset.lang = 'fr';
            btn.dataset.text = text;
            frenchChunksDiv.appendChild(btn);
        });
    }

    function clearSelection() {
        if (selectedEnglish) selectedEnglish.classList.remove('selected');
        if (selectedFrench) selectedFrench.classList.remove('selected');
        selectedEnglish = null;
        selectedFrench = null;
    }

    function findPairIndex(engText, frText) {
        const start = currentBatchIndex * batchSize;
        const end = Math.min(start + batchSize, pairs.length);
        for (let i = start; i < end; i++) {
            if (pairs[i].eng === engText && pairs[i].fr === frText) return i;
        }
        return -1;
    }

    function handleClick(event) {
        if (isFinished) return;
        if (!event.target.classList.contains('chunk-btn')) return;

        const lang = event.target.dataset.lang;
        if (lang === 'eng') {
            if (selectedEnglish === event.target) {
                selectedEnglish.classList.remove('selected');
                selectedEnglish = null;
                return;
            }
            if (selectedEnglish) selectedEnglish.classList.remove('selected');
            selectedEnglish = event.target;
            selectedEnglish.classList.add('selected');
        } else if (lang === 'fr') {
            if (selectedFrench === event.target) {
                selectedFrench.classList.remove('selected');
                selectedFrench = null;
                return;
            }
            if (selectedFrench) selectedFrench.classList.remove('selected');
            selectedFrench = event.target;
            selectedFrench.classList.add('selected');
        }

        if (selectedEnglish && selectedFrench) {
            const engText = selectedEnglish.dataset.text;
            const frText = selectedFrench.dataset.text;
            const idx = findPairIndex(engText, frText);

            if (idx !== -1) {
                feedback.textContent = "Correct match! 🎉";
                feedback.style.color = "#28a745";
                selectedEnglish.style.visibility = 'hidden';
                selectedFrench.style.visibility = 'hidden';

                matchedCount++;
                clearSelection();

                const batchPairsCount = Math.min(batchSize, pairs.length - currentBatchIndex * batchSize);
                if (matchedCount === batchPairsCount) {
                    currentBatchIndex++;
                    if (currentBatchIndex * batchSize >= pairs.length) {
                        feedback.textContent = '';
                        setTimeout(() => {
                            finishGame(true);
                        }, 500);
                    } else {
                        feedback.textContent = "Batch complete! Press Enter or click 'Next Batch'.";
                        nextBatchBtn.classList.remove('hide');
                    }
                }
            } else {
                totalErrors++;
                feedback.textContent = "❌ Incorrect match. Try again.";
                feedback.style.color = "#dc3545";
                setTimeout(() => {
                    clearSelection();
                    if (feedback.textContent.includes("Incorrect match")) {
                        feedback.textContent = '';
                    }
                }, 1200);
            }
        }
    }

    function loadNextBatch() {
        renderBatch();
    }

    document.body.addEventListener('click', handleClick);

    function finishGame(isWin) {
        if (isFinished) return;
        isFinished = true;

        document.getElementById('end-screen').classList.remove('hide');

        const statusDiv = document.getElementById('leaderboardStatus');
        if (statusDiv) statusDiv.innerHTML = '';

        const totalSeconds = Math.round((Date.now() - startTime) / 1000);
        const displayMins = Math.floor(totalSeconds / 60);
        const displaySecs = totalSeconds % 60;

        const clockFormattedTime = parseFloat(`${displayMins}.${displaySecs < 10 ? '0' : ''}${displaySecs}`);
        const formattedTimeText = `${displayMins}m ${displaySecs}s`;
        
        // Accuracy calculation based on target pairs vs total errors made
        const accuracy = Math.max(0, Math.min(100, Math.round((totalTargetPairs / (totalTargetPairs + totalErrors)) * 100)));

        const scoreDisplay = document.getElementById('scoreDisplay');
        scoreDisplay.textContent = `🎉 Score: ${accuracy}% Accuracy in ${formattedTimeText}!`;
        scoreDisplay.style.display = "block";

        checkQualificationAndLoad(clockFormattedTime, accuracy);
    }

    function formatTimeDisplay(minutesVal) {
        if (minutesVal === undefined || minutesVal === null || isNaN(minutesVal)) return "";
        const num = parseFloat(minutesVal);
        const mins = Math.floor(num);
        const secs = Math.round((num - mins) * 100);
        return `${mins}m ${secs}s`;
    }

    function checkQualificationAndLoad(timeMinutes, accuracy) {
        const tbody = document.getElementById('leaderboardBody');
        const section = document.getElementById('leaderboardSection');
        
        tbody.innerHTML = '<tr><td colspan="4">Loading board profiles... ⏳</td></tr>';
        section.style.display = "block";

        fetch(`${LEADERBOARD_API_URL}?game=${GAME_NAME}&topicId=${topicId}`)
        .then(res => res.json())
        .then(data => {
            let tempBoard = [...data];
            let newAttempt = { name: "___TEMP_PLAYER___", time: parseFloat(timeMinutes), accuracy: parseFloat(accuracy) };
            tempBoard.push(newAttempt);
            tempBoard.sort((a, b) => b.accuracy - a.accuracy || a.time - b.time);
            
            let playerRank = tempBoard.findIndex(e => e.name === "___TEMP_PLAYER___" && e.time === parseFloat(timeMinutes) && e.accuracy === parseFloat(accuracy)) + 1;

            if (playerRank <= 5) {
                let studentName = prompt(`🏆 Outstanding! You reached Rank #${playerRank} on the Leaderboard! Enter your name:`);
                if (!studentName) studentName = "Anonymous";
                
                tbody.innerHTML = '<tr><td colspan="4">Saving your spot... ⏳</td></tr>';
                
                fetch(LEADERBOARD_API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        topicId: topicId,
                        game: GAME_NAME,
                        name: studentName,
                        time: parseFloat(timeMinutes),
                        accuracy: parseFloat(accuracy)
                    })
                })
                .then(res => res.json())
                .then(updatedData => {
                    renderLeaderboardRows(updatedData, studentName, timeMinutes, accuracy);
                });
            } else {
                renderLeaderboardRows(data, null, null, null);
            }
        })
        .catch(err => {
            console.error("Leaderboard loading failure:", err);
            tbody.innerHTML = '<tr><td colspan="4">Error connecting to records database.</td></tr>';
        });
    }

    function renderLeaderboardRows(data, highlightName, highlightTime, highlightAcc) {
        const tbody = document.getElementById('leaderboardBody');
        const statusDiv = document.getElementById('leaderboardStatus');
        if(!tbody) return;
        
        tbody.innerHTML = "";
        if (statusDiv) statusDiv.innerHTML = "";
        
        let rankHeader = document.createElement('h4');
        rankHeader.id = 'personalRankTitle';
        rankHeader.style.fontSize = '18px';
        rankHeader.style.margin = '8px 0';
        if (statusDiv) statusDiv.appendChild(rankHeader);

        if (highlightName) {
            let studentRank = data.findIndex(entry => 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1
            ) + 1;

            rankHeader.style.color = '#2ecc71';
            rankHeader.textContent = studentRank > 0 ? `🎯 Final Status: Rank #${studentRank}!` : `🎯 Score Posted Successfully!`;
        } else {
            rankHeader.style.color = '#e67e22';
            rankHeader.textContent = `🏁 Good effort! Try again to break into the Top 5.`;
        }

        const medals = ['🥇 1', '🥈 2', '🥉 3'];

        data.forEach((entry, index) => {
            const tr = document.createElement('tr');
            const accVal = entry.accuracy !== undefined ? entry.accuracy : 100;
            const timeFormatted = formatTimeDisplay(entry.time);
            const rankDisplay = medals[index] || `#${index + 1}`;
            
            if (highlightName && 
                String(entry.name).trim().toLowerCase() === String(highlightName).trim().toLowerCase() && 
                Math.abs(Number(entry.time) - Number(highlightTime)) < 0.01 && 
                Math.abs(Number(entry.accuracy) - Number(highlightAcc)) < 0.1) {
                tr.className = 'highlight-row';
            }

            tr.innerHTML = `
                <td><strong>${rankDisplay}</strong></td>
                <td><strong>${entry.name}</strong></td>
                <td>${accVal}%</td>
                <td>${timeFormatted}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function resetActivity() {
        startNewGame();
    }
</script>
</body>
</html>
